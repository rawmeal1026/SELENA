<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f6f5fb; --surface: #ffffff; --bd: #e3e0ee; --bdh: #c8c3da;
  --text: #1c1a2e; --muted: #6c6880; --hint: #9d98b3;
  --blue: #46399b; --blue-bg: #ece9fa; --blue-text: #392e84;
  --gold: #c08a1f; --gold-bg: #faf1da; --gold-glow: #f0c040;
  --green-bg: #e1f5ee; --green-text: #085041; --green-bd: #0f6e56;
  --red-bg: #fcebeb; --red-text: #791f1f; --red-bd: #a32d2d;
  --amber-bg: #faeeda; --amber-text: #633806;
  --r: 10px; --rs: 6px;
}
html.dark {
  --bg: #11101d; --surface: #1b1930; --bd: #2c2a48; --bdh: #3a3760;
  --text: #ebe8f7; --muted: #9590ad; --hint: #6e6890;
  --blue: #9c8ce0; --blue-bg: #261f49; --blue-text: #c3b6f0;
  --gold: #f0c040; --gold-bg: #2b2308; --gold-glow: #f0c040;
  --green-bg: #0d2b22; --green-text: #4caf8a; --green-bd: #1a5c42;
  --red-bg: #2b1212; --red-text: #e07070; --red-bd: #5c2020;
  --amber-bg: #2b1f08; --amber-text: #d4a052;
}
html.dark .btn:hover { background: #272442; }
html.dark .cbtn:hover:not(:disabled) { background: #272442; }
html.dark .icon-btn:hover { background: #272442; color: var(--text); }
html.dark .sc { background: #221f3d; }
html.dark .pbar { background: #2a2748; }
html.dark .iron-card { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%) !important; border-color: #e94560 !important; }
html.dark .iron-card .subj-num { background: rgba(233,69,96,0.2) !important; color: #ff6b8a !important; }
html.dark .iron-card:hover { background: linear-gradient(135deg, #1f1f38 0%, #1a2545 50%, #123a70 100%) !important; }

/* ── Violet Sky Theme — muted deep-indigo night sky, black & gold accents ── */
html.violet {
  --bg: #120e1f; --surface: #050309; --bd: #322a4d; --bdh: #463c69;
  --text: #e8e3f2; --muted: #837aa3; --hint: #5b5280;
  --blue: #8f7eb8; --blue-bg: #221d38; --blue-text: #c2b6dc;
  --gold: #d9ad3a; --gold-bg: #221c08; --gold-glow: #e0b94a;
  --green-bg: #0d2b22; --green-text: #4cdf9a; --green-bd: #1a5c42;
  --red-bg: #2b1212; --red-text: #f07090; --red-bd: #7a1f3a;
  --amber-bg: #2b1f08; --amber-text: #d4a052;
}
html.violet body { background: radial-gradient(ellipse at 50% -10%, #211c36 0%, #120e1f 55%, #08060f 100%); }
html.violet .card { background: var(--surface); border-color: var(--bd); }
/* Black & gold buttons — darker than the page background */
html.violet .btn { background: #050309; color: #f0c040; border: 1.5px solid #d9ad3a; box-shadow: 0 0 0 1px rgba(217,173,58,0.12); }
html.violet .btn:hover { background: #14101f; border-color: #f4d35e; color: #f4d35e; box-shadow: 0 0 10px rgba(217,173,58,0.3); }
html.violet .btn.pri {
  background: linear-gradient(135deg, #93730f 0%, #d9ad3a 50%, #b8902c 100%);
  border-color: #d9ad3a; color: #110a02; font-weight: 700;
}
html.violet .btn.pri:hover { background: linear-gradient(135deg, #b8902c 0%, #e0b94a 50%, #d9ad3a 100%); }
html.violet .btn.ghost { color: var(--muted); }
html.violet .btn.ghost:hover { color: #d9ad3a; }
html.violet .cbtn { background: #1d1834; color: #e2d4a8; border-color: #5a4a24; }
html.violet .cbtn:hover:not(:disabled) { background: #271f44; border-color: #d9ad3a; color: #f4d35e; }
html.violet .cbtn.correct { background: var(--green-bg); border-color: var(--green-bd); color: var(--green-text); }
html.violet .cbtn.wrong { background: var(--red-bg); border-color: var(--red-bd); color: var(--red-text); }
html.violet .subj-card { background: var(--surface); border-color: var(--bd); }
html.violet .subj-card:hover { background: #221d38; border-color: #d9ad3a; }
html.violet .subj-name { color: #e8e3f2; }
html.violet .subj-num { background: #221c08; color: #d9ad3a; }
html.violet .icon-btn:hover { background: #221d38; color: #d9ad3a; }
html.violet .sc { background: #050309; }
html.violet .pbar { background: #221d38; }
html.violet .iron-card { background: linear-gradient(135deg, #050309 0%, #0d0a14 55%, #1c1306 100%) !important; border-color: #d9ad3a !important; }
html.violet .iron-card .subj-num { background: rgba(217,173,58,0.2) !important; color: #d9ad3a !important; }
html.violet .iron-card:hover { background: linear-gradient(135deg, #0d0a14 0%, #16121f 55%, #281a08 100%) !important; }
html.violet .selena-logo .accent {
  background: linear-gradient(120deg, #74649c 0%, #d9ad3a 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
html.violet .selena-tagline { color: var(--muted); }
html.violet .qtext { color: #e8e3f2; }
html.violet .qtopic, html.violet .qmeta { color: #837aa3; }
html.violet .qsubj { background: #221d38; color: #c2b6dc; }

/* ── Jester Speech Bubble Modal ── */
/* ── Jester Speech Bubble — shared layout ── */
#jester-overlay {
  display: none; position: fixed; inset: 0; z-index: 10000;
  background: rgba(0,0,0,0.62); backdrop-filter: blur(3px);
  align-items: flex-end; justify-content: center;
  padding-bottom: 32px;
}
#jester-overlay.active { display: flex; }
#jester-box {
  border-radius: 16px; padding: 0; max-width: 380px; width: 93%;
  position: relative; overflow: hidden;
}
#jester-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 11px;
}
#jester-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
#jester-name {
  font-size: 14px; font-weight: 700; letter-spacing: .04em;
}
#jester-title {
  font-size: 11px; margin-top: 2px;
}
#jester-body {
  padding: 16px 18px 12px;
  min-height: 88px;
  border-top: 1px solid; border-bottom: 1px solid;
}
#jester-text {
  font-size: 14px; line-height: 1.68; font-style: italic;
}
#jester-text p { margin: 0 0 10px; }
#jester-text p:last-child { margin-bottom: 0; }
#jester-footer {
  padding: 11px 16px 14px;
  display: flex; gap: 8px; justify-content: flex-end; align-items: center;
}
#jester-cost-label { font-size: 12px; flex: 1; }
.jester-btn {
  padding: 7px 16px; border-radius: var(--rs);
  font-size: 13px; cursor: pointer; font-family: inherit;
  font-weight: 500; border: 1px solid transparent;
  transition: opacity .12s, background .12s;
}
.jester-btn.primary:hover { opacity: .86; }

/* ── Light theme ── */
html:not(.dark):not(.violet) #jester-box {
  background: #ffffff;
  border: 1.5px solid #c8bde8;
  box-shadow: 0 10px 40px rgba(80,50,140,0.14), 0 2px 8px rgba(0,0,0,0.08);
}
html:not(.dark):not(.violet) #jester-header {
  background: linear-gradient(135deg, #f0eafa 0%, #e8e0f8 100%);
}
html:not(.dark):not(.violet) #jester-avatar {
  background: linear-gradient(135deg, #d4b8f8, #a888e0);
  border: 2px solid #8b5cd4;
  box-shadow: 0 0 10px rgba(139,92,212,0.25);
}
html:not(.dark):not(.violet) #jester-name {
  color: #3d2080;
  text-shadow: none;
}
html:not(.dark):not(.violet) #jester-title { color: #7a68a8; }
html:not(.dark):not(.violet) #jester-body {
  border-color: #e5ddf5;
}
html:not(.dark):not(.violet) #jester-text { color: #2a1f4a; }
html:not(.dark):not(.violet) #jester-cost-label { color: #7a68a8; }
html:not(.dark):not(.violet) .jester-btn.primary {
  background: linear-gradient(135deg, #6030b8, #4a20a0);
  color: #f4ecff; border-color: #7040c8;
}
html:not(.dark):not(.violet) .jester-btn.secondary {
  background: #f0eafa; color: #5a4890; border-color: #c8bde8;
}
html:not(.dark):not(.violet) .jester-btn.secondary:hover {
  background: #e4d8f8; color: #3d2080;
}

/* ── Dark theme ── */
html.dark #jester-box {
  background: #1b1930;
  border: 1.5px solid #3a3760;
  box-shadow: 0 12px 48px rgba(0,0,0,0.55);
}
html.dark #jester-header {
  background: linear-gradient(135deg, #130c22 0%, #0d111e 100%);
}
html.dark #jester-avatar {
  background: linear-gradient(135deg, #4a1060, #1a0a60);
  border: 2px solid #9c6adb;
  box-shadow: 0 0 12px rgba(156,106,219,0.35);
}
html.dark #jester-name {
  color: #c8a0f0;
  text-shadow: 0 0 8px rgba(200,160,240,0.4);
}
html.dark #jester-title { color: #6e6890; }
html.dark #jester-body { border-color: #2c2a48; }
html.dark #jester-text { color: #ebe8f7; }
html.dark #jester-cost-label { color: #9590ad; }
html.dark .jester-btn.primary {
  background: linear-gradient(135deg, #6a30b0, #3a1870);
  color: #f0e0ff; border-color: #8a50d0;
}
html.dark .jester-btn.secondary {
  background: #1b1930; color: #9590ad; border-color: #2c2a48;
}
html.dark .jester-btn.secondary:hover { background: #261f49; color: #c3b6f0; }

/* ── Violet Sky theme ── */
html.violet #jester-box {
  background: #0a0712;
  border: 1.5px solid #6040a0;
  box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 0 32px rgba(120,60,200,0.15);
}
html.violet #jester-header {
  background: linear-gradient(135deg, #0e0820 0%, #06040f 100%);
}
html.violet #jester-avatar {
  background: linear-gradient(135deg, #3a0858, #0e0640);
  border: 2px solid #c8a0ff;
  box-shadow: 0 0 14px rgba(200,160,255,0.3);
}
html.violet #jester-name {
  color: #e0c0ff;
  text-shadow: 0 0 10px rgba(224,192,255,0.5);
}
html.violet #jester-title { color: #5b5280; }
html.violet #jester-body { border-color: #2a1e48; }
html.violet #jester-text { color: #e8e3f2; }
html.violet #jester-cost-label { color: #837aa3; }
html.violet .jester-btn.primary {
  background: linear-gradient(135deg, #7020c0, #420a88);
  color: #f0d8ff; border-color: #a060e0;
}
html.violet .jester-btn.secondary {
  background: #0a0712; color: #837aa3; border-color: #322a4d;
}
html.violet .jester-btn.secondary:hover { background: #150e28; color: #c2b6dc; }

/* ── Jester Card (Lunar Codex entry point) ── */
.jester-card {
  cursor: pointer; margin-bottom: 16px;
  border-radius: var(--r); padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  transition: box-shadow .2s, border-color .2s, background .2s;
}
.jester-card-avatar {
  width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.jester-card-name {
  font-size: 13px; font-weight: 700; letter-spacing: .04em;
}
.jester-card-sub {
  font-size: 11px; margin-top: 2px;
}

/* Light */
html:not(.dark):not(.violet) .jester-card {
  background: linear-gradient(135deg, #f0eafa 0%, #e6dcf8 100%);
  border: 1.5px solid #c0aee8;
  box-shadow: 0 2px 12px rgba(100,60,200,0.09);
}
html:not(.dark):not(.violet) .jester-card:hover {
  border-color: #8b5cd4;
  box-shadow: 0 4px 20px rgba(100,60,200,0.18);
}
html:not(.dark):not(.violet) .jester-card-avatar {
  background: linear-gradient(135deg, #d4b8f8, #a888e0);
  border: 2px solid #8b5cd4;
  box-shadow: 0 0 10px rgba(139,92,212,0.22);
}
html:not(.dark):not(.violet) .jester-card-name { color: #3d2080; }
html:not(.dark):not(.violet) .jester-card-sub  { color: #7a68a8; }

/* Dark */
html.dark .jester-card {
  background: linear-gradient(135deg, #130c22 0%, #0d0a1c 60%, #0a1228 100%);
  border: 1.5px solid #5a3a9a;
  box-shadow: 0 0 18px rgba(140,80,220,0.15);
}
html.dark .jester-card:hover {
  border-color: #9c6adb;
  box-shadow: 0 0 28px rgba(156,106,219,0.32);
}
html.dark .jester-card-avatar {
  background: linear-gradient(135deg, #4a1060, #1a0a60);
  border: 2px solid #9c6adb;
  box-shadow: 0 0 12px rgba(156,106,219,0.4);
}
html.dark .jester-card-name { color: #c8a0f0; }
html.dark .jester-card-sub  { color: #5a4880; }

/* Violet Sky */
html.violet .jester-card {
  background: linear-gradient(135deg, #0e0820 0%, #06040f 100%);
  border: 1.5px solid #6040a0;
  box-shadow: 0 0 18px rgba(120,60,200,0.12);
}
html.violet .jester-card:hover {
  border-color: #c8a0ff;
  box-shadow: 0 0 28px rgba(200,160,255,0.22);
}
html.violet .jester-card-avatar {
  background: linear-gradient(135deg, #3a0858, #0e0640);
  border: 2px solid #c8a0ff;
  box-shadow: 0 0 14px rgba(200,160,255,0.28);
}
html.violet .jester-card-name { color: #e0c0ff; }
html.violet .jester-card-sub  { color: #5b5280; }

/* Dark mode toggle */
.dm-btn, .nav-back-btn {
  width: 34px; height: 34px; border: 0.5px solid var(--bdh);
  border-radius: var(--rs); background: var(--surface); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0; color: var(--muted);
  transition: background .1s;
}
.dm-btn:hover, .nav-back-btn:hover { background: var(--blue-bg); color: var(--blue-text); }

/* Project SELENA brand wordmark */
.selena-brand { margin-bottom: 4px; }
.selena-logo {
  font-family: 'Bebas Neue', -apple-system, sans-serif; font-size: 36px; line-height: 1;
  letter-spacing: .03em; color: var(--text); display: flex; align-items: center; gap: 9px;
}
.selena-logo .moon { font-size: 28px; filter: drop-shadow(0 0 10px rgba(240,192,64,0.45)); }
.selena-logo .accent {
  background: linear-gradient(120deg, var(--blue) 0%, var(--gold-glow) 100%);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
}
.selena-tagline { font-size: 12.5px; color: var(--muted); margin-top: 3px; letter-spacing: .01em; }

/* Iron Man card */
.iron-card {
  background: linear-gradient(135deg, #1a0a0a 0%, #2d1010 50%, #1a0a2a 100%) !important;
  border-color: #c0392b !important;
}
.iron-card .subj-num { background: rgba(192,57,43,0.2) !important; color: #e74c3c !important; }
.iron-card .subj-name { color: #f0c040 !important; }
.iron-card .subj-count { color: #c0a060 !important; }
.iron-card:hover { background: linear-gradient(135deg, #220d0d 0%, #381414 50%, #220d33 100%) !important; border-color: #e74c3c !important; }

/* Iron Man card — light mode override (softer, less stark) */
html:not(.dark):not(.violet) .iron-card {
  background: linear-gradient(135deg, #fdf0f0 0%, #fae0e0 50%, #f5eaff 100%) !important;
  border-color: #c0392b !important;
}
html:not(.dark):not(.violet) .iron-card .subj-num { background: rgba(192,57,43,0.12) !important; color: #9b2226 !important; }
html:not(.dark):not(.violet) .iron-card .subj-name { color: #7a1c1c !important; }
html:not(.dark):not(.violet) .iron-card .subj-count { color: #8a5a2a !important; }
html:not(.dark):not(.violet) .iron-card:hover { background: linear-gradient(135deg, #fae8e8 0%, #f5d0d0 50%, #ede0f8 100%) !important; border-color: #a93226 !important; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem 4rem; }
#app { width: 100%; max-width: 680px; }
h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
.sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
.card { background: var(--surface); border: 0.5px solid var(--bd); border-radius: var(--r); padding: 1.25rem; margin-bottom: 12px; }
.slbl { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: var(--hint); margin-bottom: 10px; }

/* Subject picker */
.subj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
.subj-card {
  background: var(--surface); border: 0.5px solid var(--bd); border-radius: var(--r);
  padding: 1rem; cursor: pointer; transition: border-color .15s, background .15s;
  display: flex; flex-direction: column; gap: 6px;
}
.subj-card:hover { border-color: var(--blue); background: var(--blue-bg); }
.subj-card.loading-card { opacity: .6; cursor: default; pointer-events: none; }
.subj-card.disabled-card { opacity: .45; cursor: not-allowed; pointer-events: none; }
.home-card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 12px; }
.home-card-grid .subj-card { padding: 1.1rem 1.25rem; }
.subj-num { font-size: 11px; font-weight: 500; color: var(--blue-text); background: var(--blue-bg); display: inline-block; padding: 2px 8px; border-radius: 20px; width: fit-content; }
.subj-name { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; }
.subj-count { font-size: 12px; color: var(--muted); }

/* Topic checklist */
.topic-check { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--bd); cursor: pointer; }
.topic-check:last-child { border-bottom: none; }
.topic-check input[type=checkbox] { width: 16px; height: 16px; margin-top: 2px; flex-shrink: 0; accent-color: var(--blue); cursor: pointer; }
.topic-check-lbl { flex: 1; }
.topic-name { font-size: 14px; color: var(--text); line-height: 1.4; }
.topic-cnt { font-size: 12px; color: var(--muted); margin-top: 1px; }
.check-all-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
.check-all-btns { display: flex; gap: 6px; }
.check-all-btn { padding: 5px 12px; border: 0.5px solid var(--bdh); border-radius: var(--rs); background: var(--surface); color: var(--blue-text); cursor: pointer; font-size: 12px; font-weight: 500; font-family: inherit; transition: background .1s, border-color .1s; }
.check-all-btn:hover { background: var(--blue-bg); border-color: var(--blue); }
.sel-count { font-size: 12px; color: var(--muted); }

/* Buttons */
.btn { padding: 9px 16px; border: 0.5px solid var(--bdh); border-radius: var(--rs); background: var(--surface); color: var(--text); cursor: pointer; font-size: 14px; font-family: inherit; transition: background .1s; }
.btn:hover { background: #eeecf7; }
.btn.pri { background: var(--blue); border-color: var(--blue); color: white; }
.btn.pri:hover { opacity: .9; }
.btn.pri:disabled { opacity: .4; cursor: not-allowed; }
.btn.ghost { background: none; border: none; color: var(--muted); font-size: 13px; padding: 6px 0; }
.btn.ghost:hover { color: var(--text); background: none; }
.brow { display: flex; gap: 8px; margin-top: 14px; }
.brow .btn { flex: 1; }
.brow .btn.pri { flex: 2; }

/* Quiz */
.pbar { height: 4px; background: #e6e3f2; border-radius: 2px; margin-bottom: 14px; overflow: hidden; }
.pfill { height: 100%; background: var(--blue); border-radius: 2px; transition: width .3s; }
.qmeta { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.qsubj { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; color: var(--blue-text); background: var(--blue-bg); padding: 2px 8px; border-radius: 20px; display: inline-block; margin-bottom: 4px; }
.qtopic { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.qtxt { font-size: 15px; font-weight: 500; line-height: 1.65; margin-bottom: 1.25rem; }
.cbtn { width: 100%; text-align: left; padding: 11px 14px; margin-bottom: 8px; border: 0.5px solid var(--bdh); border-radius: var(--rs); background: var(--surface); color: var(--text); cursor: pointer; font-size: 14px; line-height: 1.5; display: flex; align-items: flex-start; gap: 10px; font-family: inherit; }
.cbtn:hover:not(:disabled) { background: #f4f2fb; }
.cbtn:disabled { cursor: default; }
.cbtn.correct { background: var(--green-bg); border-color: var(--green-bd); color: var(--green-text); }
.cbtn.wrong { background: var(--red-bg); border-color: var(--red-bd); color: var(--red-text); }
.cltr { font-weight: 500; min-width: 18px; flex-shrink: 0; }
.fb { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: var(--rs); font-size: 13px; font-weight: 500; margin-bottom: 8px; flex-wrap: wrap; }
.fb.ok { background: var(--green-bg); color: var(--green-text); }
.fb.no { background: var(--red-bg); color: var(--red-text); }

/* Results */
.rcirc { width: 88px; height: 88px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; }
.rpct { font-size: 26px; font-weight: 500; }
.rgrd { font-size: 12px; margin-top: 1px; }
.sgrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 4px; }
.sc { background: #f2f0fa; border-radius: var(--rs); padding: 12px; text-align: center; }
.sv { font-size: 22px; font-weight: 500; }
.sl { font-size: 12px; color: var(--muted); margin-top: 2px; }
.mi { padding: 10px 0; border-bottom: 0.5px solid var(--bd); }
.mi:last-child { border-bottom: none; }
.mq { font-size: 13px; margin-bottom: 3px; line-height: 1.5; }
.mmeta { font-size: 11px; color: var(--hint); margin-bottom: 4px; }
.mok { font-size: 12px; color: var(--green-text); margin-bottom: 2px; }
.mbad { font-size: 12px; color: var(--red-text); }

/* Breadcrumb */
.breadcrumb { font-size: 13px; color: var(--muted); margin-bottom: 18px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.breadcrumb span { cursor: pointer; color: var(--blue-text); }
.breadcrumb span:hover { text-decoration: underline; }
.breadcrumb .sep { cursor: default; color: var(--hint); }
.breadcrumb .cur { cursor: default; color: var(--muted); }

/* Status / error */
.status-row { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; margin-top: 8px; }
.err-box { background: var(--red-bg); border: 0.5px solid var(--red-bd); border-radius: var(--rs); padding: 10px 14px; font-size: 13px; color: var(--red-text); margin-top: 8px; }
.ok-box  { background: var(--green-bg); border: 0.5px solid var(--green-bd); border-radius: var(--rs); padding: 10px 14px; font-size: 13px; color: var(--green-text); margin-top: 8px; }

/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--bdh); border-top-color: var(--blue); border-radius: 50%; animation: spin .6s linear infinite; }

/* Sheet tag */
.sheet-tag { font-size: 11px; background: var(--blue-bg); color: var(--blue-text); border-radius: 4px; padding: 1px 6px; display: inline-block; }

/* ── Iron Man Mode UI ── */
@keyframes ironFlicker { 0%,100%{opacity:1} 50%{opacity:.85} }
@keyframes ironPulse { 0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,0)} 50%{box-shadow:0 0 24px 4px rgba(231,76,60,0.35)} }
@keyframes ironShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
@keyframes timerTick { 0%{transform:scaleX(1)} 100%{transform:scaleX(0)} }
@keyframes ironDeath { 0%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1.08)} }

.iron-confirm-wrap {
  min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem 1rem;
}
.iron-confirm-badge {
  font-size: 64px; margin-bottom: 12px; animation: ironFlicker 2.2s ease-in-out infinite;
}
.iron-confirm-title {
  font-size: 28px; font-weight: 700; color: var(--red-text); letter-spacing: .04em; margin-bottom: 6px;
  text-shadow: 0 0 20px rgba(231,76,60,0.5);
}
.iron-confirm-sub {
  font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.7; max-width: 420px;
}
.iron-rule-box {
  background: var(--red-bg); border: 1px solid var(--red-bd);
  border-radius: var(--r); padding: 1.25rem 1.5rem; margin-bottom: 28px; text-align: left; max-width: 420px; width: 100%;
  animation: ironPulse 3s ease-in-out infinite;
}
.iron-rule-title { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--red-text); margin-bottom: 12px; }
.iron-rule { display: flex; align-items: flex-start; gap: 10px; font-size: 13.5px; color: var(--text); margin-bottom: 8px; line-height: 1.5; }
.iron-rule:last-child { margin-bottom: 0; }
.iron-rule-icon { flex-shrink: 0; font-size: 16px; margin-top: -1px; }
.iron-confirm-btn {
  background: linear-gradient(135deg,#c0392b,#922b21); border: 1px solid #e74c3c;
  color: #fff; font-size: 16px; font-weight: 700; letter-spacing: .06em;
  padding: 14px 36px; border-radius: var(--rs); cursor: pointer; font-family: inherit;
  text-transform: uppercase; transition: opacity .15s; margin-bottom: 12px; display: block; width: 100%; max-width: 420px;
}
.iron-confirm-btn:hover { opacity: .88; }
.iron-back-btn {
  background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer;
  font-family: inherit; padding: 4px 0;
}
.iron-back-btn:hover { color: var(--text); }

/* Timer bar */
.iron-timer-wrap { margin-bottom: 10px; }
.iron-timer-bar-bg { height: 5px; background: #2e2e2e; border-radius: 3px; overflow: hidden; }
.iron-timer-bar { height: 100%; background: #e74c3c; border-radius: 3px; transform-origin: left; }
.iron-timer-label { font-size: 12px; color: #e74c3c; font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }

/* Lives display */
.iron-lives { display: flex; align-items: center; gap: 6px; font-size: 13px; flex-wrap: wrap; row-gap: 2px; }
.iron-heart { font-size: 16px; }
.iron-heart.dead { opacity: .2; filter: grayscale(1); }
.iron-shield-badge {
  font-size: 11px; font-weight: 700; color: #4a9edd; background: rgba(74,158,221,0.15);
  border: 0.5px solid #2a4a6a; border-radius: 20px; padding: 1px 8px; margin-left: 6px;
}

/* Consumables row */
.iron-consumable-row { display: flex; gap: 8px; margin-bottom: 12px; }
.iron-cbtn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px;
  padding: 8px 6px; border: 0.5px solid #5c2020; border-radius: var(--rs);
  background: linear-gradient(135deg,#1a0a0a,#241010); color: #d4a052;
  font-size: 12.5px; font-weight: 600; font-family: inherit; cursor: pointer;
  transition: border-color .15s, background .15s;
}
.iron-cbtn:hover:not(:disabled) { border-color: #e74c3c; background: linear-gradient(135deg,#220d0d,#2d1313); }
.iron-cbtn:disabled { opacity: .35; cursor: not-allowed; }
.iron-cbtn-count {
  font-size: 11px; font-weight: 700; background: rgba(231,76,60,0.25); color: #f08080;
  border-radius: 20px; padding: 0px 6px; min-width: 16px; text-align: center;
}

/* Bombed-out choice */
.cbtn.removed { opacity: .4; text-decoration: line-through; cursor: not-allowed; }

/* Skill button */
.iron-skill-row { margin-bottom: 10px; }
.iron-skill-btn {
  width: 100%; display: flex; align-items: stretch; flex-direction: row; gap: 10px;
  padding: 9px 14px; border: 0.5px solid var(--bd); border-radius: var(--rs);
  background: var(--surface); color: var(--text);
  font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer;
  transition: border-color .15s, background .15s; position: relative; overflow: hidden; text-align: left;
}
.iron-skill-btn:hover:not(:disabled) { border-color: var(--blue); background: var(--blue-bg); }
.iron-skill-btn:disabled { opacity: .35; cursor: not-allowed; }
.iron-skill-btn-emoji { font-size: 26px; line-height: 1; display: flex; align-items: center; flex-shrink: 0; }
.iron-skill-btn-body { display: flex; flex-direction: column; flex: 1; min-width: 0; justify-content: center; }
.iron-skill-btn-left { display: flex; align-items: center; gap: 4px; width: 100%; min-width: 0; }
.iron-skill-name { font-size: 13px; font-weight: 700; color: var(--blue-text); }
.iron-skill-desc { font-size: 11px; color: var(--muted); font-weight: 400; margin-top: 1px; }
.iron-skill-cd {
  font-size: 11px; font-weight: 700; background: var(--blue-bg); color: var(--blue-text);
  border-radius: 20px; padding: 2px 10px; min-width: 40px; text-align: center; flex-shrink: 0; align-self: center;
}
.iron-skill-cd.ready { background: rgba(39,174,96,0.25); color: #6fcf97; border: 0.5px solid #1a5c42; }
.iron-skill-cd.inactive { background: var(--surface); color: var(--hint); border: 0.5px solid var(--bd); }
.iron-skill-event {
  display: block; margin-top: 6px; margin-bottom: 10px; padding: 5px 12px; border-radius: 20px;
  font-size: 11.5px; font-weight: 600; background: var(--blue-bg); color: var(--blue-text);
  border: 0.5px solid var(--bdh); word-break: break-word;
}

/* Skill button — dark theme (deep purple feel) */
html.dark .iron-skill-btn {
  border-color: #4a2a7a;
  background: linear-gradient(135deg,#0e0a1a,#1a1030); color: #c89ef0;
}
html.dark .iron-skill-btn:hover:not(:disabled) { border-color: #9b59b6; background: linear-gradient(135deg,#140d22,#20153a); }
html.dark .iron-skill-name { color: #d4a0ff; }
html.dark .iron-skill-desc { color: #9b7ac8; }
html.dark .iron-skill-cd { background: rgba(155,89,182,0.3); color: #d4a0ff; border: none; }
html.dark .iron-skill-event { background: rgba(155,89,182,0.2); color: #c89ef0; border-color: #6a3a9a; }

/* Skill button — violet theme (black & gold) */
html.violet .iron-skill-btn {
  border-color: #5a4a24;
  background: linear-gradient(135deg,#0a0712,#150e22); color: #e2d4a8;
}

html.violet .iron-skill-desc { color: #837aa3; }
html.violet .iron-skill-cd { background: rgba(217,173,58,0.2); color: #d9ad3a; border: 0.5px solid #5a4a24; }

html.violet .iron-skill-cd.inactive { background: rgba(0,0,0,0.3); color: #5b5280; border-color: #322a4d; }
html.violet .iron-skill-event { background: rgba(217,173,58,0.12); color: #d9ad3a; border-color: #5a4a24; }

/* Skill button — light theme (soft indigo) */
html:not(.dark):not(.violet) .iron-skill-btn {
  border-color: #c8bde8;
  background: linear-gradient(135deg,#f5f2fc,#ede8f8); color: #3d2080;
}
html:not(.dark):not(.violet) .iron-skill-btn:hover:not(:disabled) { border-color: #8b5cd4; background: linear-gradient(135deg,#ede8f8,#e3d8f4); }
html:not(.dark):not(.violet) .iron-skill-name { color: #3d2080; }
html:not(.dark):not(.violet) .iron-skill-desc { color: #7a68a8; }
html:not(.dark):not(.violet) .iron-skill-cd { background: rgba(100,60,200,0.12); color: #5030a0; border: 0.5px solid #c8bde8; }

html:not(.dark):not(.violet) .iron-skill-cd.inactive { background: #f0eef8; color: #9d98b3; border-color: #d8d0f0; }
html:not(.dark):not(.violet) .iron-skill-event { background: rgba(100,60,200,0.08); color: #4a30a0; border-color: #c8bde8; }

/* Reward screen */
.iron-reward-grid { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 592px; }
.iron-reward-card {
  flex: 1; min-width: 130px; background: var(--surface);

  cursor: pointer; font-family: inherit; color: var(--muted); text-align: center;
  transition: border-color .15s, transform .15s, background .15s;
}
.iron-reward-card:hover { border-color: var(--red-text); background: var(--red-bg); transform: translateY(-2px); }
.iron-reward-icon { font-size: 32px; margin-bottom: 8px; }
.iron-reward-name { font-size: 14px; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
.iron-reward-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

/* Game Over screen */
.iron-gameover-wrap {
  min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem 1rem;
}
.iron-gameover-icon { font-size: 72px; margin-bottom: 16px; }
.iron-gameover-title { font-size: 32px; font-weight: 900; color: #e74c3c; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; text-shadow: 0 0 30px rgba(231,76,60,0.6); }
.iron-gameover-score { font-size: 18px; color: #c0a060; margin-bottom: 24px; }
.iron-gameover-msg { font-size: 14px; color: #6b6b67; margin-bottom: 32px; max-width: 360px; line-height: 1.7; }
.iron-gameover-btn {

  color: #e74c3c; font-size: 15px; font-weight: 700; letter-spacing: .04em;
  padding: 13px 32px; border-radius: var(--rs); cursor: pointer; font-family: inherit;
  text-transform: uppercase; transition: border-color .15s, color .15s;
}
.iron-gameover-btn:hover { border-color: #e74c3c; color: #f08080; }

/* ── Mastery Award Screen ── */
@keyframes masteryReveal { 0%{opacity:0;transform:scale(0.7) translateY(30px)} 60%{transform:scale(1.04) translateY(-4px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
@keyframes masteryGlow   { 0%,100%{box-shadow:0 0 20px 4px rgba(240,192,64,0.25)} 50%{box-shadow:0 0 50px 12px rgba(240,192,64,0.55)} }
@keyframes masteryFloat  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes masteryStars  { 0%{opacity:0;transform:scale(0) rotate(-30deg)} 100%{opacity:1;transform:scale(1) rotate(0deg)} }
@keyframes confettiFall  { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(120px) rotate(720deg);opacity:0} }

/* ── Offline banner ── */

  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--hint);margin:20px 0 10px;padding-bottom:6px;

}
.pr-grid {
  display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;margin-bottom:4px;
}
.pr-stat {
  background:var(--surface);border:0.5px solid var(--bd);border-radius:var(--rs);
  padding:10px 12px;display:flex;flex-direction:column;gap:3px;
}
.pr-stat-icon { font-size:18px;line-height:1; }
.pr-stat-val  { font-size:22px;font-weight:700;color:var(--text);line-height:1.1; }
.pr-stat-lbl  { font-size:11px;color:var(--muted);line-height:1.4; }
.pr-class-row {
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:0.5px solid var(--bd);
}
.pr-class-row:last-child { border-bottom:none; }
.pr-class-left { display:flex;align-items:center;gap:10px; }
.pr-class-icon { font-size:22px; }
.pr-class-name { font-size:14px;font-weight:500;color:var(--text); }
.pr-class-runs { font-size:12px;color:var(--muted); }
.pr-class-right { display:flex;flex-direction:column;align-items:flex-end;gap:2px; }
.pr-class-best { font-size:14px;font-weight:700;color:var(--gold); }
.pr-class-mastery { font-size:11px;color:#9b59b6; }
.pr-class-untried { font-size:12px;color:var(--hint);font-style:italic; }
.pr-flavour-row {
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:0.5px solid var(--bd);
}
.pr-flavour-row:last-child { border-bottom:none; }
.pr-flavour-lbl { font-size:13px;color:var(--text); }
.pr-flavour-val { font-size:14px;font-weight:700;color:var(--text); }
.pr-reset-btn {
  background:none;border:0.5px solid var(--bd);border-radius:var(--rs);
  color:var(--muted);font-size:12px;font-family:inherit;padding:6px 14px;
  cursor:pointer;margin-top:16px;transition:border-color .15s,color .15s;
}
.pr-reset-btn:hover { border-color:var(--red-bd);color:var(--red-text); }

/* ── Achievement Library ── */
.achv-grid {
  display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:4px;
}
.achv-card {
  display:flex;align-items:flex-start;gap:12px;
  background:var(--surface);border:0.5px solid var(--bd);border-radius:var(--rs);
  padding:11px 13px;transition:opacity .15s;
}
.achv-card.locked { opacity:.55; }
.achv-card.unlocked { border-color:var(--gold-glow); background:var(--gold-bg); }
.achv-card-icon { font-size:24px;line-height:1;flex-shrink:0;margin-top:1px; }
.achv-card-body { display:flex;flex-direction:column;gap:2px;min-width:0; }
.achv-card-title { font-size:14px;font-weight:700;color:var(--text); }
.achv-card-desc  { font-size:12px;color:var(--muted);line-height:1.5; }
.achv-card-date  { font-size:11px;color:var(--gold);margin-top:2px;font-weight:600; }

/* ── Achievement Unlock Toast ── */
#achvToastContainer {
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;
  pointer-events:none;width:100%;padding:0 14px;
}
.achv-toast {
  pointer-events:auto;display:flex;align-items:center;gap:11px;
  background:#1c1730;border:1px solid var(--gold-glow);border-radius:var(--r);
  padding:10px 16px;box-shadow:0 8px 24px rgba(0,0,0,.35);
  max-width:340px;width:100%;
  opacity:0;transform:translateY(-16px) scale(.96);
  transition:opacity .3s ease,transform .3s ease;
}
.achv-toast.show { opacity:1;transform:translateY(0) scale(1); }
.achv-toast-icon { font-size:26px;line-height:1;flex-shrink:0; }
.achv-toast-label { font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gold-glow); }
.achv-toast-title { font-size:14px;font-weight:700;color:#fff;margin-top:1px; }

/* ── Graveyard Question Palettes — 3 versions, one per theme ── */
/* Light theme (default) — soft pastel tints */
.gy-card-ghost   { background:#eef0fb !important; border-color:#b8aee0 !important; }
.gy-card-zombie  { background:#eef7ec !important; border-color:#a3d49b !important; }
.gy-card-vampire { background:#fbeaea !important; border-color:#e0a0a0 !important; }
.gy-card-mummy   { background:#faf3e0 !important; border-color:#d8c080 !important; }

.gy-cbtn-ghost   { border-color:#b8aee0 !important; color:#5c4fa0 !important; }
.gy-cbtn-zombie  { border-color:#a3d49b !important; color:#2f6b2f !important; }
.gy-cbtn-vampire { border-color:#e0a0a0 !important; color:#8b1a1a !important; }
.gy-cbtn-mummy   { border-color:#d8c080 !important; color:#7a6010 !important; }

/* Dark theme — navy/forest/blood tones */
html.dark .gy-card-ghost   { background:#12102a !important; border-color:#4a3f8f !important; }
html.dark .gy-card-zombie  { background:#0f1f0f !important; border-color:#2e5e2e !important; }
html.dark .gy-card-vampire { background:#1a0808 !important; border-color:#8b1a1a !important; }
html.dark .gy-card-mummy   { background:#1e1a08 !important; border-color:#8a7020 !important; }

html.dark .gy-cbtn-ghost   { border-color:#4a3f8f !important; color:#c0b8f0 !important; }
html.dark .gy-cbtn-zombie  { border-color:#2e5e2e !important; color:#90d090 !important; }
html.dark .gy-cbtn-vampire { border-color:#8b1a1a !important; color:#ffaaaa !important; }
html.dark .gy-cbtn-mummy   { border-color:#8a7020 !important; color:#e8d080 !important; }

/* Violet Sky theme — purple & gold undertones */
html.violet .gy-card-ghost   { background:#1a1630 !important; border-color:#6a5a96 !important; }
html.violet .gy-card-zombie  { background:#13241d !important; border-color:#3a8f5e !important; }
html.violet .gy-card-vampire { background:#2a0f1f !important; border-color:#c23a6b !important; }
html.violet .gy-card-mummy   { background:#241a08 !important; border-color:#c79a3a !important; }

html.violet .gy-cbtn-ghost   { border-color:#6a5a96 !important; color:#c2b6dc !important; }
html.violet .gy-cbtn-zombie  { border-color:#3a8f5e !important; color:#9fe8b8 !important; }
html.violet .gy-cbtn-vampire { border-color:#c23a6b !important; color:#ff9fc0 !important; }
html.violet .gy-cbtn-mummy   { border-color:#c79a3a !important; color:#f0d080 !important; }

.gy-cbtn-ghost.correct,   .gy-cbtn-zombie.correct,
.gy-cbtn-vampire.correct,
.gy-cbtn-mummy.correct    { background:var(--green-bg)  !important; border-color:var(--green-bd)  !important; color:var(--green-text)  !important; }
.gy-cbtn-ghost.wrong,     .gy-cbtn-zombie.wrong,
.gy-cbtn-vampire.wrong,
.gy-cbtn-mummy.wrong      { background:var(--red-bg)    !important; border-color:var(--red-bd)    !important; color:var(--red-text)    !important; }

/* ── Study Mode Settings & Redemption ── */
.nm-settings-wrap { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
.nm-toggle-row {
  display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
  padding:10px 0; border-bottom:0.5px solid var(--bd);
}
.nm-toggle-row:last-child { border-bottom:none; }
.nm-toggle-info { flex:1; }
.nm-toggle-title { font-size:14px; font-weight:500; color:var(--text); margin-bottom:2px; }
.nm-toggle-desc  { font-size:12px; color:var(--muted); line-height:1.5; }
.nm-toggle { position:relative; width:40px; height:22px; flex-shrink:0; margin-top:2px; }
.nm-toggle input { opacity:0; width:0; height:0; }
.nm-slider {
  position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0;
  background:var(--bdh); border-radius:22px; transition:.2s;
}
.nm-slider:before {
  content:''; position:absolute; height:16px; width:16px; left:3px; bottom:3px;
  background:white; border-radius:50%; transition:.2s;
}
.nm-toggle input:checked + .nm-slider { background:var(--blue); }
.nm-toggle input:checked + .nm-slider:before { transform:translateX(18px); }

.nm-redemption-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.nm-redemption-card {
  border:0.5px solid var(--bd); border-radius:var(--rs); padding:10px 12px;
  cursor:pointer; transition:border-color .15s, background .15s; background:var(--surface);
  text-align:left; font-family:inherit;
}
.nm-redemption-card:hover { border-color:var(--blue); background:var(--blue-bg); }
.nm-redemption-card.selected { border-color:var(--blue); background:var(--blue-bg); }
.nm-redemption-card.none-card { grid-column:1/-1; }
.nm-rcard-icon { font-size:22px; margin-bottom:4px; }
.nm-rcard-name { font-size:13px; font-weight:600; color:var(--text); margin-bottom:2px; }
.nm-rcard-desc { font-size:11px; color:var(--muted); line-height:1.5; }

/* Graveyard HUD badge */
.nm-graveyard-badge {
  display:inline-flex; align-items:center; gap:4px;
  font-size:11px; font-weight:600; color:var(--red-text);
  background:var(--red-bg); border:0.5px solid var(--red-bd);
  border-radius:20px; padding:2px 8px;
}
/* Mindful Mode overlay */
.nm-mindful-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:999;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  gap:10px;
}
.nm-mindful-box {
  background:var(--surface); border:0.5px solid var(--red-bd); border-radius:var(--r);
  padding:1.5rem 2rem; text-align:center; max-width:320px;
}
.nm-mindful-title { font-size:16px; font-weight:700; color:var(--red-text); margin-bottom:6px; }
.nm-mindful-sub   { font-size:13px; color:var(--muted); margin-bottom:10px; line-height:1.6; }
.nm-mindful-count { font-size:32px; font-weight:900; color:var(--red-text); }

/* Checkpoint screen */
.nm-checkpoint-wrap {
  min-height:60vh; display:flex; flex-direction:column; align-items:center;
  justify-content:center; text-align:center; padding:2rem 1rem;
}
.nm-checkpoint-badge { font-size:56px; margin-bottom:10px; }
.nm-checkpoint-title { font-size:24px; font-weight:800; color:var(--blue-text); margin-bottom:6px; }
.nm-checkpoint-sub   { font-size:14px; color:var(--muted); margin-bottom:20px; line-height:1.7; }
.nm-checkpoint-stat-row { display:flex; gap:10px; justify-content:center; margin-bottom:24px; flex-wrap:wrap; }
.nm-checkpoint-pill {
  background:var(--blue-bg); border:0.5px solid var(--bdh); border-radius:20px;
  padding:6px 16px; font-size:13px; font-weight:600; color:var(--blue-text);
}
.nm-checkpoint-btns { display:flex; flex-direction:column; gap:10px; width:100%; max-width:380px; }

/* Eraser button */
.nm-eraser-btn {
  display:inline-flex; align-items:center; gap:5px;
  font-size:12px; color:var(--muted); background:none;
  border:0.5px solid var(--bd); border-radius:var(--rs);
  padding:4px 10px; cursor:pointer; font-family:inherit;
  transition:border-color .15s, color .15s;
}
.nm-eraser-btn:hover { border-color:var(--bdh); color:var(--text); }

/* Graveyard return banner */
.nm-graveyard-return-banner {
  background:var(--red-bg); border:0.5px solid var(--red-bd); border-radius:var(--rs);
  padding:7px 12px; font-size:12px; color:var(--red-text); margin-bottom:10px;
  line-height:1.5;
}
/* Pity banner (Vampire) */
.nm-pity-banner {
  background:var(--green-bg); border:0.5px solid var(--green-bd); border-radius:var(--rs);
  padding:7px 12px; font-size:12px; color:var(--green-text); margin-bottom:10px; line-height:1.6;
}
/* Returning-question narrative banners — 3 versions, one per theme */
/* Light theme (default) */
.nm-ghost-banner {
  background:#eef0fb; border:0.5px solid #c2bbe8; border-radius:var(--rs);
  padding:8px 12px; font-size:12px; color:#5c4fa0; margin-bottom:10px; line-height:1.6;
}
.nm-zombie-banner {
  background:#eef7ec; border:0.5px solid #a3d49b; border-radius:var(--rs);
  padding:8px 12px; font-size:12px; color:#2f6b2f; margin-bottom:10px; line-height:1.6;
}
.nm-vampire-banner {
  background:#fbeaea; border:0.5px solid #e0a0a0; border-radius:var(--rs);
  padding:8px 12px; font-size:12px; color:#8b1a1a; margin-bottom:10px; line-height:1.6;
}
.nm-mummy-banner {
  background:#faf3e0; border:0.5px solid #d8c080; border-radius:var(--rs);
  padding:8px 12px; font-size:13px; color:#7a6010; margin-bottom:10px; line-height:1.7;
  font-style:normal;
}
/* Dark theme */
html.dark .nm-ghost-banner   { background:#1a1a2e; border-color:#3a3a6e; color:#b0aee0; }
html.dark .nm-zombie-banner  { background:#1a2a1a; border-color:#2e5e2e; color:#7dbf7d; }
html.dark .nm-vampire-banner { background:#2a0a0a; border-color:#7a1a1a; color:#f87171; }
html.dark .nm-mummy-banner   { background:#2a2410; border-color:#7a6a2a; color:#d4b96a; }
/* Violet Sky theme — purple & gold undertones */
html.violet .nm-ghost-banner   { background:#1a1630; border-color:#564a80; color:#c2b6dc; }
html.violet .nm-zombie-banner  { background:#13241d; border-color:#3a8f5e; color:#9fe8b8; }
html.violet .nm-vampire-banner { background:#2a0f1f; border-color:#c23a6b; color:#ff9fc0; }
html.violet .nm-mummy-banner   { background:#241a08; border-color:#c79a3a; color:#f0d080; }

/* ── Custom confirm modal ── */
#selena-modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(2px);
  align-items: center; justify-content: center;
}
#selena-modal-overlay.active { display: flex; }
#selena-modal-box {
  background: var(--surface); border: 0.5px solid var(--bdh);
  border-radius: var(--r); padding: 1.5rem 1.5rem 1.25rem;
  max-width: 320px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.35);
}
#selena-modal-msg {
  font-size: 15px; color: var(--text); line-height: 1.5;
  margin-bottom: 1.25rem; text-align: center;
  max-height: 60vh; overflow-y: auto;
}
#selena-modal-btns {
  display: flex; gap: 8px; justify-content: flex-end;
}
#selena-modal-btns button {
  padding: 7px 18px; border-radius: var(--rs); border: 0.5px solid var(--bd);
  font-size: 14px; cursor: pointer; font-family: inherit;
  transition: background .1s;
}
#selena-modal-cancel {
  background: var(--surface); color: var(--muted);
}
#selena-modal-cancel:hover { background: var(--blue-bg); color: var(--blue-text); }
#selena-modal-ok {
  background: var(--blue); color: #fff; border-color: transparent;
  font-weight: 500;
}
#selena-modal-ok:hover { opacity: .88; }
/* ── Witch atmosphere background layer ── */
#witch-bg {
  position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
}
/* Floating glitch rectangles */
.wg-rect {
  position:absolute; border:1px solid; border-radius:2px;
  opacity:0; animation:wgr-blink var(--dur,2.4s) var(--delay,0s) steps(1) infinite;
}
@keyframes wgr-blink {
  0%,100% { opacity:0; }
  50%      { opacity:var(--op,0.18); }
}
/* Scanline sweep */
.wg-scan {
  position:absolute; left:0; right:0; height:1px; opacity:0;
  animation:wg-scan-move var(--sdur,3.2s) var(--sdelay,0s) linear infinite;
}
@keyframes wg-scan-move {
  0%   { top:-2px; opacity:0; }
  5%   { opacity:0.35; }
  95%  { opacity:0.35; }
  100% { top:100%; opacity:0; }
}
/* Corner text fragments */
.wg-text {
  position:absolute; font-family:monospace; font-size:10px; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase; opacity:0; line-height:1.3;
  white-space:nowrap;
  animation:wgt-blink var(--tdur,3s) var(--tdelay,0s) steps(1) infinite;
}
@keyframes wgt-blink {
  0%,100% { opacity:0; }
  30%,70% { opacity:var(--top,0.22); }
}
/* Horizontal glitch slice — tears the screen image briefly */
.wg-slice {
  position:absolute; left:0; right:0; height:3px;
  opacity:0; mix-blend-mode:screen;
  animation:wg-slice-anim var(--slicedur,4s) var(--slicedelay,0s) steps(1) infinite;
}
@keyframes wg-slice-anim {
  0%,100%  { opacity:0; transform:translateX(0); }
  48%      { opacity:0; transform:translateX(0); }
  49%      { opacity:0.6; transform:translateX(-8px); }
  50%      { opacity:0.4; transform:translateX(6px); }
  51%      { opacity:0; transform:translateX(0); }
}
/* Countdown footer */
#witch-footer {
  position:fixed; bottom:0; left:0; right:0; z-index:30;
  display:none;
  padding:6px 16px;
  border-top:1px solid rgba(180,60,60,0.25);
  background:rgba(8,4,15,0.88);
  backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center; gap:10px;
  pointer-events:none;
}
#witch-footer-label {
  font-family:'Bebas Neue',monospace; font-size:13px; letter-spacing:.14em;
  text-transform:uppercase;
}
#witch-footer-label.fc-ten  { color:#4caf8a; text-shadow:0 0 10px rgba(76,175,138,0.5); }
#witch-footer-label.fc-mid  { color:#d4a052; text-shadow:0 0 10px rgba(212,160,82,0.5); }
#witch-footer-label.fc-low  { color:#e04848; text-shadow:0 0 12px rgba(220,60,60,0.6); animation:wfooter-flicker 1.4s steps(1) infinite; }
#witch-footer-label.fc-zero { color:#ff2020; text-shadow:0 0 16px rgba(255,20,20,0.9); animation:wfooter-flicker .7s steps(1) infinite; }
@keyframes wfooter-flicker {
  0%,90%,100% { opacity:1; }
  92% { opacity:.1; }
  95% { opacity:.8; }
  97% { opacity:.05; }
}
#witch-footer-dot {
  width:5px; height:5px; border-radius:50%; flex-shrink:0;
  animation:wdot-pulse 1s ease-in-out infinite;
}
@keyframes wdot-pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:.5} }

/* Scene wrapper — sits above bg, below footer */
.witch-scene {
  position:relative; z-index:10;
  width:100%; max-width:520px; margin:0 auto;
  padding:32px 20px 80px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  color:#e8e3f2; min-height:100vh;
}
.witch-narrator {
  font-size:14px; line-height:1.85; color:#9d98b3; font-style:italic;
  margin-bottom:18px;
}
.witch-speech {
  border-radius:12px; padding:18px 20px; margin:14px 0;
  border:1px solid #7c3a8a;
  background:linear-gradient(135deg,#12080f 0%,#1c0d1e 100%);
  box-shadow:0 0 24px rgba(180,60,220,0.18), inset 0 1px 0 rgba(200,100,255,0.08);
  position:relative;
}
.witch-speech-text {
  font-size:14.5px; line-height:1.78; color:#e04848;
  font-style:italic;
}
.witch-speech::before {
  content:''; position:absolute; left:20px; top:-8px;
  border-left:8px solid transparent; border-right:8px solid transparent;
  border-bottom:8px solid #7c3a8a;
}
.witch-next-btn {
  display:block; width:100%; max-width:360px; margin:22px auto 0;
  padding:13px 20px; border-radius:8px; cursor:pointer;
  background:linear-gradient(135deg,#3a0858,#1a0428);
  border:1px solid #8a40c0; color:#e0c0ff;
  font-size:14px; font-weight:600; font-family:inherit;
  transition:all .15s; letter-spacing:.02em;
  box-shadow:0 0 16px rgba(140,60,200,0.25);
}
.witch-next-btn:hover { background:linear-gradient(135deg,#4a0a6a,#250535); border-color:#c080ff; box-shadow:0 0 24px rgba(180,80,255,0.4); }

/* Witch multiple-choice */
.witch-choices { display:flex; flex-direction:column; gap:8px; margin:16px 0; }
.witch-cbtn {
  width:100%; text-align:left; padding:12px 16px;
  border:0.5px solid #6a2a7a; border-radius:8px;
  background:linear-gradient(135deg,#140c1e,#1c1028);
  color:#c8b0d8; cursor:pointer; font-size:14px; line-height:1.4;
  display:flex; align-items:flex-start; gap:10px; font-family:inherit;
  transition:border-color .12s, background .12s;
}
.witch-cbtn:hover:not(:disabled) { border-color:#c060f0; background:linear-gradient(135deg,#1a1028,#241438); }
.witch-cbtn:disabled { cursor:default; }
.witch-cbtn.wrong-flash { background:var(--red-bg) !important; border-color:var(--red-bd) !important; color:var(--red-text) !important; }
.witch-cltr { font-weight:600; min-width:18px; flex-shrink:0; color:#8a60a0; }

@keyframes witch-flicker {
  0%,95%,100% { opacity:1; }
  96% { opacity:.2; }
  97% { opacity:.9; }
  98% { opacity:.1; }
  99% { opacity:.8; }
}

/* Boss battle HUD */
.witch-boss-hud {
  background:rgba(10,5,18,0.9); border:1px solid #4a2a6a; border-radius:10px;

function prLoad() {
  try {
    var raw = localStorage.getItem(PR_KEY);
    if (!raw) return JSON.parse(JSON.stringify(PR_DEFAULTS));
    var saved = JSON.parse(raw);
    // Merge with defaults so new fields appear after updates
    var result = JSON.parse(JSON.stringify(PR_DEFAULTS));
    for (var k in saved) {
      if (k in result) {
        if (k === 'ironClassRuns' || k === 'ironClassBest' || k === 'ironClassMastery' || k === 'ironClassUpgrade') {
          for (var cls in saved[k]) { if (cls in result[k]) result[k][cls] = saved[k][cls]; }
        } else if (k === 'wishUnlockedClasses') {
          for (var cls in saved[k]) { result[k][cls] = result[k][cls] || saved[k][cls]; }
        } else {
          result[k] = saved[k];
        }
      }
    }
    return result;
  } catch(e) { return JSON.parse(JSON.stringify(PR_DEFAULTS)); }
}

function prMigrateAchievements(pr) {
  if (pr.ironTotalMasteryEarned >= 1) unlockAchievement('survivors_mastery');
  var masteryMap = pr.ironClassMastery || {};
  var baseClasses = ['knight','bomber','thief','rogue','paladin','monk','alchemist'];
  var allBaseMastered = baseClasses.length > 0 &&
    baseClasses.every(function(k){ return masteryMap[k]; });
  if (allBaseMastered) unlockAchievement('violet_sky');
  var allMastered = Object.keys(masteryMap).length > 0 &&
    Object.keys(masteryMap).every(function(k){ return masteryMap[k]; });
  if (allMastered) unlockAchievement('violet_sky_all');
}

  try { return JSON.parse(localStorage.getItem(CODEX_KEY) || '[]'); } catch(e) { return []; }

function codexSave(entries) {

}
function codexPushDeath(entry) {
  // entry: { question, correct, chosen, class, score, round, date }
  entry.starred = false;
  var entries = codexLoad();
  entries.unshift(entry); // newest first (among unstarred)
  // Trim: remove oldest non-starred entries until within limit
  var max = codexMax();
  if (entries.length > max) {
    for (var i = entries.length - 1; i >= 0 && entries.length > max; i--) {
      if (!entries[i].starred) entries.splice(i, 1);
    }
  }
  codexSave(entries);
}

function codexToggleStar(rawIndex) {
  var pr = prLoad();
  if (!pr.shopMoonCodex) return; // Lunar Codex required
  var entries = codexLoad();
  if (rawIndex < 0 || rawIndex >= entries.length) return;
  entries[rawIndex].starred = !entries[rawIndex].starred;
  codexSave(entries);
  checkJesterQuest1();
  goTo('ironcodex');

var ACHV_KEY = 'SELENA_achievements';

function achvLoad() {
  try {
    var raw = localStorage.getItem(ACHV_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}
function achvSaveState(state) {
  try { localStorage.setItem(ACHV_KEY, JSON.stringify(state)); } catch(e) {}
}
function achvIsUnlocked(id) {
  return !!achvLoad()[id];
}
// Unlock an achievement by id. No-op if already unlocked. Shows a toast on first unlock.
// Guard: prevent multiple 20-Moon awards when achievements unlock simultaneously in one tick
var _achvMoonBatchPending = false;

function unlockAchievement(id) {
  var state = achvLoad();
  if (state[id]) return false;
  state[id] = { unlockedAt: Date.now() };
  achvSaveState(state);
  // Only award 20 Moons once per synchronous batch (handles simultaneous unlocks)
  if (!_achvMoonBatchPending) {
    _achvMoonBatchPending = true;
    prRecord(function(pr){ pr.moons = (pr.moons || 0) + 20; });
    var _mc = document.getElementById('moonCount');
    if (_mc) _mc.textContent = (prLoad().moons || 0).toLocaleString();
    setTimeout(function() { _achvMoonBatchPending = false; }, 0);
  }
  var def = null;
  for (var i = 0; i < ACHIEVEMENTS.length; i++) { if (ACHIEVEMENTS[i].id === id) { def = ACHIEVEMENTS[i]; break; } }
  if (def) showAchievementToast(def);
  if (S.screen === 'achievements') render();
  return true;
}

// ── Toast notification (queued so simultaneous unlocks don't overlap) ──
var _achvToastQueue = [];
var _achvToastShowing = false;
function showAchievementToast(def) {
  _achvToastQueue.push(def);
  _processAchvToastQueue();
}
function _processAchvToastQueue() {
  if (_achvToastShowing || !_achvToastQueue.length) return;
  var container = document.getElementById('achvToastContainer');
  if (!container) return;
  var def = _achvToastQueue.shift();
  _achvToastShowing = true;
  var el = document.createElement('div');
  el.className = 'achv-toast';
  el.innerHTML =
    '<div class="achv-toast-icon">'+def.icon+'</div>'+
    '<div class="achv-toast-text">'+
      '<div class="achv-toast-label">🏆 Achievement Unlocked</div>'+
      '<div class="achv-toast-title">'+esc(def.title)+'</div>'+
    '</div>';
  container.appendChild(el);
  requestAnimationFrame(function() { el.classList.add('show'); });
  setTimeout(function() {
    el.classList.remove('show');
    setTimeout(function() {
      el.remove();
      _achvToastShowing = false;
      _processAchvToastQueue();
    }, 350);
  }, 3200);
}

/* ─────────────────────────────────────────────
   SAVE STATE — single global slot in localStorage
   Key: SELENA_save
   Stores: score, graveyard, shuffled queue, current position.
   Intentionally excludes: checkpoint history, eraser history.
───────────────────────────────────────────── */
var SAVE_KEY = 'SELENA_save';

function saveStateExists() {
  try { return !!localStorage.getItem(SAVE_KEY); } catch(e) { return false; }
}

function saveStateLoad() {
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function saveStateClear() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

function _doSave(silent) {
  if (S.ironMode) return;
  if (!S.shuffled || !S.shuffled.length) return;
  var shuffledSnap = S.shuffled.map(function(q) {
    var copy = {};
    for (var k in q) {
      if (k === '_gyEntry') continue;
      copy[k] = q[k];
    }
    if (q._gyEntry) copy._gyId = q._gyEntry._id;
    return copy;
  });
  var snap = {
    subject:           S.curSubject,
    redemption:        S.nmRedemption,
    score:             S.score,
    cur:               S.cur,
    done:              S.done,
    chosen:            S.chosen,
    missed:            JSON.parse(JSON.stringify(S.missed)),
    nmGraveyard:       JSON.parse(JSON.stringify(S.nmGraveyard)),
    nmGraveyardSeq:    S.nmGraveyardSeq,
    nmQueuedGraveyard: JSON.parse(JSON.stringify(S.nmQueuedGraveyard)),
    shuffled:          shuffledSnap,
    nmMindful:         S.nmMindful,
    nmCheckpoint:      S.nmCheckpoint,
    nmEraser:          S.nmEraser,
    scramble:          S.scramble,
    savedAt:           Date.now(),
  };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(snap)); } catch(e) {}
  if (!silent) showBanner('synced', '💾 Progress saved.', 3000);
}

function saveStateResume() {
  var snap = saveStateLoad();
  if (!snap) return;

  S.nmRedemption  = snap.redemption  || 'none';
  S.nmMindful     = snap.nmMindful   || false;
  S.nmCheckpoint  = snap.nmCheckpoint|| false;
  S.nmEraser      = snap.nmEraser    || false;
  S.scramble      = snap.scramble !== undefined ? snap.scramble : true;

  S.score         = snap.score || 0;
  S.cur           = snap.cur   || 0;
  S.done          = snap.done  || false;
  S.chosen        = snap.chosen !== undefined ? snap.chosen : null;
  S.missed        = snap.missed ? JSON.parse(JSON.stringify(snap.missed)) : [];

  S.nmGraveyard         = snap.nmGraveyard       ? JSON.parse(JSON.stringify(snap.nmGraveyard))       : [];
  S.nmGraveyardSeq      = snap.nmGraveyardSeq    || 0;
  S.nmQueuedGraveyard   = snap.nmQueuedGraveyard  ? JSON.parse(JSON.stringify(snap.nmQueuedGraveyard)) : [];

  S.shuffled = snap.shuffled ? JSON.parse(JSON.stringify(snap.shuffled)) : [];
  var gyById = {};
  for (var gi = 0; gi < S.nmGraveyard.length; gi++) gyById[S.nmGraveyard[gi]._id] = S.nmGraveyard[gi];
  for (var si = 0; si < S.shuffled.length; si++) {
    var sq = S.shuffled[si];
    if (sq && sq._gyId !== undefined) {
      var linked = gyById[sq._gyId];
      if (linked) sq._gyEntry = linked;
      delete sq._gyId;
    }
  }

  var curQ = S.shuffled[S.cur];
  S.nmIsGraveyardQ        = !!(curQ && curQ._gyEntry);
  S.nmGraveyardReturnInfo = S.nmIsGraveyardQ
    ? { prevAnswer: curQ._gyPrevAnswer, returnNum: curQ._gyReturnNum || 1 }
    : null;

  S.nmHistory            = [];
  S.nmCheckpointAt       = S.cur;
  S.nmCheckpointHistory  = [];
  S.nmCheckpointReturnAt = -1;
  S.nmBlockStartSnap     = nmSnapshot();
  S._resumeScoreBase     = S.score;

  if (S.nmMindfulTimer) { clearInterval(S.nmMindfulTimer); S.nmMindfulTimer = null; }
  S.nmMindfulCount = 0;

  S.ironMode   = false;
  S.curSubject = snap.subject;

  // ── Achievement per-session trackers (in-memory only, fresh on resume) ──
  S.sessionExited = false;
  S.nmJustUndidWrongAt = -1;
  S.nmWrongStreak = 0;
  S.nmLoopWrongCount = 0;

  // Clear save slot — consumed on resume
  saveStateClear();

  S.screen = 'quiz';
  render();
}

function shuf(arr) {
  var a = arr.slice();
  for (var i = a.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}
function esc(s) {

/* ─────────────────────────────────────────────
   SHEETS API v4 — fetch all rows from a spreadsheet
   sheets[] contains spreadsheet IDs (not URLs)
───────────────────────────────────────────── */

/* Extract spreadsheet ID from a full URL or bare ID */
function toSheetId(raw) {
  raw = raw.trim();
  var m = raw.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return m[1];
  if (/^[a-zA-Z0-9_-]{20,}$/.test(raw)) return raw;
  return null;
}

/* Fetch all rows from one spreadsheet (first sheet tab) via Sheets API v4 */
function fetchSpreadsheet(spreadsheetId) {
  var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + spreadsheetId +
            '/values/A:F?key=' + API_KEY;
  var controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
  var timer = controller ? setTimeout(function(){ controller.abort(); }, 8000) : null;
  var opts = controller ? { signal: controller.signal } : {};
  return fetch(url, opts)
    .then(function(res) {
      if (timer) clearTimeout(timer);
      return res.json();
    })
    .then(function(json) {
      if (json.error) throw new Error('Sheets API: ' + json.error.message);
      return json.values || [];
    })
    .catch(function(err) {
      if (timer) clearTimeout(timer);
      throw err;
    });
}

/* Convert raw 2D array rows to question objects */
function rowsToQuestions(rows, subjName) {
  var qs = [];
  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    var topic   = String(row[0]||'').trim();
    var qtext   = String(row[1]||'').trim();
    var correct = String(row[2]||'').trim();
    var w1      = String(row[3]||'').trim();
    var w2      = String(row[4]||'').trim();
    var w3      = String(row[5]||'').trim();
    if (!topic || !qtext || !correct) continue;
    if (topic.toLowerCase()==='topic' || topic.toLowerCase()==='subject topic') continue;
    var choices = [correct];
    if (w1) choices.push(w1);
    if (w2) choices.push(w2);
    if (w3) choices.push(w3);
    qs.push({ subj: subjName, topic: topic, question: qtext, choices: choices, answer: 0, rowIndex: qs.length });
  }
  return qs;
}


/* ─────────────────────────────────────────────
   SUBJECT SELECTION — LOAD & NAVIGATE
───────────────────────────────────────────── */
function selectSubject(subjName) {
  // Iron Man Mode: load all regular subjects then merge
  if (subjName === IRON_MAN.name) {
    var regularSubjects = DEFAULT_SUBJECTS.filter(function(s) { return s.name !== IRON_MAN.name; });
    S.loadingSubject = IRON_MAN.name;
    S.loadErrors[IRON_MAN.name] = null;
    S.screen = 'ironloading'; render();
    var remaining = regularSubjects.length;
    regularSubjects.forEach(function(subj) {
      fetchSubject(subj.name, function(err, qs) {
        if (!err && qs.length) S.loadedQ[subj.name] = qs;
        else delete S.loadedQ[subj.name];
        remaining--;
        if (remaining === 0) { S.loadingSubject = null; _buildIronMan(); }
      });
    });
    return;
  }
  if (S.loadedQ[subjName] && S.loadedQ[subjName].length) { _enterSubject(subjName); return; }
  S.loadingSubject = subjName;
  S.loadErrors[subjName] = null;
  S.screen = 'subjects'; render();
  fetchSubject(subjName, function(err, qs) {
    S.loadingSubject = null;
    if (err) { S.loadErrors[subjName] = err; render(); return; }
    if (!qs.length) { S.loadErrors[subjName] = 'No valid questions found. Check that columns A\u2013C are filled (Topic, Question, Correct Answer).'; render(); return; }
    S.loadedQ[subjName] = qs;
    S.loadErrors[subjName] = null;
    _enterSubject(subjName);
  });
}

function _buildIronMan() {
  var all = [];
  DEFAULT_SUBJECTS.forEach(function(s) {
    if (s.name !== IRON_MAN.name && S.loadedQ[s.name]) all = all.concat(S.loadedQ[s.name]);
  });
  if (!all.length) { S.loadErrors[IRON_MAN.name] = 'Could not load any subjects. Make sure each sheet is shared publicly.'; render(); return; }
  S.loadedQ[IRON_MAN.name] = all;
  _enterSubject(IRON_MAN.name);
}

function _enterSubject(subjName) {
  var qs = S.loadedQ[subjName] || [];
  S.curSubject = subjName;
  var seen = {};
  S.topics = [];
  for (var i = 0; i < qs.length; i++) {
    if (!seen[qs[i].topic]) { seen[qs[i].topic]=true; S.topics.push(qs[i].topic); }
  }
  S.checkedTopics = {};
  for (var i = 0; i < S.topics.length; i++) S.checkedTopics[S.topics[i]] = true;

    S.ironMode = true;
    S.screen = 'ironconfirm';

    S.screen = 'topics';
  }

}

  delete S.loadedQ[subjName];

}

/* ─────────────────────────────────────────────
   NORMAL MODE — SETTINGS & REDEMPTION HELPERS
───────────────────────────────────────────── */

// Deep-clone current quiz state for history/undo
function nmSnapshot() {
  return {
    cur: S.cur,
    score: S.score,
    done: S.done,
    chosen: S.chosen,
    missed: S.missed.slice(),
    shuffled: S.shuffled.slice(), // shallow — question objects are immutable
    nmGraveyard: JSON.parse(JSON.stringify(S.nmGraveyard)),
    nmGraveyardSeq: S.nmGraveyardSeq,
    nmQueuedGraveyard: JSON.parse(JSON.stringify(S.nmQueuedGraveyard)),
    nmCheckpointAt: S.nmCheckpointAt,
    nmCheckpointHistory: S.nmCheckpointHistory.map(function(s){ return JSON.parse(JSON.stringify(s)); }),
    nmCheckpointReturnAt: S.nmCheckpointReturnAt,
    nmIsGraveyardQ: S.nmIsGraveyardQ,
    nmGraveyardReturnInfo: S.nmGraveyardReturnInfo ? JSON.parse(JSON.stringify(S.nmGraveyardReturnInfo)) : null,
  };
}

// Restore quiz state from a snapshot
function nmRestore(snap) {
  S.cur = snap.cur;
  S.score = snap.score;
  S.done = snap.done;
  S.chosen = snap.chosen;
  S.missed = snap.missed.slice();
  S.shuffled = snap.shuffled.slice();
  S.nmGraveyard = JSON.parse(JSON.stringify(snap.nmGraveyard));
  S.nmGraveyardSeq = snap.nmGraveyardSeq || 0;
  S.nmQueuedGraveyard = JSON.parse(JSON.stringify(snap.nmQueuedGraveyard));
  // S.nmGraveyard above is a fresh JSON clone — its entry objects are NOT the
  // same references that S.shuffled's already-injected graveyard-return
  // questions point to via _gyEntry (those still point at the pre-restore
  // objects). Re-link every _gyEntry in the restored S.shuffled to the new
  // canonical entry (matched by stable _id), so reference equality (===)
  // keeps working for resolving, re-queuing, and undoing graveyard returns.
  var gyById = {};
  for (var gi = 0; gi < S.nmGraveyard.length; gi++) gyById[S.nmGraveyard[gi]._id] = S.nmGraveyard[gi];
  for (var si = 0; si < S.shuffled.length; si++) {
    var sq = S.shuffled[si];
    if (sq && sq._gyEntry && sq._gyEntry._id !== undefined) {
      var relinked = gyById[sq._gyEntry._id];
      if (relinked) sq._gyEntry = relinked;
    }
  }
  S.nmCheckpointAt = snap.nmCheckpointAt;
  if (snap.nmCheckpointHistory) S.nmCheckpointHistory = snap.nmCheckpointHistory.map(function(s){ return JSON.parse(JSON.stringify(s)); });
  if (snap.nmCheckpointReturnAt !== undefined) S.nmCheckpointReturnAt = snap.nmCheckpointReturnAt;
  S.nmIsGraveyardQ = snap.nmIsGraveyardQ;
  S.nmGraveyardReturnInfo = snap.nmGraveyardReturnInfo ? JSON.parse(JSON.stringify(snap.nmGraveyardReturnInfo)) : null;
}

// Add a question to the graveyard (called on wrong answer in redemption mode)
function nmAddToGraveyard(q, prevAnswerText) {
  var mode = S.nmRedemption;
  if (mode === 'none') return;
  // Build graveyard entry
  var entry = {
    _id: ++S.nmGraveyardSeq,    // stable identity — used to re-link _gyEntry refs in S.shuffled after nmRestore
    q: q,                       // original question object
    prevAnswer: prevAnswerText,  // text of the wrong answer (first wrong answer)
    returnCount: 0,             // how many times it has returned
    removed: false,             // true when fully cleared from graveyard
    // Vampire: track each wrong answer's actual choice index so we can eliminate it next return
    vampireWrongAnswers: [],    // array of choice indices (q.choices[i]) picked wrong each time
  };
  if (mode === 'mummy') entry.mummyReturnsLeft = 10;
  S.nmGraveyard.push(entry);
}

// For a given graveyard entry, build a question object with vampire choice reduction
// Each previously-chosen wrong answer index gets removed from the display order
function nmBuildVampireQ(entry) {
  var q = entry.q;
  var copy = {};
  for (var k in q) copy[k] = q[k];
  var fullOrder = q._order ? q._order.slice() : [];
  // Remove any choice index that was previously answered wrong
  var eliminated = entry.vampireWrongAnswers || [];
  var remaining = fullOrder.filter(function(choiceIdx) {
    return eliminated.indexOf(choiceIdx) === -1;
  });
  // Safety: always keep the correct answer
  if (remaining.indexOf(q.answer) === -1) remaining.push(q.answer);
  copy._order = remaining;
  return copy;
}

// Queue graveyard questions into future positions of S.shuffled
function nmQueueGraveyardReturn(entry, preLen) {
  var mode = S.nmRedemption;
  // Use preLen (pre-injection length) for fair distribution across multiple entries
  var baseLen = preLen || S.shuffled.length;
  var remaining = baseLen - S.cur - 1;
  var insertAt;
  if (remaining <= 0) {
    // No future slot left in the current run (e.g. wrong answer on the final
    // question) — extend the run by appending to the very end instead of
    // silently dropping the entry.
    insertAt = S.shuffled.length;
  } else {
    // Insert at a random position in the ORIGINAL future range (not skewed by prior injections)
    insertAt = S.cur + 1 + Math.floor(Math.random() * remaining);
  }
  // Build the question to inject
  var qToInject;
  if (mode === 'vampire') {
    // Build question with all previously-wrong answers eliminated
    // (vampireWrongAnswers is already updated in pick() when wrong answer was given)
    qToInject = nmBuildVampireQ(entry);
  } else {
    // For ghost/zombie/mummy: return the original question
    qToInject = entry.q;
  }
  // Tag the question with graveyard metadata
  entry.returnCount++; // track how many times this entry has been queued to return
  var tagged = {};
  for (var k in qToInject) tagged[k] = qToInject[k];
  tagged._gyEntry = entry; // reference back to graveyard entry
  tagged._gyPrevAnswer = entry.prevAnswer;
  tagged._gyReturnNum = entry.returnCount; // which return this is (1-based)
  S.shuffled.splice(insertAt, 0, tagged);
}

// Called after every correct/wrong answer — inject pending GY returns
function nmProcessGraveyard() {
  var mode = S.nmRedemption;
  if (mode === 'none') return;
  // Snapshot the pre-injection length so multi-entry inserts don't skew toward the back
  var preLen = S.shuffled.length;
  // Process queued returns
  for (var i = 0; i < S.nmGraveyard.length; i++) {
    var entry = S.nmGraveyard[i];
    if (entry.removed) continue;
    // Determine if this entry needs to be queued
    var needsQueue = false;
    if (mode === 'ghost' && entry.returnCount === 0) needsQueue = true;
    if (mode === 'zombie') needsQueue = true; // always until answered correctly
    if (mode === 'vampire') needsQueue = true; // returns until answered correctly (removed flag handles termination)
    if (mode === 'mummy' && entry.mummyReturnsLeft > 0) needsQueue = true;
    // Only queue if not already queued in shuffled
    if (needsQueue) {
      var alreadyQueued = false;
      for (var j = S.cur + 1; j < S.shuffled.length; j++) {
        if (S.shuffled[j]._gyEntry === entry) { alreadyQueued = true; break; }
      }
      if (!alreadyQueued) nmQueueGraveyardReturn(entry, preLen);
    }
  }
}

// Eraser: undo last answer
// Case 1: question not yet answered (S.done === false) → go back to previous question unanswered
// Case 2: question already answered (S.done === true)  → reset current question to unanswered
function nmEraseOne() {
  if (!S.nmEraser) return;

  // Cancel any mindful timer
  if (S.nmMindfulTimer) { clearInterval(S.nmMindfulTimer); S.nmMindfulTimer = null; S.nmMindfulCount = 0; }

  if (S.done) {
    // ── Case 2: current question is answered — unregister its effects, reset to unanswered ──
    var q = S.shuffled[S.cur];
    var wasCorrect = (S.chosen === q.answer);

    if (wasCorrect) {
      // Unregister score
      S.score--;
      // Unregister GY resolution and returnCount if this was a graveyard return
      if (S.nmRedemption !== 'none' && q._gyEntry) {
        q._gyEntry.removed = false;
        if (q._gyEntry.returnCount > 0) q._gyEntry.returnCount--;
      }
    } else {
      // ── Achievement tracking: remember we just undid a WRONG answer here ──
      S.nmJustUndidWrongAt = S.cur;
      // Unregister missed entry
      S.missed.pop();
      // Unregister graveyard entry if redemption active
      if (S.nmRedemption !== 'none' && S.nmGraveyard.length > 0) {
        if (!q._gyEntry) {
          // Was a fresh wrong answer — pop the graveyard entry and remove its injection from S.shuffled
          S.nmGraveyard.pop();
          // Remove any future injected copy whose _gyEntry is no longer in nmGraveyard
          S.shuffled = S.shuffled.filter(function(sq, idx) {
            if (idx <= S.cur) return true;
            if (!sq._gyEntry) return true;
            return S.nmGraveyard.indexOf(sq._gyEntry) !== -1;
          });
        } else {
          // Was a graveyard return question — undo the effect applied on wrong answer
          var gyE = q._gyEntry;
          var mode = S.nmRedemption;
          if (mode === 'vampire' && gyE.vampireWrongAnswers.length > 0) {
            gyE.vampireWrongAnswers.pop();
          } else if (mode === 'mummy') {
            gyE.mummyReturnsLeft++;
            gyE.removed = false;
          } else if (mode === 'ghost') {
            // Ghost marks removed=true on ANY answer (right or wrong) since it
            // only returns once — undoing the answer must clear that flag too.
            gyE.removed = false;
          }
          // Decrement returnCount — this return is being undone (restores narrative line accuracy)
          if (gyE.returnCount > 0) gyE.returnCount--;
        }
        // Remove any future injection of this question that was queued as a result
        // (find injected GY returns added after S.cur and remove the most recently added)
        if (!q._gyEntry) {
          // Fresh wrong answer: remove the queued return for the entry we just popped
          // Since we popped nmGraveyard, find the entry that would have been queued
          // The simplest safe approach: scan shuffled for a _gyEntry that no longer exists in nmGraveyard
          S.shuffled = S.shuffled.filter(function(sq, idx) {
            if (idx <= S.cur) return true;
            if (!sq._gyEntry) return true;
            // Keep if the entry is still in nmGraveyard
            return S.nmGraveyard.indexOf(sq._gyEntry) !== -1;
          });
        } else {
          // GY return wrong answer: remove the re-queued return for this entry from future positions
          // Remove the LAST occurrence of this _gyEntry in future shuffled slots
          for (var ri = S.shuffled.length - 1; ri > S.cur; ri--) {
            if (S.shuffled[ri]._gyEntry === q._gyEntry) {
              S.shuffled.splice(ri, 1);
              break;
            }
          }
        }
      }
    }

    // Reset current question to unanswered
    S.done = false;
    S.chosen = null;
    S.nmIsGraveyardQ = !!(q._gyEntry);
    S.nmGraveyardReturnInfo = q._gyEntry ? { prevAnswer: q._gyPrevAnswer, returnNum: q._gyReturnNum || 1 } : null;

  } else {
    // ── Case 1: current question not yet answered — go back one, or back to checkpoint ──
    if (S.cur === 0) return; // nothing to go back to

    // If current position is at or past the first post-checkpoint question,
    // and we're stepping back TO that boundary, return to the checkpoint screen
    if (S.nmCheckpoint && S.nmCheckpointReturnAt >= 0 && S.cur === S.nmCheckpointReturnAt) {
      // Undo the Continue: step back to last question of the completed block
      S.cur--;
      S.done = true;  // that question was answered (it triggered the checkpoint)
      S.chosen = null;
      S.nmCheckpointAt = S.nmCheckpointHistory.length > 0
        ? S.nmCheckpointHistory[S.nmCheckpointHistory.length - 1].blockStart
        : 0;
      // nmCheckpointReturnAt stays set — if they Continue again and undo again, it still works
      S.screen = 'nmcheckpoint';
      render(); return;
    }

    S.cur--;
    var prevQ = S.shuffled[S.cur];
    var prevWasCorrect = (S.chosen !== null && S.chosen === prevQ.answer);
    // Note: S.chosen/done reflect the PREVIOUS answer state since we haven't answered current yet
    // Actually we need to check what the previous answer WAS — it's stored in S.chosen from last pick()
    // But S.chosen was reset when we advanced. We need to detect from score/missed what happened.
    // Reliable approach: check if prevQ._gyEntry and graveyard state, or use missed array end.

    // Unregister previous question's effects:
    // Check missed array — if last missed entry matches prevQ, it was wrong
    var lastMissed = S.missed.length > 0 ? S.missed[S.missed.length - 1] : null;
    var prevWasWrong = lastMissed && lastMissed.q === prevQ.question;

    if (prevWasWrong) {
      S.missed.pop();
      if (S.nmRedemption !== 'none' && S.nmGraveyard.length > 0) {
        if (!prevQ._gyEntry) {
          S.nmGraveyard.pop();
          S.shuffled = S.shuffled.filter(function(sq, idx) {
            if (idx <= S.cur) return true;
            if (!sq._gyEntry) return true;
            return S.nmGraveyard.indexOf(sq._gyEntry) !== -1;
          });
        } else {
          var gyE2 = prevQ._gyEntry;
          var mode2 = S.nmRedemption;
          if (mode2 === 'vampire' && gyE2.vampireWrongAnswers.length > 0) {
            gyE2.vampireWrongAnswers.pop();
          } else if (mode2 === 'mummy') {
            gyE2.mummyReturnsLeft++;
            gyE2.removed = false;
          } else if (mode2 === 'ghost') {
            gyE2.removed = false;
          }
          // Decrement returnCount — this return is being undone
          if (gyE2.returnCount > 0) gyE2.returnCount--;
          for (var ri2 = S.shuffled.length - 1; ri2 > S.cur; ri2--) {
            if (S.shuffled[ri2]._gyEntry === prevQ._gyEntry) {
              S.shuffled.splice(ri2, 1);
              break;
            }
          }
        }
      }
    } else {
      // Was correct — unregister score
      // Also unregister correct-answer graveyard resolution if it was a GY return

        if (S.ironConsumables.shield > 0) types++;
        if (S.ironConsumables.skip   > 0) types++;
        if (S.ironConsumables.bomb   > 0) types++;
        if (types > 0) {
          S.ironAlchemistAdrenaline += types;
          if (S.ironAlchemistAdrenaline >= 10) {
            S.ironAlchemistAdrenaline -= 10;
            S.score++;
            checkIronMastery(); checkIronUpgrade();

          } else {
            showBanner('synced', '⚗️ Adrenaline: +'+types+' stacks ('+S.ironAlchemistAdrenaline+'/10)', 1800);

    var cadence = S.ironRewardCadence || 10;
    if (S.ironRound % cadence === 0 && S.cur + 1 < S.shuffled.length) {
      S.ironRewardOptions = pickIronRewardOptions();
