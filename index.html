var _jester = {
  beatIdx: 0,
  inQuest: false,      // true once player accepted quest 1
  questBeatIdx: 0,     // progress through JESTER_QUEST_SCRIPT
  inQuest2: false,     // true once quest 1 completed and quest 2 started
  quest2BeatIdx: 0,    // progress through JESTER_QUEST2_SCRIPT
  inQuest3: false,     // true once quest 2 completed and quest 3 started
  quest3BeatIdx: 0,    // progress through JESTER_QUEST3_SCRIPT
  epilogueBeatIdx: 0   // progress through JESTER_EPILOGUE_SCRIPT
};

function jesterOpen() {
  document.getElementById('jester-overlay').classList.add('active');
  _jesterRender();
}

function jesterClose() {
  document.getElementById('jester-overlay').classList.remove('active');
}

function _jesterRender() {
  var textEl    = document.getElementById('jester-text');
  var primary   = document.getElementById('jester-btn-primary');
  var secondary = document.getElementById('jester-btn-secondary');
  var costLbl   = document.getElementById('jester-cost-label');

  costLbl.textContent = '';
  secondary.textContent = 'Leave';
  secondary.style.display = '';
  secondary.onclick = jesterClose;
  primary.disabled = false;
  primary.style.opacity = '1';
  primary.onclick = null;

  // Helper: build paragraph HTML from lines array
  function buildLines(lines) {
    return lines.map(function(l) {
      return '<p style="margin:0 0 10px">\u201c' + esc(l) + '\u201d</p>';
    }).join('');
  }

  // ── Quest 3 complete: Epilogue script ──
  if (achvIsUnlocked('third_quest') && _jester.inQuest3) {
    var ep = JESTER_EPILOGUE_SCRIPT[_jester.epilogueBeatIdx || 0];
    if (!ep) {
      // All epilogue beats exhausted — Coming Soon
      textEl.innerHTML = '<p style="margin:0 0 10px">\u201cThat’s all.\u201d</p>';
      primary.textContent = 'Coming Soon\u2026';
      primary.disabled = true;
      primary.style.opacity = '0.5';
      return;
    }
    textEl.innerHTML = buildLines(ep.lines);
    primary.textContent = 'Continue \u2192';
    primary.onclick = function() {
      _jester.epilogueBeatIdx = (_jester.epilogueBeatIdx || 0) + 1;
      _jesterRender();
    };
    return;
  }

  // ── Quest 2 complete: transition into Quest 3 ──
  if (achvIsUnlocked('second_quest') && _jester.inQuest2 && !_jester.inQuest3) {
    _jester.inQuest3 = true;
    _jester.quest3BeatIdx = 0;
    _jesterRender();
    return;
  }

  // ── Quest 3 in progress ──
  if (_jester.inQuest3) {
    var q3beat = JESTER_QUEST3_SCRIPT[_jester.quest3BeatIdx];
    if (!q3beat) return;
    textEl.innerHTML = buildLines(q3beat.lines);

    if (q3beat.quest3Prompt) {
      var pr3 = prLoad();
      var dupesDone = pr3.jesterQuest3DupeCount || 0;
      var done3 = achvIsUnlocked('third_quest');
      checkJesterQuest3();
      costLbl.textContent = done3 ? '\u2705 Quest complete!' : '\u23f3 ' + dupesDone + ' / 5 duplicates pulled';
      if (!done3) {
        primary.textContent = 'Waiting\u2026 (' + (5 - dupesDone) + ' left)';
        primary.disabled = true;
        primary.style.opacity = '0.5';
      } else {
        primary.textContent = 'Continue \u2192';
        primary.onclick = function() { _jesterRender(); };
      }
    } else {
      primary.textContent = 'Continue \u2192';
      primary.onclick = function() {
        _jester.quest3BeatIdx++;
        _jesterRender();
      };
    }
    return;
  }

  // ── Quest 2 in progress ──
  if (_jester.inQuest2) {
    var q2beat = JESTER_QUEST2_SCRIPT[_jester.quest2BeatIdx];
    if (!q2beat) return;
    textEl.innerHTML = buildLines(q2beat.lines);

    if (q2beat.quest2Prompt) {
      var done2 = achvIsUnlocked('second_quest');
      costLbl.textContent = done2 ? '\u2705 Quest complete!' : '\u23f3 Use 5 consumables on one question';
      if (!done2) {
        primary.textContent = 'Waiting\u2026';
        primary.disabled = true;
        primary.style.opacity = '0.5';
      } else {
        primary.textContent = 'Continue \u2192';
        primary.onclick = function() { _jesterRender(); };
      }
    } else {
      primary.textContent = 'Continue \u2192';
      primary.onclick = function() {
        _jester.quest2BeatIdx++;
        _jesterRender();
      };
    }
    return;
  }

  // ── Quest 1 complete: transition into Quest 2 ──
  if (achvIsUnlocked('first_quest') && _jester.inQuest && !_jester.inQuest2) {
    _jester.inQuest2 = true;
    _jester.quest2BeatIdx = 0;
    _jesterRender();
    return;
  }

  // ── Quest 1 in progress ──
  if (_jester.inQuest) {
    var q1beat = JESTER_QUEST_SCRIPT[_jester.questBeatIdx];
    if (!q1beat) return;
    textEl.innerHTML = buildLines(q1beat.lines);

    if (q1beat.questPrompt) {
      var pr = prLoad();
      var found = pr.jesterQuest1Stars || [];
      var remaining = 3 - found.length;
      costLbl.textContent = '\u23f3 ' + found.length + ' / 3 deaths starred';
      if (remaining > 0) {
        primary.textContent = 'Waiting\u2026 (' + remaining + ' left)';
        primary.disabled = true;
        primary.style.opacity = '0.5';
      } else {
        primary.textContent = 'Continue \u2192';
        primary.onclick = function() {
          _jester.inQuest2 = true;
          _jester.quest2BeatIdx = 0;
          _jesterRender();
        };
      }
    } else {
      primary.textContent = 'Continue \u2192';
      primary.onclick = function() {
        _jester.questBeatIdx++;
        _jesterRender();
      };
    }
    return;
  }

  // ── Main script ──
  var beat = JESTER_SCRIPT[_jester.beatIdx];
  if (!beat) return;

  var paragraphs = beat.lines.map(function(line) {
    var safe = beat.html ? line : esc(line);
    return '<p style="margin:0 0 10px">\u201c' + safe + '\u201d</p>';
  }).join('');
  textEl.innerHTML = paragraphs;

  if (beat.askQuest) {
    primary.textContent = 'Continue \u2192';
    primary.onclick = function() {
      _jester.inQuest = true;
      _jester.questBeatIdx = 0;
      _jesterRender();
    };
  } else {
    primary.textContent = 'Continue \u2192';
    primary.onclick = function() {
      _jester.beatIdx++;
      _jesterRender();
    };
  }
}

function jesterOpenOrReturn() {
  unlockAchievement('story_of_the_prisoner');
  // Sync in-memory quest state with achievement flags on re-open
  if (achvIsUnlocked('first_quest') && !_jester.inQuest) {
    _jester.inQuest = true;
  }
  if (achvIsUnlocked('second_quest') && !_jester.inQuest2) {
    _jester.inQuest2 = true;
    _jester.quest2BeatIdx = JESTER_QUEST2_SCRIPT.length - 1;
  }
  if (achvIsUnlocked('third_quest') && !_jester.inQuest3) {
    _jester.inQuest3 = true;
    _jester.quest3BeatIdx = JESTER_QUEST3_SCRIPT.length - 1;
    _jester.epilogueBeatIdx = JESTER_EPILOGUE_SCRIPT.length; // fast-forward past epilogue on re-open
  }
  jesterOpen();
}

/* ── Custom confirm dialog (replaces native window.confirm for WebView compat) ── */
function selenaAlert(title, body) {
  var overlay   = document.getElementById('selena-modal-overlay');
  var msgEl     = document.getElementById('selena-modal-msg');
  var okBtn     = document.getElementById('selena-modal-ok');
  var cancelBtn = document.getElementById('selena-modal-cancel');
  msgEl.innerHTML = '<strong style="display:block;margin-bottom:6px;font-size:15px">'+esc(title)+'</strong><span style="font-size:13px;color:var(--muted)">'+esc(body)+'</span>';
  cancelBtn.style.display = 'none';
  okBtn.textContent = 'OK';
  overlay.classList.add('active');
  function cleanup() {
    overlay.classList.remove('active');
    cancelBtn.style.display = '';
    msgEl.innerHTML = '';
    okBtn.textContent = 'OK';
    okBtn.removeEventListener('click', handleOk);
    overlay.removeEventListener('click', handleOk);
  }
  function handleOk() { cleanup(); }
  okBtn.addEventListener('click', handleOk);
  overlay.addEventListener('click', function(e){ if (e.target === overlay) handleOk(); });
}

function selenaConfirm(msg, onOk, onCancel) {
  var overlay = document.getElementById('selena-modal-overlay');
  var msgEl   = document.getElementById('selena-modal-msg');
  var okBtn   = document.getElementById('selena-modal-ok');
  var cancelBtn = document.getElementById('selena-modal-cancel');
  msgEl.textContent = msg;
  overlay.classList.add('active');
  function cleanup() {
    overlay.classList.remove('active');
    okBtn.removeEventListener('click', handleOk);
    cancelBtn.removeEventListener('click', handleCancel);
    overlay.removeEventListener('click', handleOverlay);
  }
  function handleOk()      { cleanup(); if (onOk)     onOk(); }
  function handleCancel()  { cleanup(); if (onCancel) onCancel(); }
  function handleOverlay(e){ if (e.target === overlay) handleCancel(); }
  okBtn.addEventListener('click', handleOk);
  cancelBtn.addEventListener('click', handleCancel);
  overlay.addEventListener('click', handleOverlay);
}

/* ── Raw-HTML variant of selenaAlert (content is pre-built HTML, not escaped) ── */
function selenaAlertHTML(title, bodyHtml) {
  var overlay   = document.getElementById('selena-modal-overlay');
  var msgEl     = document.getElementById('selena-modal-msg');
  var okBtn     = document.getElementById('selena-modal-ok');
  var cancelBtn = document.getElementById('selena-modal-cancel');
  msgEl.innerHTML = '<strong style="display:block;margin-bottom:8px;font-size:15px">'+esc(title)+'</strong><div style="font-size:13px;color:var(--muted);text-align:left">'+bodyHtml+'</div>';
  cancelBtn.style.display = 'none';
  okBtn.textContent = 'OK';
  overlay.classList.add('active');
  function cleanup() {
    overlay.classList.remove('active');
    cancelBtn.style.display = '';
    msgEl.innerHTML = '';
    okBtn.textContent = 'OK';
    okBtn.removeEventListener('click', handleOk);
    overlay.removeEventListener('click', handleOk);
  }
  function handleOk() { cleanup(); }
  okBtn.addEventListener('click', handleOk);
  overlay.addEventListener('click', function(e){ if (e.target === overlay) handleOk(); });
}

/* ── Wish on the Sky (gacha) ── */
function wishRoll() {
  var r = Math.random() * 100;
  var acc = 0;
  for (var i = 0; i < WISH_ODDS.length; i++) {
    acc += WISH_ODDS[i].weight;
    if (r < acc) return WISH_ODDS[i];
  }
  return WISH_ODDS[WISH_ODDS.length - 1];
}

function wishOnce(pr, targetKey) {
  var roll = wishRoll();
  if (roll.type === 'unlock') {
    pr.wishUnlockedClasses = pr.wishUnlockedClasses || {};
    if (isIronClassUnlocked(targetKey, pr)) {
      pr.moons += 100;
      if (_jester.inQuest3 && !achvIsUnlocked('third_quest')) {
        pr.jesterQuest3DupeCount = (pr.jesterQuest3DupeCount || 0) + 1;
      }
      return { kind: 'dupe', moons: 100 };
    }
    pr.wishUnlockedClasses[targetKey] = true;
    return { kind: 'unlock' };
  }
  pr.moons += roll.amount;
  return { kind: 'moons', amount: roll.amount };
}

function wishPull(times) {
  var targetKey = getWishTargetClass();
  if (!isWishEnabledToday()) return;
  var pr = prLoad();
  var cost = (times === 1) ? 10 : 100;
  if ((pr.moons || 0) < cost) return;
  pr.moons -= cost;
  pr.moonsSpent = (pr.moonsSpent || 0) + cost;
  if (pr.moonsSpent >= 2500) unlockAchievement('shopping_spree');
  var n = (times === 1) ? 1 : 10;
  pr.totalWishes = (pr.totalWishes || 0) + n;
  if (pr.totalWishes >= 300) unlockAchievement('stargazer');
  var results = [];
  for (var i = 0; i < n; i++) results.push(wishOnce(pr, targetKey));
  var granted = results.filter(function(r){ return r.kind === 'unlock' || r.kind === 'dupe'; }).length;
  if (granted > 0) pr.wishesGranted = (pr.wishesGranted || 0) + granted;
  prSave(pr);
  render();
  wishShowResults(results, targetKey);
}

function wishShowResults(results, targetKey) {
  var totalMoons = 0, unlocks = 0, dupes = 0;
  results.forEach(function(r) {
    if (r.kind === 'moons') totalMoons += r.amount;
    else if (r.kind === 'unlock') unlocks++;
    else if (r.kind === 'dupe') { totalMoons += r.moons; dupes++; }
  });
  var clsName = esc(IRON_CLASSES[targetKey].name);
  var lines = results.map(function(r, i) {
    if (r.kind === 'unlock') return '<div>'+(i+1)+'. ⭐ <strong style="color:var(--gold)">Unlocked '+clsName+'!</strong></div>';
    if (r.kind === 'dupe')   return '<div>'+(i+1)+'. 🌟 Duplicate — +100 Moons</div>';
    return '<div>'+(i+1)+'. 🌙 +'+r.amount+' Moons</div>';
  }).join('');
  var title = unlocks > 0 ? '✨ A Wish Came True!' : '🌌 Wish Results';
  var summaryBits = ['Gained 🌙 ' + totalMoons + ' Moons'];
  if (unlocks)  summaryBits.push('Unlocked ' + clsName + ' ×' + unlocks);
  if (dupes)    summaryBits.push(dupes + ' duplicate' + (dupes !== 1 ? 's' : ''));
  var body = lines + '<div style="margin-top:10px;font-weight:700;color:var(--text)">' + summaryBits.join(' · ') + '</div>';
  selenaAlertHTML(title, body);
}

function wishShowOdds() {
  var targetKey = getWishTargetClass();
  var rows = WISH_ODDS.map(function(o) {
    var label = (o.type === 'unlock') ? 'Unlock ' + esc(IRON_CLASSES[targetKey].name) + ' (100 Moons if already unlocked)' : o.label;
    return '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bd)">' +

}

function shopBuy(item) {
  var pr = prLoad();
  var costs = { violet: 50, forge: 200, will: 50, maiden: 100, startShield: 20, startSkip: 10, startBomb: 10, ironcodex: 500, mooncodex: 500 };
  var cost = costs[item];
  if ((pr.moons || 0) < cost) return;
  pr.moons -= cost;
  pr.moonsSpent = (pr.moonsSpent || 0) + cost;
  if (pr.moonsSpent >= 2500) unlockAchievement('shopping_spree');
  if (item === 'violet')  { pr.shopVioletSky  = true; }
  if (item === 'forge')   { pr.shopMoonForge  = true; }
  if (item === 'will')    { pr.shopIronWill   = true; pr.ironMaxBonus = (pr.ironMaxBonus || 0) + 1; }
  if (item === 'maiden')  { pr.shopIronMaiden = true; pr.ironMaxBonus = (pr.ironMaxBonus || 0) + 1; }
  if (item === 'startShield') { pr.shopStartShield = true; pr.starterConsumablesBought = (pr.starterConsumablesBought || 0) + 1; }
  if (item === 'startSkip')   { pr.shopStartSkip   = true; pr.starterConsumablesBought = (pr.starterConsumablesBought || 0) + 1; }
  if (item === 'startBomb')   { pr.shopStartBomb   = true; pr.starterConsumablesBought = (pr.starterConsumablesBought || 0) + 1; }
  if (item === 'ironcodex')   { pr.shopIronCodex   = true; }
  if (item === 'mooncodex')   { if (!pr.shopIronCodex) { pr.moons += cost; prSave(pr); return; } pr.shopMoonCodex = true; }
  prSave(pr);
  // If violet was just bought, cycle to it immediately
  if (item === 'violet') applyTheme('violet');
  render();
}

function screenAchievements() {
  var state = achvLoad();
  var pr = prLoad();
  prMigrateAchievements(pr);
  var unlockedCount = ACHIEVEMENTS.filter(function(a){ return !!state[a.id]; }).length;

  var catIcons = { 'Study Mode':'📖', 'Redemption':'👻', 'Iron Man':'⚔️', 'Class':'🎭', 'Misc':'🌙' };
  var cats = [];
  ACHIEVEMENTS.forEach(function(a){ if (cats.indexOf(a.cat) === -1) cats.push(a.cat); });

  function progressBar(cur, max) {
    var pct = Math.min(100, Math.round((cur / max) * 100));
    return '<div style="margin-top:5px;">'+
      '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:3px;">'+
        '<span>Progress</span><span>'+cur+' / '+max+'</span>'+
      '</div>'+
      '<div style="height:5px;border-radius:3px;background:var(--border);overflow:hidden;">'+
        '<div style="height:100%;width:'+pct+'%;background:var(--gold);border-radius:3px;transition:width .3s;"></div>'+
      '</div>'+
    '</div>';
  }

  var sectionsHtml = cats.map(function(cat) {
    var items = ACHIEVEMENTS.filter(function(a){ return a.cat === cat; });
    var cardsHtml = items.map(function(a) {
      var unlocked = !!state[a.id];
      var isHidden = a.secret && !unlocked;
      var title = a.title;
      var desc  = isHidden ? '???' : a.desc;
      var dateHtml = '';
      if (unlocked && state[a.id].unlockedAt) {
        dateHtml = '<div class="achv-card-date">Unlocked '+new Date(state[a.id].unlockedAt).toLocaleDateString()+'</div>';
      }
      var progressHtml = '';
      if (!unlocked) {
        if (a.id === 'all_rounder') {
          var subjectsDone = (pr.normalSubjectsCompleted || []).length;
          progressHtml = progressBar(subjectsDone, 6);
        } else if (a.id === 'violet_sky') {
          var masteryMap = pr.ironClassMastery || {};
          var baseClasses = ['knight','bomber','thief','rogue','paladin','monk','alchemist'];
          var masteredCount = baseClasses.filter(function(k){ return masteryMap[k]; }).length;
          progressHtml = progressBar(masteredCount, baseClasses.length);
        } else if (a.id === 'violet_sky_all') {
          var masteryMap = pr.ironClassMastery || {};
          var totalClasses = Object.keys(masteryMap).length || 1;
          var masteredCount = Object.keys(masteryMap).filter(function(k){ return masteryMap[k]; }).length;
          progressHtml = progressBar(masteredCount, totalClasses);
        }
      }
      return '<div class="achv-card'+(unlocked ? ' unlocked' : ' locked')+'">'+
        '<div class="achv-card-icon">'+(unlocked ? a.icon : '🔒')+'</div>'+
        '<div class="achv-card-body">'+
          '<div class="achv-card-title">'+esc(title)+'</div>'+
          '<div class="achv-card-desc">'+esc(desc)+'</div>'+
          progressHtml+
          dateHtml+
        '</div>'+
      '</div>';
    }).join('');
    return '<div class="pr-section-title">'+(catIcons[cat]||'🏆')+' '+esc(cat)+'</div>'+
      '<div class="achv-grid">'+cardsHtml+'</div>';
  }).join('');

  return '<div class="breadcrumb">'+
      '<span onclick="goTo(\'home\')">Home</span>'+
      '<span class="sep">/</span>'+
      '<span class="cur">Achievement Library</span>'+
    '</div>'+
    '<h1>Achievement Library</h1>'+
    '<p class="sub">'+unlockedCount+' / '+ACHIEVEMENTS.length+' unlocked</p>'+
    sectionsHtml+
    '<div class="brow" style="margin-top:16px"><button class="btn" onclick="goTo(\'home\')">← Back to Home</button></div>';
}

// Generates randomised glitch rects, scanlines, text fragments into #witch-bg.

var _witchBgInterval = null;

function _witchBuildBg() {
  var bg = document.getElementById('witch-bg');
  if (!bg) return;
  bg.innerHTML = _witchBgHTML(_witch.atmosLevel);
}

function _witchBgHTML(level) {
  if (level === 0) return '';
  var html = '';
  var W = window.innerWidth, H = window.innerHeight;

  // ── Scanlines (1–3 depending on level) ──
  var scanCount = level >= 3 ? 3 : (level >= 2 ? 2 : 1);
  var scanColors = ['rgba(180,60,220,0.25)','rgba(220,60,60,0.2)','rgba(100,60,200,0.18)'];
  for (var s = 0; s < scanCount; s++) {
    var sdur = (2.8 + Math.random() * 2).toFixed(1);
    var sdel = (Math.random() * 3).toFixed(1);
    var sc   = scanColors[s % scanColors.length];
    html += '<div class="wg-scan" style="background:'+sc+';--sdur:'+sdur+'s;--sdelay:'+sdel+'s"></div>';
  }

  // ── Blinking rectangles ──
  var rectCount = level === 1 ? 4 : (level === 2 ? 8 : (level === 3 ? 14 : 20));
  var rectPalette = [
    { c:'rgba(180,60,220,', b:'#7c3a8a' },   // violet
    { c:'rgba(220,40,40,',  b:'#8a2020' },   // red
    { c:'rgba(100,60,200,', b:'#4a2a8a' },   // deep purple
    { c:'rgba(220,120,20,', b:'#7a5010' },   // amber (breach only)
  ];
  for (var r = 0; r < rectCount; r++) {
    var x = Math.floor(Math.random() * (W - 60));
    var y = Math.floor(Math.random() * (H - 40));
    var w = 18 + Math.floor(Math.random() * (level >= 3 ? 180 : 90));
    var h = 4  + Math.floor(Math.random() * (level >= 3 ? 60  : 30));
    var pi  = Math.floor(Math.random() * (level >= 3 ? rectPalette.length : 3));
    var pal = rectPalette[pi];
    var op  = (0.06 + Math.random() * 0.18).toFixed(2);
    var dur = (1.2 + Math.random() * 3.5).toFixed(1);
    var del = (Math.random() * 4).toFixed(1);
    html += '<div class="wg-rect" style="' +
      'left:'+x+'px;top:'+y+'px;width:'+w+'px;height:'+h+'px;' +
      'border-color:'+pal.b+';background:'+pal.c+op+');' +
      '--dur:'+dur+'s;--delay:'+del+'s;--op:'+op+';' +
    '"></div>';
  }

  // ── Glitch horizontal slices (level 2+) ──
  if (level >= 2) {
    var sliceCount = level >= 4 ? 5 : (level >= 3 ? 3 : 1);
    for (var sl = 0; sl < sliceCount; sl++) {
      var sy = Math.floor(Math.random() * H);
      var sc2 = level >= 4 ? 'rgba(220,40,40,0.5)' : 'rgba(180,60,220,0.4)';
      var slicedur = (3 + Math.random() * 3).toFixed(1);
      var slicedel = (Math.random() * 5).toFixed(1);
      html += '<div class="wg-slice" style="top:'+sy+'px;background:'+sc2+';--slicedur:'+slicedur+'s;--slicedelay:'+slicedel+'s"></div>';
    }
  }

  // ── Corner text fragments (level 2+) ──
  if (level >= 2) {
    var fragments = [
      ['⚠ ANOMALY','error'],
      ['BREACH','error'],
      ['SYS FAIL','error'],
      ['CTRL LOST','error'],
      ['ENTITY FREE','warn'],
      ['↯ CONTAINMENT','warn'],
      ['OVERRIDE','sys'],
      ['ACCESS DENIED','sys'],
      ['CRITICAL','error'],
      ['SELF DESTRUCT','error'],
    ];
    var fragCount = level >= 4 ? 6 : (level >= 3 ? 4 : 2);
    var colors = { error:'#e04848', warn:'#d4a052', sys:'#9b7ac8' };
    var positions = [
      {l:'8px',t:'12px'},{r:'8px',t:'12px'},
      {l:'8px',b:'60px'},{r:'8px',b:'60px'},
      {l:'8px',t:'40%'},{r:'8px',t:'40%'},
      {l:'8px',t:'65%'},{r:'8px',t:'65%'},
    ];
    for (var f = 0; f < fragCount; f++) {
      var frag = fragments[Math.floor(Math.random() * fragments.length)];
      var pos  = positions[f % positions.length];
      var col  = colors[frag[1]];
      var top  = (0.12 + Math.random() * 0.22).toFixed(2);
      var tdur = (2 + Math.random() * 3).toFixed(1);
      var tdel = (Math.random() * 4).toFixed(1);
      var posStr = Object.keys(pos).map(function(k){ return k+':'+pos[k]; }).join(';');
      html += '<div class="wg-text" style="'+posStr+';color:'+col+';--top:'+top+';--tdur:'+tdur+'s;--tdelay:'+tdel+'s">'+frag[0]+'</div>';
    }
  }

  return html;
}

function _witchUpdateFooter() {
  var footer = document.getElementById('witch-footer');
  var label  = document.getElementById('witch-footer-label');
  var dot    = document.getElementById('witch-footer-dot');
  if (!footer || !label) return;
  var n = _witch.countdownN;
  if (n < 0) {
    footer.style.display = 'none';
    return;
  }
  footer.style.display = 'flex';
  label.textContent = 'INITIALIZING EMERGENCY SELF DESTRUCTION IN ' + n;
  var cls = n >= 7 ? 'fc-ten' : (n >= 4 ? 'fc-mid' : (n > 0 ? 'fc-low' : 'fc-zero'));
  label.className = cls;
  var dotColor = n >= 7 ? '#4caf8a' : (n >= 4 ? '#d4a052' : '#e04848');
  dot.style.background = dotColor;
}

function _witchRender() {
  var overlay = document.getElementById('witch-overlay');
  var phase = _witch.phase;

  _witchBuildBg();
  _witchUpdateFooter();

  if (phase === 'death')       { _witchSetContent(_witchDeathScreen());      return; }
  if (phase === 'victory')     { _witchSetContent(_witchVictoryScreen());    return; }
  if (phase === 'classselect') { _witchSetContent(_witchClassSelectScreen()); return; }
  if (phase === 'battle')      { _witchSetContent(_witchBattleScreen());     return; }

  _witchSetContent(_witchNarrativeScreen());
}

// Sets only the scrollable content area (leaves #witch-bg and #witch-footer intact)
function _witchSetContent(html) {
  var overlay = document.getElementById('witch-overlay');
  // Remove old content div if exists
  var old = document.getElementById('witch-content');
  if (old) old.remove();
  var div = document.createElement('div');
  div.id = 'witch-content';
  div.style.cssText = 'position:relative;z-index:10;width:100%;flex:1;display:flex;flex-direction:column;align-items:center;';
  div.innerHTML = html;
  // Insert before footer
  var footer = document.getElementById('witch-footer');
  if (footer) {
    overlay.insertBefore(div, footer);
  } else {
    overlay.appendChild(div);
  }
}

function _witchNarrativeScreen() {
  var beat = WITCH_SCRIPT[_witch.beatIdx];
  if (!beat) return '';
  var content = '';

  if (beat.type === 'narr') {
    content = '<div class="witch-narrator">' + esc(beat.text) + '</div>' +
              _witchNextBtn('_witchAdvanceBeat()');
  } else if (beat.type === 'speech') {
    content = '<div class="witch-speech"><div class="witch-speech-text">\u201c' + esc(beat.text) + '\u201d</div></div>' +
              _witchNextBtn('_witchAdvanceBeat()');
  } else if (beat.type === 'choice') {
    content = '<div class="witch-narrator" style="margin-bottom:10px">' + esc(beat.label) + '</div>' +
      '<div class="witch-choices">' +
        ['A','B','C','D'].map(function(l) {
          return '<button class="witch-cbtn" onclick="_witchChoiceAny()"><span class="witch-cltr">'+l+'.</span> ' + esc(beat.answer) + '</button>';
        }).join('') +
      '</div>';
  } else if (beat.type === 'cut') {
    content = _witchNextBtn('_witchAdvanceBeat()');
  } else {
    content = _witchNextBtn('_witchAdvanceBeat()');
  }

  return '<div class="witch-scene">' +
    '<div style="text-align:center;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#5b5280;margin-bottom:24px;padding-top:16px">— THE WITCH —</div>' +
    content +
  '</div>';
}

function _witchNextBtn(fn) {
  return '<button class="witch-next-btn" onclick="'+fn+'">Continue →</button>';
}

function _witchAdvanceBeat() {
  _witch.beatIdx++;
  var beat = WITCH_SCRIPT[_witch.beatIdx];
  if (!beat) return;

  // atmos beats: silently update state, immediately advance again
  if (beat.type === 'atmos') {
    if (beat.level !== undefined) _witch.atmosLevel = beat.level;
    if (beat.countdown !== undefined) _witch.countdownN = beat.countdown;
    _witch.beatIdx++;
    beat = WITCH_SCRIPT[_witch.beatIdx];
    if (!beat) return;
  }

  if (beat.type === 'classselect') {
    _witch.phase = 'classselect';
    _witchRender(); return;
  }
  if (beat.type === 'battle') {
    _witch.phase = 'battle';
    _witch.battleRound = beat.n;
    _witchRender(); return;
  }
  _witchRender();
}

function _witchChoiceAny() {
  _witch.beatIdx++;
  _witchRender();
}

// ── Class Selection ──
function _witchClassSelectScreen() {
  var pr = prLoad();
  var keys = pickIronClassOptions();
  var html = '<div class="witch-scene">' +
    '<div style="text-align:center;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#5b5280;margin-bottom:16px;padding-top:16px">— THE WITCH —</div>' +
    '<div style="border-radius:8px;border:1px solid #5a2a6a;background:rgba(80,20,100,0.15);padding:12px 14px;margin-bottom:16px;text-align:center;">' +
      '<div style="font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#c080ff;margin-bottom:4px">EMERGENCY DEFENSE SYSTEM INITIALIZING</div>' +
      '<div style="font-size:12px;color:#837aa3;line-height:1.55">Survive 10 rounds. Every answer is wrong. Use your class skills.</div>' +
    '</div>' +
    '<div style="font-size:15px;font-weight:700;color:#e0c0ff;margin-bottom:6px">Choose your class</div>' +
    '<div style="font-size:12px;color:#837aa3;margin-bottom:14px;line-height:1.6">Your starter consumables and heart upgrades from the shop will apply. Class skills are fully active.</div>' +
    '<div class="witch-class-grid">';
  keys.forEach(function(key) {
    var cls = IRON_CLASSES[key];
    if (!cls) return;
    html += '<div class="witch-class-card" onclick="_witchStartBattle(\''+key+'\')">' +
      '<div class="witch-class-icon">'+cls.icon+'</div>' +
      '<div class="witch-class-name">'+esc(cls.name)+'</div>' +
      '<div class="witch-class-desc">'+esc(cls.desc.substring(0,60))+'…</div>' +
    '</div>';
  });
  html += '</div></div>';
  return html;
}

function _witchStartBattle(classKey) {
  _witch.ironClass = classKey;
  var pr = prLoad();
  var bonus = pr.ironMaxBonus || 0;
  _witch.maxLives = (classKey === 'knight') ? 4 + bonus : 3 + bonus;
  _witch.lives = _witch.maxLives;
  _witch.consumables = { shield: 0, skip: 0, bomb: 0 };
  (function(){
    var _pr = prLoad();
    var _used = false;
    if (_pr.shopStartShield) { _witch.consumables.shield += 1; _pr.shopStartShield = false; _used = true; }
    if (_pr.shopStartSkip)   { _witch.consumables.skip   += 1; _pr.shopStartSkip   = false; _used = true; }
    if (_pr.shopStartBomb)   { _witch.consumables.bomb   += 1; _pr.shopStartBomb   = false; _used = true; }
    if (_used) prSave(_pr);
  })();
  _witch.shieldRounds = 0;
  _witch.skillCooldown = 0;
  _witch.removed = {};
  _witch.ironMasteryActive = false;
  _witch.ironUpgradeActive = false;
  _witch.ironMasteryTriggered = false;
  _witch.ironUpgradeTriggered = false;
  _witch.ironStreak = 0;
  _witch.ironHighStreak = 0;
  _witch.ironMageMana = 0;
  _witch.ironMageLuminaStreak = 0;
  _witch.ironMageUmbraStreak = 0;
  _witch.ironElfSpiritLove = 0;
  _witch.ironMonkFocusActive = false;
  _witch.ironMediumPossession = 0;
  _witch.ironFairyRebirthUsed = false;
  _witch.ironAssassinExposure = {};
  _witch.ironScoutReadyUpActive = false;
  _witch.ironBeastWildRoarActive = false;
  // Skip past classselect beat
  while (_witch.beatIdx < WITCH_SCRIPT.length && WITCH_SCRIPT[_witch.beatIdx].type === 'classselect') {
    _witch.beatIdx++;
  }
  // Phase: play remaining speech/atmos beats normally until hitting a battle beat
  _witch.phase = 'intro';
  _witchRender();
}

function _witchBattleScreen() {
  var beat = WITCH_SCRIPT[_witch.beatIdx];
  var n = (beat && beat.n !== undefined) ? beat.n : _witch.battleRound;
  // Sync footer countdown
  _witch.countdownN = n;
  _witchUpdateFooter();
  // Escalate atmos based on countdown
  _witch.atmosLevel = n <= 2 ? 4 : (n <= 5 ? 4 : 3);
  _witchBuildBg();

  var cls = IRON_CLASSES[_witch.ironClass] || {};

  // HUD
  var hearts = '';
  for (var h = 0; h < _witch.maxLives; h++) {
    hearts += '<span class="witch-heart' + (h >= _witch.lives ? ' dead' : '') + '">❤️</span>';
  }
  if (_witch.shieldRounds > 0) hearts += '<span style="font-size:11px;color:#4a9edd;margin-left:6px">🛡️ ×'+_witch.shieldRounds+'</span>';

  var conHtml = _witchConsumableRow();
  var hud = '<div class="witch-boss-hud">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
      '<div class="witch-lives">' + hearts + '</div>' +
      '<div style="font-size:11px;color:#837aa3">' + esc(cls.icon||'') + ' ' + esc(cls.name||'') + '</div>' +
    '</div>' +
    '<div class="witch-consumables">' + conHtml + '</div>' +
  '</div>';

  // Skill button
  var cd = _witch.skillCooldown || 0;
  var skillName = cls.skillName || 'Skill';
  var skillIcon = cls.icon || '⚔️';
  var skillCdLabel = cd > 0 ? ('CD ' + cd) : 'Ready';
  var skillBtnHtml = '<button class="witch-skill-btn" '+(cd>0?'disabled':'')+' onclick="_witchUseSkill()">' +
    '<span style="font-size:20px">'+skillIcon+'</span> ' +
    '<span style="flex:1">'+esc(skillName)+'</span>' +
    '<span class="witch-skill-cd '+(cd===0?'ready':'')+'">'+skillCdLabel+'</span>' +
  '</button>';

  // Speech
  var speechHtml = '';
  if (beat && beat.speech) {
    speechHtml = '<div class="witch-speech"><div class="witch-speech-text">\u201c' + esc(beat.speech) + '\u201d</div></div>';
  }

  var choicesHtml = _witchChoicesHTML();

  return '<div class="witch-scene">' +
    hud +
    '<div style="text-align:center;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#5b5280;margin-bottom:12px">— THE WITCH —</div>' +
    speechHtml +
    '<div style="font-size:12px;color:#837aa3;margin:8px 0 4px;line-height:1.5">Every answer is wrong. Survive using consumables and your class skill.</div>' +
    skillBtnHtml +
    choicesHtml +
  '</div>';
}

function _witchChoicesHTML() {
  var letters = ['A','B','C','D'];
  var html = '<div class="witch-choices">';
  for (var i = 0; i < 4; i++) {
    if (_witch.removed[i]) {
      // Still show but crossed out (bomb removed)
      html += '<button class="witch-cbtn" style="opacity:.3;text-decoration:line-through" disabled><span class="witch-cltr">'+letters[i]+'.</span> ???</button>';
    } else {
      html += '<button class="witch-cbtn" onclick="_witchPickChoice('+i+')" id="witch-choice-'+i+'"><span class="witch-cltr">'+letters[i]+'.</span> ???</button>';
    }
  }
  html += '</div>';
  return html;
}

function _witchConsumableRow() {
  function btn(type, icon, label) {
    var cnt = _witch.consumables[type] || 0;
    var dis = cnt <= 0 ? 'disabled' : '';
    return '<button class="witch-con-btn" '+dis+' onclick="_witchUseConsumable(\''+type+'\')">' +
      icon + ' ' + label + ' <span class="witch-con-count">×'+cnt+'</span>' +
    '</button>';
  }
  return btn('shield','🛡️','Shield') + btn('skip','⏭','Skip') + btn('bomb','💣','Bomb');
}

function _witchPickChoice(idx) {
  if (_witch.removed[idx]) return;

  // Check if knight/mage immunity etc protects this
  var blocked = _witch.shieldRounds > 0;
  if (blocked) {
    _witch.shieldRounds--;
    _witch.shielded = true;
    _witchAdvanceBattleRound();
    return;
  }

  // Flash the button red briefly then take damage
  var btn = document.getElementById('witch-choice-'+idx);
  if (btn) { btn.classList.add('wrong-flash'); }
  setTimeout(function() {
    _witchTakeDamage(1);
  }, 350);
}

function _witchTakeDamage(amount) {
  // Mage Lumina immunity
  if (_witch.ironClass === 'mage' && _witch._luminaImmune) {
    _witch._luminaImmune = false;
    showBanner('synced', '✨ Lumina — Damage blocked by incantation!', 2500);
    _witchAdvanceBattleRound();
    return;
  }
  _witch.lives = Math.max(0, _witch.lives - amount);
  if (_witch.lives <= 0) {
    _witch.phase = 'death';
    _witchRender();
    return;
  }
  _witchAdvanceBattleRound();
}

function _witchAdvanceBattleRound() {
  _witch.removed = {};
  if (_witch.skillCooldown > 0) _witch.skillCooldown--;
  if (_witch.ironClass === 'mage') {
    _witch.ironMageMana = (_witch.ironMageMana || 0) + 1;
    if (_witch.ironMasteryActive) _witch.ironMageMana++;
  }
  if (_witch.ironClass === 'elf') {
    _witch.ironElfSpiritLove = (_witch.ironElfSpiritLove || 0) + 1;
  }
  _witch.ironScoutReadyUpActive = false;
  _witch.ironBeastWildRoarActive = false;

  _witch.beatIdx++;
  if (_witch.beatIdx >= WITCH_SCRIPT.length) {
    _witch.phase = 'victory';
    _witchRender();
    return;
  }
  var beat = WITCH_SCRIPT[_witch.beatIdx];
  if (!beat || beat.type !== 'battle') {
    var found = false;
    for (var i = _witch.beatIdx; i < WITCH_SCRIPT.length; i++) {
      if (WITCH_SCRIPT[i].type === 'battle') {
        _witch.beatIdx = i;
        _witch.battleRound = WITCH_SCRIPT[i].n;
        found = true; break;
      }
    }
    if (!found) { _witch.phase = 'victory'; _witchRender(); return; }
  } else {
    _witch.battleRound = beat.n;
  }
  _witchRender();
}

function _witchUseConsumable(type) {
  if ((_witch.consumables[type] || 0) <= 0) return;
  _witch.consumables[type]--;

  if (type === 'shield') {
    var rounds = (_witch.ironClass === 'knight' && _witch.ironMasteryActive) ? 3 : 2;
    _witch.shieldRounds = rounds;
    showBanner('synced', '🛡️ Shield activated — next ' + rounds + ' wrong answers blocked!', 2000);
  } else if (type === 'skip') {
    // Skip: survive this round without taking damage
    showBanner('synced', '⏭️ Skipped! Round survived.', 1800);
    _witchAdvanceBattleRound();
    return;
  } else if (type === 'bomb') {
    // Bomb: remove one "???" choice (it adds a new ???), giving visual feedback
    // Bomb removes a random non-removed choice, but then a new "???" appears (net no change in count)
    // Effect: shows one is struck out but another identical one takes its place conceptually
    var avail = [];
    for (var i = 0; i < 4; i++) { if (!_witch.removed[i]) avail.push(i); }
    if (avail.length > 1) {
      var toRemove = avail[Math.floor(Math.random() * avail.length)];
      _witch.removed[toRemove] = true;
      // Add it back (bomb replaces with new ???): just don't remove it if only 1 left
    }
    showBanner('synced', '💣 Bomb! One choice removed (replaced with ???)', 1800);
  }
  _witchRender();
}

function _witchUseSkill() {
  if (_witch.skillCooldown > 0) return;
  var cls = _witch.ironClass;
  var baseCd = (IRON_CLASSES[cls] && IRON_CLASSES[cls].skillCooldown) || 3;

  if (cls === 'knight') {
    // Raise Shield: block next wrong answer
    _witch.shieldRounds = _witch.ironMasteryActive ? 3 : 2;
    _witch.skillCooldown = baseCd;
    showBanner('synced', '🛡️ Raise Shield! Next answer blocked ×' + _witch.shieldRounds + ' rounds.', 2000);
  } else if (cls === 'bomber') {
    // Remove all non-correct (here: remove 2-3 choices, they get replaced by ???)
    var removeCount = _witch.ironMasteryActive ? 2 : 1;
    var av = [];
    for (var i = 0; i < 4; i++) { if (!_witch.removed[i]) av.push(i); }
    var toRem = av.slice(0, Math.min(removeCount, av.length - 1));
    toRem.forEach(function(i){ _witch.removed[i] = true; });
    _witch.skillCooldown = baseCd;
    showBanner('synced', '💣 Detonation — ' + toRem.length + ' choice(s) removed!', 2000);
  } else if (cls === 'thief') {
    // Sneak: survive this round without damage
    showBanner('synced', '🗝️ Sneak — Round survived, no damage taken!', 2000);
    _witch.skillCooldown = baseCd;
    _witchAdvanceBattleRound();
    return;
  } else if (cls === 'rogue') {
    // Risky Escape: skip this round, 50% chance +1 life / 50% -1 life
    _witch.skillCooldown = baseCd;
    if (Math.random() < 0.5 && _witch.lives < _witch.maxLives) {
      _witch.lives++;
      showBanner('synced', '🎲 Risky Escape — Got lucky! +1 life!', 2000);
    } else {
      _witch.lives = Math.max(0, _witch.lives - 1);
      if (_witch.lives <= 0) { _witch.phase = 'death'; _witchRender(); return; }
      showBanner('synced', '🎲 Risky Escape — Took damage while escaping! -1 life.', 2000);
    }
    _witchAdvanceBattleRound();
    return;
  } else if (cls === 'paladin') {
    // Pray: 5% heal + 15% consumable
    _witch.skillCooldown = baseCd;
    var healPct = _witch.ironUpgradeActive ? 0.10 : 0.05;
    var conPct  = _witch.ironUpgradeActive ? 0.20 : 0.15;
    var healed = false; var gotCon = false;
    if (Math.random() < healPct && _witch.lives < _witch.maxLives) { _witch.lives++; healed = true; }
    if (Math.random() < conPct) {
      var t = ['shield','skip','bomb'][Math.floor(Math.random()*3)];
      _witch.consumables[t] = (_witch.consumables[t]||0) + 1;
      gotCon = true;
      showBanner('synced', '🙏 Pray — ' + (healed?'+1 life · ':'' ) + 'Received: ' + t + '!', 2200);
    } else {
      showBanner('synced', '🙏 Pray — ' + (healed?'+1 life!':'Nothing this time.'), 2000);
    }
  } else if (cls === 'monk') {
    // Monk Focus: arm for next question (here: survive one round)
    _witch.ironMonkFocusActive = true;
    _witch.skillCooldown = baseCd;
    showBanner('synced', '🧘 Monk Focus — next wrong answer will heal you instead!', 2200);
  } else if (cls === 'alchemist') {
    // Transmutation: 3+ consumables → +1 life, -3 consumables; else -1 life, +3 consumables
    _witch.skillCooldown = baseCd;
    var total = (_witch.consumables.shield||0) + (_witch.consumables.skip||0) + (_witch.consumables.bomb||0);
    if (total >= 3) {
      // Spend 3 consumables, gain 1 life
      var spent = 0;
      ['shield','skip','bomb'].forEach(function(t){ while (_witch.consumables[t] > 0 && spent < 3) { _witch.consumables[t]--; spent++; } });
      if (_witch.lives < _witch.maxLives) _witch.lives++;
      showBanner('synced', '⚗️ Transmutation — 3 consumables → +1 life!', 2200);
    } else {
      _witch.lives = Math.max(0, _witch.lives - 1);
      if (_witch.lives <= 0) { _witch.phase = 'death'; _witchRender(); return; }
      var grant = _witch.ironUpgradeActive ? 6 : 3;
      var types = ['shield','skip','bomb'];
      for (var gi = 0; gi < grant; gi++) { var t = types[gi%3]; _witch.consumables[t] = (_witch.consumables[t]||0) + 1; }
      showBanner('synced', '⚗️ Transmutation — -1 life, +' + grant + ' consumables!', 2200);
    }
  } else if (cls === 'necromancer') {
    // No graveyard in witch fight — grant temporary shield instead
    _witch.shieldRounds = 1;
    _witch.skillCooldown = baseCd;
    showBanner('synced', '💀 Necromancy — Summoned a spirit shield!', 2000);
  } else if (cls === 'beastman') {
    // Wild Roar: if answer correct (can\'t be here) +2, if wrong -2. In this context just survive.
    _witch.ironBeastWildRoarActive = true;
    _witch.skillCooldown = baseCd;
    showBanner('synced', '🐺 Wild Roar — You face the wrong with extra force!', 2000);
  } else if (cls === 'medium') {
    // Possession: reveals if choice is right/wrong — all are wrong here, acts as skip
    if ((_witch.ironMediumPossession || 0) <= 0) { showBanner('synced', '👁️ No Possession stacks!', 1800); return; }
    _witch.ironMediumPossession--;
    showBanner('synced', '👁️ Possession — The dead whisper: "All are wrong." Round skipped.', 2500);
    _witch.skillCooldown = baseCd;
    _witchAdvanceBattleRound();
    return;
  } else if (cls === 'assassin') {
    // Stab: in witch context, block this round
    _witch.shieldRounds = 1;
    _witch.skillCooldown = baseCd;
    showBanner('synced', '🗡️ Stab — Exposure burned! Round blocked!', 2000);
  } else if (cls === 'scout') {
    // Ready Up: arm for protection (skip next wrong hit)
    _witch.ironScoutReadyUpActive = true;
    _witch.skillCooldown = baseCd;
    showBanner('synced', '🏹 Ready Up — Armed! Next wrong answer will be blocked.', 2200);
  } else if (cls === 'fairy') {
    // Rebirth: full heal, usable once
    if (_witch.ironFairyRebirthUsed && !_witch.ironUpgradeActive) { showBanner('synced', '🧚‍♀️ Rebirth already used!', 1800); return; }
    _witch.ironFairyRebirthUsed = true;
    _witch.lives = _witch.maxLives;
    _witch.skillCooldown = 999; // one-time
    showBanner('synced', '🧚‍♀️ Rebirth — Fully healed!', 2500);
  } else if (cls === 'elf') {
    // Spirit Judgement: burn stacks to skip this round
    var stacks = _witch.ironElfSpiritLove || 0;
    if (stacks <= 0) { showBanner('synced', '🧝 No Spirit Love stacks!', 1800); return; }
    var burn = Math.min(stacks, 20);
    _witch.ironElfSpiritLove -= burn;
    var skipChance = Math.min(burn * 5, 100);
    _witch.skillCooldown = baseCd;
    if (Math.random() * 100 < skipChance) {
      showBanner('synced', '🧝 Spirit Judgement — The spirits guide you! Round survived!', 2500);
      _witchAdvanceBattleRound();
      return;
    } else {
      showBanner('synced', '🧝 Spirit Judgement — The spirits were wrong too. Taking damage...', 2500);
    }
  } else if (cls === 'mage') {
    // Simplified: spend 6 mana to block this round
    if ((_witch.ironMageMana || 0) < 6) { showBanner('synced', '✨ Not enough Mana! (' + (_witch.ironMageMana||0) + '/6)', 1800); return; }
    _witch.ironMageMana -= 6;
    _witch._luminaImmune = true;
    _witch.skillCooldown = baseCd;
    showBanner('synced', '✨ Incantation — Immunity banked! Next wrong answer blocked.', 2200);
  }

  // Scout Ready Up: also acts as block
  if (_witch.ironScoutReadyUpActive) { _witch.shieldRounds = 1; }

  // Monk Focus: if active, heal on next pick
  if (_witch.ironMonkFocusActive) {
    _witch.ironMonkFocusActive = false;
    if (_witch.lives < _witch.maxLives) { _witch.lives++; showBanner('synced', '🧘 Monk Focus healed you!', 1800); }
  }

  _witchRender();
}

   INIT
───────────────────────────────────────────── */

/* ═══════════════════════════════════════════════════════
   OFFLINE ENGINE — IndexedDB question bank
   Works from file:// and any origin, no Service Worker needed.
   DB: SELEQuizDB  |  Store: questions  |  Key: subj||topic||question
═══════════════════════════════════════════════════════ */

/* ── IndexedDB helpers ── */
var _idb = null;
var _idbOpening = false;
var _idbQueue = [];
var IDB_NAME = 'SELEQuizDB', IDB_VER = 2, IDB_STORE = 'questions';

function idbOpen() {
  return new Promise(function(res, rej) {
    if (_idb) { res(_idb); return; }
    _idbQueue.push({ res: res, rej: rej });
    if (_idbOpening) return;
    _idbOpening = true;
    console.log('[IDB] opening', IDB_NAME, 'v', IDB_VER);
    var r = indexedDB.open(IDB_NAME, IDB_VER);
    r.onupgradeneeded = function(e) {
      console.log('[IDB] onupgradeneeded — creating store');
      var db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) {
        var os = db.createObjectStore(IDB_STORE, { keyPath: 'key' });
        os.createIndex('subj', 'subj', { unique: false });
      }
    };
    r.onsuccess = function(e) {
      _idb = e.target.result;
      _idbOpening = false;
      console.log('[IDB] opened OK');
      var q = _idbQueue.splice(0);
      for (var i = 0; i < q.length; i++) q[i].res(_idb);
    };
    r.onerror = function(e) {
      _idbOpening = false;
      console.error('[IDB] open ERROR', e.target.error);
      var err = e.target.error;
      var q = _idbQueue.splice(0);
      for (var i = 0; i < q.length; i++) q[i].rej(err);
    };
  });
}

/* Replace all questions for a subject — deletes stale rows first, then inserts fresh batch */
function idbSave(subjName, questions) {
  console.log('[IDB] idbSave START', subjName, questions.length);
  return idbOpen().then(function(db) {
    return new Promise(function(res, rej) {
      var tx = db.transaction(IDB_STORE, 'readwrite');
      var os = tx.objectStore(IDB_STORE);
      function insertAll() {
        var now = Date.now();
        questions.forEach(function(q, idx) {
          var rowIdx = (q.rowIndex !== undefined ? q.rowIndex : idx);
          os.put({
            key:     subjName + '||' + rowIdx,
            subj:    subjName,
            topic:   q.topic,
            question:q.question,
            choices: q.choices,
            answer:  q.answer,
            rowIndex:rowIdx,
            savedAt: now
          });
        });
      }
      // Delete all existing records for this subject first so stale rows don't linger
      var delReq = os.index('subj').getAllKeys(IDBKeyRange.only(subjName));
      delReq.onsuccess = function(e) {
        (e.target.result || []).forEach(function(k) { os.delete(k); });
        insertAll();
      };
      delReq.onerror = function() { insertAll(); }; // fallback: upsert without pruning
      tx.oncomplete = function() { console.log('[IDB] idbSave COMPLETE', subjName, questions.length); res(questions.length); };
      tx.onerror    = function(e) { console.error('[IDB] idbSave ERROR', subjName, e.target.error); rej(e.target.error); };
      tx.onabort    = function(e) { console.error('[IDB] idbSave ABORT', subjName, e.target.error); rej(e.target.error || new Error('IDB transaction aborted')); };
    });
  }).catch(function(e) { console.error('[IDB] idbSave CATCH', subjName, e); throw e; });
}

/* Load all questions for a subject from IDB */
function idbLoad(subjName) {
  console.log('[IDB] idbLoad START', subjName);
  return idbOpen().then(function(db) {
    return new Promise(function(res, rej) {
      var tx  = db.transaction(IDB_STORE, 'readonly');
      var req = tx.objectStore(IDB_STORE).index('subj').getAll(IDBKeyRange.only(subjName));
      req.onsuccess = function(e) {
        var rows = (e.target.result||[]).slice();
        console.log('[IDB] idbLoad RESULT', subjName, rows.length);
        rows.sort(function(a, b) { return (a.rowIndex !== undefined ? a.rowIndex : 0) - (b.rowIndex !== undefined ? b.rowIndex : 0); });
        res(rows.map(function(r){
          return { subj:r.subj, topic:r.topic, question:r.question, choices:r.choices, answer:r.answer, rowIndex:r.rowIndex };
        }));
      };
      req.onerror = function(e) { console.error('[IDB] idbLoad ERROR', subjName, e.target.error); rej(e.target.error); };
    });
  });
}

/* Count cached questions per subject */
function idbCount(subjName) {
  return idbOpen().then(function(db) {
    return new Promise(function(res) {
      var req = db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).index('subj').count(IDBKeyRange.only(subjName));
      req.onsuccess = function(e) { res(e.target.result||0); };
      req.onerror   = function()  { res(0); };
    });
  }).catch(function(){ return 0; });
}

/* Delete all cached questions for a subject — uses index key range for speed */
function idbDeleteSubject(subjName) {
  return idbOpen().then(function(db) {
    return new Promise(function(res, rej) {
      var tx  = db.transaction(IDB_STORE, 'readwrite');
      var os  = tx.objectStore(IDB_STORE);
      // Delete by iterating the subj index — getAll keys then delete each
      var req = os.index('subj').getAllKeys(IDBKeyRange.only(subjName));
      req.onsuccess = function(e) {
        var keys = e.target.result || [];
        keys.forEach(function(k) { os.delete(k); });
      };
      req.onerror = function() {}; // best-effort
      tx.oncomplete = function() { res(); };
      tx.onerror    = function(e) { rej(e.target.error); };
      tx.onabort    = function()  { res(); }; // don't hang on abort
    });
  });
}

/* Refresh IDB counts shown on subject cards */
function refreshIdbCounts() {
  S._idbCounts = S._idbCounts || {};
  var subs = DEFAULT_SUBJECTS.filter(function(s){ return s.name !== IRON_MAN.name; });
  var promises = subs.map(function(s) {
    return idbCount(s.name).then(function(n) {
      S._idbCounts[s.name] = n;
    });
  });
  // Re-render once after ALL counts are updated, not one-by-one
  Promise.all(promises).then(function() {
    if (S.screen === 'subjects') render();
  });
}

/* ── Override fetchSubject: network → IDB fallback ── */
function fetchSubjectFromSheets(subjName, callback) {
  var cfg = null;
  for (var i=0; i<S.subjects.length; i++) if (S.subjects[i].name===subjName){cfg=S.subjects[i];break;}
  if (!cfg) { console.error('[FETCH] Subject not found in S.subjects:', subjName, S.subjects.map(function(s){return s.name;})); callback('Subject not found',[]);return; }
  var ids = cfg.sheets.map(function(s){return toSheetId(s);}).filter(function(id){return id&&id!=='ALL';});
  if (!ids.length) { console.error('[FETCH] No valid sheet IDs for', subjName, cfg.sheets); callback('No valid spreadsheet IDs configured.',[]);return; }
  console.log('[FETCH] fetching', subjName, 'ids:', ids);
  var allQ=[], errors=[], remaining=ids.length;
  function done(){ 
    if(errors.length===ids.length) { console.error('[FETCH] ALL FAILED', subjName, errors); callback(errors[0],[]); }
    else { console.log('[FETCH] SUCCESS', subjName, allQ.length, 'questions'); callback(null,allQ); }
  }
  ids.forEach(function(id){
    fetchSpreadsheet(id)
      .then(function(rows){
        console.log('[FETCH] rows received', subjName, rows.length);
        var qs=rowsToQuestions(rows,subjName);
        console.log('[FETCH] questions parsed', subjName, qs.length);
        if(!qs.length) throw new Error('No valid questions found.');
        allQ=allQ.concat(qs); remaining--; if(remaining===0) done();
      })
      .catch(function(err){ console.error('[FETCH] sheet error', subjName, id, err.message); errors.push(err.message); remaining--; if(remaining===0) done(); });
  });
}

function fetchSubject(subjName, callback) {
  // Offline: skip network entirely, go straight to IDB
  if (!navigator.onLine) {
    idbLoad(subjName).then(function(cached) {
      if (cached.length) {
        callback(null, cached);
      } else {
        callback('No questions cached. Connect to the internet and open this subject once to enable offline use.', []);
      }
    }).catch(function() {
      callback('Could not load questions.', []);
    });
    return;
  }
  fetchSubjectFromSheets(subjName, function(netErr, netQs) {
    if (!netErr && netQs.length) {
      // Network OK → save fresh data to IDB (put is upsert, no delete needed)
      idbSave(subjName, netQs).then(function(){ refreshIdbCounts(); }).catch(function(){});
      callback(null, netQs);
    } else {
      // Network failed → fall back to IDB
      idbLoad(subjName).then(function(cached) {
        if (cached.length) {
          callback(null, cached);
        } else {
          callback(
            netErr || 'No questions cached. Connect to the internet and open this subject once to enable offline use.',
            []
          );
        }
      }).catch(function(){
        callback(netErr || 'Could not load questions.', []);
      });
    }
  });
}

/* ── Eager preload: populate S.loadedQ for all subjects on startup so
      question counts appear immediately on the subjects screen.
      Reads ONLY from IDB — never triggers a network request. ── */
function preloadAllSubjects() {
  var subs = DEFAULT_SUBJECTS.filter(function(s){ return s.name !== IRON_MAN.name; });
  var remaining = subs.length;
  subs.forEach(function(subj) {
    if (S.loadedQ[subj.name] && S.loadedQ[subj.name].length) {
      remaining--;
      if (remaining === 0) _updateIronManCount();
      return;
    }
    idbLoad(subj.name).then(function(qs) {
      if (qs.length) {
        S.loadedQ[subj.name] = qs;
        if (S.screen === 'subjects') render();
      }
      remaining--;
      if (remaining === 0) _updateIronManCount();
    }).catch(function() {
      remaining--;
      if (remaining === 0) _updateIronManCount();
    });
  });
}

function _updateIronManCount() {
  // Build Iron Man loadedQ count from whatever subjects loaded successfully
  // Only updates the count display — does NOT enter Iron Man mode
  var all = [];
  DEFAULT_SUBJECTS.forEach(function(s) {
    if (s.name !== IRON_MAN.name && S.loadedQ[s.name]) all = all.concat(S.loadedQ[s.name]);
  });
  if (all.length) {
    S.loadedQ[IRON_MAN.name] = all;
    if (S.screen === 'subjects') render();
  }
}
var _bannerTimer = null;
function showBanner(type, msg, autohideMs) {
  var el = document.getElementById('offlineBanner');
  if (!el) return;
  el.className = type;
  el.style.display = 'flex';
  var icon = type==='syncing' ? '<span class="bspin"></span>' : '<span class="bdot"></span>';
  el.innerHTML = '<span>'+icon+msg+'</span>'+
    '<button class="bclose" onclick="this.parentNode.style.display=\'none\'">✕</button>';
  clearTimeout(_bannerTimer);
  if (autohideMs) _bannerTimer = setTimeout(function(){ el.style.display='none'; }, autohideMs);
}
function hideBanner() { var el=document.getElementById('offlineBanner'); if(el) el.style.display='none'; }

function syncAll() {
  var subs = DEFAULT_SUBJECTS.filter(function(s){ return s.name !== IRON_MAN.name; });
  var failed = 0;
  var savePromises = [];
  var fetchedQ = {};
  var done = false;
  console.log('[SYNC] syncAll START, subjects:', subs.map(function(s){return s.name;}));
  showBanner('syncing', 'Syncing question bank…', null);

  function finish() {
    if (done) return;
    done = true;
    console.log('[SYNC] finish called, failed:', failed, '/', subs.length, 'fetched:', Object.keys(fetchedQ));
    subs.forEach(function(s) {
      if (fetchedQ[s.name]) S.loadedQ[s.name] = fetchedQ[s.name];
    });
    _updateIronManCount();
    refreshIdbCounts();
    if (failed === subs.length) {
      showBanner('offline', 'Can\'t reach Google Sheets — using cached question bank', null);
    } else {
      showBanner('synced', 'Question bank updated — all subjects available offline ✓', 4500);
      if (S.screen === 'subjects') render();
    }
  }

  var safetyTimer = setTimeout(function() {
    console.warn('[SYNC] safety timeout fired');
    finish();
  }, 15000);

  var remaining = subs.length;
  subs.forEach(function(subj) {
    fetchSubjectFromSheets(subj.name, function(err, qs) {
      console.log('[SYNC] fetchSubjectFromSheets callback', subj.name, 'err:', err, 'qs:', qs ? qs.length : 0);
      if (!err && qs.length) {
        fetchedQ[subj.name] = qs;
        var saveP = idbSave(subj.name, qs).catch(function(e){ console.error('[SYNC] idbSave failed', subj.name, e); });
        savePromises.push(saveP);
      } else {
        failed++;
      }
      remaining--;
      console.log('[SYNC] remaining:', remaining, 'failed:', failed);
      if (remaining === 0) {
        console.log('[SYNC] all fetched, waiting for', savePromises.length, 'saves');
        Promise.all(savePromises).then(function() {
          clearTimeout(safetyTimer);
          finish();
        }).catch(function(e) {
          console.error('[SYNC] Promise.all error', e);
          clearTimeout(safetyTimer);
          finish();
        });
      }
    });
  });
}

/* ── Online / offline events ── */
window.addEventListener('online',  function() { syncAll(); if (S.screen === 'subjects') render(); });
window.addEventListener('offline', function() {

(function() {
