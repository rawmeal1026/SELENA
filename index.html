}
function advanceQuestion() {
  // ── Study Mode: process graveyard queuing FIRST ──
  // This must happen before the end-of-run check below. Otherwise a wrong
  // answer on the very last question has no "future slot" to queue into and
  // the run ends immediately, silently dropping the graveyard entry.
  if (!S.ironMode) nmProcessGraveyard();
  if (S.cur + 1 >= S.shuffled.length) {
    S.screen = 'results';
    // ── Personal Records: session finished ──
    if (S.ironMode) {
      if (!S.ironRunSaved) {
        S.ironRunSaved = true;
        prRecord(function(pr) {
          pr.ironRoundsSurvivedAllTime += (S.ironTotalRounds || 0);
          if (S.ironHighStreak > pr.ironLongestStreakEver) pr.ironLongestStreakEver = S.ironHighStreak;
          if (S.score > pr.ironHighestScore) pr.ironHighestScore = S.score;
          if (S.ironClass && S.score > pr.ironClassBest[S.ironClass]) pr.ironClassBest[S.ironClass] = S.score;
        });
      }
    } else {
      var sessionLen = S.shuffled.length;
      prRecord(function(pr) {
        if (sessionLen > pr.normalLongestSession) pr.normalLongestSession = sessionLen;
      });
      saveStateClear(); // session complete — nothing left to resume

      // ── Achievements: session-completion checks ──
      prRecord(function(pr) {
        pr.normalSessionsCompleted = (pr.normalSessionsCompleted || 0) + 1;
        if (pr.normalSessionsCompleted === 1) unlockAchievement('first_day_high');
        pr.normalSubjectsCompleted = prAddUnique(pr.normalSubjectsCompleted || [], S.curSubject);
        if (pr.normalSubjectsCompleted.length >= 6) unlockAchievement('all_rounder');
      });
      if (sessionLen >= 50 && !S.sessionExited) unlockAchievement('the_long_vigil');
      if (S.nmRedemption === 'ghost')   unlockAchievement('unfinished_business');
      if (S.nmRedemption === 'zombie')  unlockAchievement('outbreak_survivor');
      if (S.nmRedemption === 'vampire') unlockAchievement('garlic_and_grit');
      if (S.nmRedemption === 'mummy') {
        unlockAchievement('her_lost_child');
        if (new Date().getHours() === 0) unlockAchievement('right_person_right_time');
      }
    }
  } else {
    // ── Study Mode: checkpoint check ──
    if (!S.ironMode) {
      // Checkpoint: count only non-GY questions since last checkpoint (GY injections inflate S.cur)
      if (S.nmCheckpoint && S.shuffled.length >= 30) {
        var nonGyDone = 0;
        for (var cpi = S.nmCheckpointAt; cpi <= S.cur; cpi++) {
          if (S.shuffled[cpi] && !S.shuffled[cpi]._gyEntry) nonGyDone++;
        }
        if (nonGyDone > 0 && nonGyDone % 15 === 0) {
          S.screen = 'nmcheckpoint';
          render(); return;
        }
      }
    }
    S.screen = 'quiz';
    S.cur++; S.done = false; S.chosen = null;
    if (!S.ironMode && S.nmMindfulTimer) { clearInterval(S.nmMindfulTimer); S.nmMindfulTimer = null; S.nmMindfulCount = 0; }
    S.nmIsGraveyardQ = !!(S.shuffled[S.cur] && S.shuffled[S.cur]._gyEntry);
    S.nmGraveyardReturnInfo = S.nmIsGraveyardQ ? { prevAnswer: S.shuffled[S.cur]._gyPrevAnswer, returnNum: (S.shuffled[S.cur] && S.shuffled[S.cur]._gyReturnNum) || 1 } : null;
    S.skipped = false; S.ironShielded = false; S.ironPaladinSaved = false;
    S.ironRogueBonus = false; S.ironMonkHeal = false; S.ironThiefGrantType = null; S.ironThiefSneakActive = false;
    S.ironBeastWildRoarActive = false;
    S.ironBeastPtsThisQ = 0;
    S.ironElfSpiritSuggestion = null;
    S.ironElfSpiritWasCorrect = false;
    S.ironBombsUsedThisQ = 0; S.ironConsumablesUsedThisQ = 0; S.ironRemoved = {};
    S.ironSkillUsedThisQ = false; S.ironSkillEvent = null;
    S.ironMageLuminaUsedThisQ = false; S.ironMageUmbraUsedThisQ = false;
    S.ironMediumPossessing = false; S.ironMediumPeekedPos = null; S.ironMediumUsedThisQ = false;
    S.ironRogueSpeedBonus = false; S.ironTimeAtPick = 30;
    S.ironAssassinStabResult = null;
    S.ironScoutReadyUpBonus = false; S.ironScoutCalculatedBonus = false;
    // Mage: Umbra tier-3 — apply answer reveal for this question if pending
    if (S.ironClass === 'mage' && S.ironMageUmbraRevealActive) {
      var _revQ = S.shuffled[S.cur];
      if (_revQ) {
        for (var _ri = 0; _ri < _revQ._order.length; _ri++) {
          if (_revQ._order[_ri] === _revQ.answer) { S.ironMageUmbraRevealAnswer = _ri; break; }
        }
      }
      S.ironMageUmbraRevealActive = false;
    } else {
      S.ironMageUmbraRevealAnswer = null;
    }
    // Mage: Umbra tier-5 — auto-remove one wrong choice per round
    if (S.ironClass === 'mage' && S.ironMageUmbraWrongRemoveRoundsLeft > 0) {
      var _umbraQ = S.shuffled[S.cur];
      if (_umbraQ) {
        var _umbraCands = [];
        for (var _ui = 0; _ui < _umbraQ._order.length; _ui++) {
          if (_umbraQ._order[_ui] !== _umbraQ.answer && !S.ironRemoved[_ui]) _umbraCands.push(_ui);
        }
        if (_umbraCands.length) {
          S.ironRemoved[_umbraCands[Math.floor(Math.random() * _umbraCands.length)]] = true;
          S.ironMageUmbraDestroyedThisRun = (S.ironMageUmbraDestroyedThisRun || 0) + 1;
          _checkMageSpellcaster();
        }
      }
      S.ironMageUmbraWrongRemoveRoundsLeft--;
      if (S.ironMageUmbraWrongRemoveRoundsLeft <= 0) {
        showBanner('synced', '✨ Umbra — the dark veil lifts. Wrong choice removal has ended.', 2500);
      }
    }
    // If next question is not a redemption question, clear the flag so stale state can't cause issues
    if (S.ironMode && S.ironClass === 'necromancer' && S.necroRedemptionActive) {
      var _nextQ = S.shuffled[S.cur];
      if (!_nextQ || !_nextQ._necroRedemption) S.necroRedemptionActive = false;
    }
    // Note: ironMonkFocusActive persists until triggered in pick()
  }
  render();
  if (S.ironMode && S.screen === 'quiz') setTimeout(startIronTimer, 50);
}

function ironBombCandidatesLeft(q) {
  if (!q) return 0;
  var c = 0;
  for (var pos = 0; pos < q._order.length; pos++) {
    if (q._order[pos] !== q.answer && !S.ironRemoved[pos]) c++;
  }
  return c;
}
function useIronBomb() {
  if (!S.ironMode || S.done) return;
  if (S.ironConsumables.bomb <= 0) return;
  // Bomber Mastery — Calculated Detonation: only 1 use per question (no multi-bomb)
  var maxUses = (S.ironClass === 'bomber' && S.ironMasteryActive) ? 1 : 3;
  if (S.ironBombsUsedThisQ >= maxUses) return;
  var q = S.shuffled[S.cur];
  var candidates = [];
  for (var pos = 0; pos < q._order.length; pos++) {
    if (q._order[pos] !== q.answer && !S.ironRemoved[pos]) candidates.push(pos);
  }
  if (!candidates.length) return;
  // Bomber Mastery: remove 2 wrong answers with one bomb
  var removeCount = (S.ironClass === 'bomber' && S.ironMasteryActive) ? 2 : 1;
  var toRemove = shuf(candidates).slice(0, removeCount);
  for (var ri = 0; ri < toRemove.length; ri++) S.ironRemoved[toRemove[ri]] = true;
  S.ironTotalBombsRemoved += toRemove.length;
  S.ironBombsUsedThisQ++;
  S.ironConsumables.bomb--;
  prRecord(function(pr){ pr.ironTotalBombsUsed++; });
  S.ironUsedConsumableThisRound = true;
  S.ironConsumablesUsedThisQ = (S.ironConsumablesUsedThisQ || 0) + 1;
  checkJesterQuest2();
  S.ironUsedConsumableThisRound = true;
  if (S.ironClass === 'medium') { S.ironMediumPossession = (S.ironMediumPossession || 0) + 1; showBanner('synced', '✨ Possession +1 stack (' + S.ironMediumPossession + ' total)', 1800); }
  beastmanConsumableScore();
  // Strategic Explosives: 25% refund a Bomb, 4% heal 1 life
  if (S.ironClass === 'bomber' && S.ironUpgradeActive) {
    var _bombRoll = Math.random();
    if (_bombRoll < 0.04 && S.ironWrong > 0) {
      S.ironWrong--; S.ironLives = S.ironMaxLives - S.ironWrong;
      showBanner('synced', '💣 Strategic Explosives — surgical precision! +1 HP!', 2500);
    } else if (_bombRoll < 0.25) {
      S.ironConsumables.bomb++;
      showBanner('synced', '💣 Strategic Explosives — recovered a Bomb! +1 Bomb!', 2500);
    }
  }
  render();
}

function applyIronDamage(amount) {

  if (S.ironClass === 'mage' && S.ironMageLuminaImmune) {
    S.ironMageLuminaImmune = false;
    showBanner('synced', '✨ Lumina — Immunity! Damage blocked by the Light Incantation!', 2500);
    return;
  }
  var wouldBeWrong = S.ironWrong + amount;
  // Necromancer Mastery: Master of Death / Upgrade: Conqueror of Life — trigger on fatal hit
  if (wouldBeWrong >= S.ironMaxLives && S.ironClass === 'necromancer' && S.ironMasteryActive && S.necroGraveyard.length > 0 && !S.necroCoinFlipPending) {
    S.necroCoinFlipPending = true;

    S.ironLives = S.ironMaxLives - S.ironWrong;
    // Conqueror of Life (upgrade): dice screen. Master of Death (base): coin screen.
    setTimeout(function() { S.screen = 'necrocoinflip'; render(); }, 600);
    return;
  }
  if (wouldBeWrong >= S.ironMaxLives && S.ironClass === 'paladin' && !S.ironPaladinUsed) {
    S.ironPaladinUsed = true;
    S.ironPaladinSaved = true;
    S.ironWrong = S.ironMaxLives - 1;
    S.ironLives = 1;
    prRecord(function(pr){ pr.paladinSaves++; });
    S.ironPaladinPassiveSavesThisRun = (S.ironPaladinPassiveSavesThisRun || 0) + 1;
    if (S.ironPaladinPassiveSavesThisRun >= 3) unlockAchievement('last_rites');
    return;
  }
  S.ironWrong = wouldBeWrong;
  S.ironLives = Math.max(S.ironMaxLives - S.ironWrong, 0);
}

// ── Elf: Spirit Judgement — custom modal for burning Spirit Love stacks ──
function useElfSpiritJudgement() {
  if (!S.ironMode || S.ironClass !== 'elf') return;
  if (S.done || S.ironSkillUsedThisQ) return;

  var maxBurn = S.ironMasteryActive ? 10 : 20;
  var pctPerStack = S.ironMasteryActive ? 10 : 5;
  var current = S.ironElfSpiritLove || 0;
  var canBurn = Math.min(current, maxBurn);

  // Build the modal content with slider
  var overlay = document.getElementById('selena-modal-overlay');
  var msgEl   = document.getElementById('selena-modal-msg');
  var okBtn   = document.getElementById('selena-modal-ok');
  var cancelBtn = document.getElementById('selena-modal-cancel');

  // Replace modal message with rich burn-picker
  msgEl.innerHTML =
    '<div style="font-weight:700;font-size:15px;margin-bottom:8px">🧝 Spirit Judgement</div>' +
    '<div style="font-size:12px;color:var(--sub);margin-bottom:10px">' +
      'Spirit Love: <b>' + current + '</b> stacks &nbsp;|&nbsp; ' +
      'Max burn: <b>' + maxBurn + '</b> &nbsp;|&nbsp; ' +
      pctPerStack + '% per stack burned' +
    '</div>' +
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">' +
      '<input id="elf-burn-slider" type="range" min="0" max="' + canBurn + '" value="' + canBurn + '" ' +
        'style="flex:1;accent-color:#9b59b6" oninput="document.getElementById(\'elf-burn-val\').textContent=this.value;' +
          'document.getElementById(\'elf-burn-pct\').textContent=Math.min(this.value*' + pctPerStack + ',100)">' +
      '<span id="elf-burn-val" style="font-weight:700;min-width:24px;text-align:right">' + canBurn + '</span>' +
    '</div>' +
    '<div style="font-size:13px">Chance spirits reveal correct answer: ' +
      '<b><span id="elf-burn-pct">' + Math.min(canBurn * pctPerStack, 100) + '</span>%</b>' +
    '</div>';

  okBtn.textContent = 'Ask the Spirits';
  cancelBtn.textContent = 'Cancel';
  overlay.classList.add('active');

  function cleanup() {
    overlay.classList.remove('active');
    msgEl.innerHTML = '';
    okBtn.textContent = 'OK';
    cancelBtn.textContent = 'Cancel';
    okBtn.removeEventListener('click', handleOk);
    cancelBtn.removeEventListener('click', handleCancel);
    overlay.removeEventListener('click', handleOverlay);
  }
  function handleOk() {
    var slider = document.getElementById('elf-burn-slider');
    var burned = slider ? parseInt(slider.value, 10) : canBurn;
    cleanup();
    _resolveElfSpirit(burned);
  }
  function handleCancel() { cleanup(); }
  function handleOverlay(e) { if (e.target === overlay) handleCancel(); }
  okBtn.addEventListener('click', handleOk);
  cancelBtn.addEventListener('click', handleCancel);
  overlay.addEventListener('click', handleOverlay);
}

function _resolveElfSpirit(burned) {
  var current = S.ironElfSpiritLove || 0;
  var maxBurn = S.ironMasteryActive ? 10 : 20;
  var pctPerStack = S.ironMasteryActive ? 10 : 5;
  burned = Math.min(burned, Math.min(current, maxBurn));

  S.ironElfSpiritLove = current - burned;
  prRecord(function(pr){ pr.elfSpiritLoveSpent = (pr.elfSpiritLoveSpent || 0) + burned; });

  var correctChance = Math.min(burned * pctPerStack / 100, 1);
  var q = S.shuffled[S.cur];
  var correctDisplayIdx = q._order.indexOf(q.answer);
  var spiritIsCorrect = Math.random() < correctChance;
  var chosenIdx;
  if (spiritIsCorrect) {
    chosenIdx = correctDisplayIdx;
    prRecord(function(pr){ pr.elfSpiritCorrectTells = (pr.elfSpiritCorrectTells || 0) + 1; });
  } else {
    // Spirit picks randomly from non-removed choices (may still accidentally land on correct)
    var available = [];
    for (var i = 0; i < q._order.length; i++) {
      if (!S.ironRemoved[i]) available.push(i);
    }
    var wrongChoices = available.filter(function(i){ return i !== correctDisplayIdx; });
    // If all other choices removed, forced to pick correct anyway
    chosenIdx = wrongChoices.length > 0
      ? wrongChoices[Math.floor(Math.random() * wrongChoices.length)]
      : correctDisplayIdx;
    // If the random wrong pick accidentally matched correct, that's still a wrong roll
  }

  S.ironSkillUsedThisQ = true;
  S.ironElfSpiritSuggestion = chosenIdx;   // display index — highlighted in UI
  S.ironElfSpiritWasCorrect = spiritIsCorrect;

  var pctLabel = Math.min(burned * pctPerStack, 100);
  S.ironSkillEvent = '🧝 Spirit Judgement — burned ' + burned + ' stack' + (burned !== 1 ? 's' : '') +
    ' (' + pctLabel + '% chance correct) · Spirit Love remaining: ' + S.ironElfSpiritLove +
    ' · Spirit points at choice ' + ['A','B','C','D'][chosenIdx];
  // Happy to Help: 1% heal chance per stack burned
  if (S.ironUpgradeActive && burned > 0 && S.ironWrong > 0 && Math.random() < burned / 100) {
    S.ironWrong--; S.ironLives = S.ironMaxLives - S.ironWrong;
    S.ironSkillEvent += ' · 🌿 Happy to Help — the spirits heal you! +1 HP!';
  }
  render();
}

function mediumPeekChoice(displayIdx) {
  // Called when player clicks a choice while in Possession state (before answering)
  if (!S.ironMediumPossessing) return;
  var q = S.shuffled[S.cur];
  if (S.ironRemoved[displayIdx]) return;

  if (S.ironMediumPeekedPos === null) {
    // First click: reveal if correct or wrong
    S.ironMediumPeekedPos = displayIdx;
    // Mastery: Possession ends after peek so skill can be used again
    // No mastery: Possession stays active until the player clicks to answer
    if (S.ironMasteryActive) S.ironMediumPossessing = false;
    var isCorrect = (q._order[displayIdx] === q.answer);
    // Track for Call for Validation achievement + PR stat
    S.ironMediumTotalPeeks = (S.ironMediumTotalPeeks || 0) + 1;
    if (isCorrect) {
      S.ironMediumCorrectPeeks = (S.ironMediumCorrectPeeks || 0) + 1;
      prRecord(function(pr){ pr.mediumCorrectPeeks = (pr.mediumCorrectPeeks || 0) + 1; });
    } else {
      S.ironMediumAnyWrongPeek = true;
      // Soul Rejuvenation: 20% chance to heal 1 life when a wrong answer is revealed
      if (S.ironUpgradeActive && S.ironWrong > 0 && Math.random() < 0.20) {
        S.ironWrong--; S.ironLives = S.ironMaxLives - S.ironWrong;
        S.ironSkillEvent = '✨ Soul Rejuvenation — the spirits compensate! +1 HP restored!';
        render();
      }

      unlockAchievement('call_for_validation');
    }
    S.ironSkillEvent = '✨ The dead speak… ' + ['A','B','C','D'][displayIdx] + ' is ' +
      (isCorrect ? '✅ CORRECT — the dead confirm it!' : '❌ WRONG — the dead warn you away!') +
      (S.ironMasteryActive && S.ironMediumPossession > 0 ? ' · Use skill again to peek another, or click any choice to answer.' : ' Click the same choice again to answer, or pick another.');
    render();

  }
}

/* ─────────────────────────────────────────────
   ASSASSIN: STAB
───────────────────────────────────────────── */
function useAssassinStab() {
  if (!S.ironMode || S.ironClass !== 'assassin') return;
  if (S.done || S.ironSkillUsedThisQ) return;

  var q = S.shuffled[S.cur];
  var topic = q ? q.topic : null;
  if (!topic) return;

  var stabbedCount = S.ironAssassinStabbed[topic] || 0;
  var maxStabs = S.ironMasteryActive ? 2 : 1;
  if (stabbedCount >= maxStabs) {
    S.ironSkillEvent = '🗡️ Stab — ' + esc(topic) + ' has already been stabbed to its limit.';
    S.ironSkillUsedThisQ = true;
    render();
    return;
  }

  var exposure = S.ironAssassinExposure[topic] || 0;
  if (exposure === 0) {
    S.ironSkillEvent = '🗡️ Stab — No Exposure stacks on this topic yet. Answer more questions from it correctly first.';
    S.ironSkillUsedThisQ = true;
    render();
    return;
  }

  // Determine stab chance
  var isSecondStab = (stabbedCount === 1);
  var pctPerStack = isSecondStab ? (S.ironUpgradeActive ? 0.15 : 0.05) : 0.25;
  var stabChance = Math.min(exposure * pctPerStack, 1);

  // Consume ALL exposure stacks for this topic

      var removedPos = -1;
      for (var pi = tq._order.length - 1; pi >= 0; pi--) {

      tq._order.splice(removedPos, 1);

      // After splice, the old removedPos no longer exists in _order, so we
      // simply clear ironRemoved entirely and re-mark only positions that are
      // genuinely absent from _order (i.e. were removed by bombs earlier).

            // its new slot; instead keep ironRemoved synced by display position.
          }

        var remapped = {};

    if (isSecondStab) {

    } else {

  }

}

function isIronClassUnlocked(key, pr) {
  if (key === 'mage') {

function startIronTimer() {
  stopIronTimer();
  S.ironTimeLeft = 30;
  updateTimerDisplay();
  S.ironTimerInterval = setInterval(function() {
    S.ironTimeLeft--;
    updateTimerDisplay();
    if (S.ironTimeLeft <= 0) {
      stopIronTimer();
      // Time's up = wrong answer
      S.done = true;
      // Honour Sneak and Treasure Hunter Silent Shoes on timeout (same as wrong-answer)
      if (S.ironClass === 'thief' && S.ironThiefSneakActive) {
        S.ironThiefSneakActive = false;
        showBanner('synced', '🗝️ Sneak — Time\'s up, but you slipped away! Streak preserved.', 2500);
      } else if (S.ironClass === 'thief' && S.ironUpgradeActive && S.ironShieldRounds > 0) {
        showBanner('synced', '🗝️ Silent Shoes — Shield blocked the damage and protected your streak!', 2500);
      } else {
        S.ironStreak = 0;
      }
      var q = S.shuffled[S.cur];
      S.chosen = -1; // no choice = timeout
      S.missed.push({ subj: q.subj, topic: q.topic, q: q.question, ok: q.choices[q.answer], bad: '⏱ Time ran out' });
      S.ironTotalWrong++;
      // Mage passive: +3 Mana on timeout (treated same as wrong answer but intentional skip)
      if (S.ironClass === 'mage') {
        S.ironMageMana = (S.ironMageMana || 0) + 3;
        showBanner('synced', '✨ Mana +3 (' + S.ironMageMana + ' total)', 1400);
      }
      if (S.ironClass === 'beastman' && S.ironBeastWildRoarActive) {
        // Wild Roar: a wrong answer (including timeout) costs 2 lives; shields cannot block this
        if (S.ironUpgradeActive) S.ironBeastConsecutiveWildRoar = 0;
        applyIronDamage(2);
      } else if (S.ironShieldRounds > 0) {
        S.ironShielded = true;
        S.ironTotalShieldBlocks++;
        if (S.ironClass === 'knight') {
          S.ironKnightBlocksThisRun = (S.ironKnightBlocksThisRun || 0) + 1;
          if (S.ironKnightBlocksThisRun >= 5) unlockAchievement('shield_wall');
          // Hand Calluses: 8% chance to heal 1 HP on block
          if (S.ironUpgradeActive && S.ironWrong > 0 && Math.random() < 0.08) {
            S.ironWrong--; S.ironLives = S.ironMaxLives - S.ironWrong;
            showBanner('synced', '🛡️ Hand Calluses — the impact forged you! +1 HP restored!', 2500);
          }
        }
      } else {
        applyIronDamage();
      }
      render();
      if (S.ironWrong >= S.ironMaxLives) setTimeout(function() { S.screen = 'ironover'; render(); }, 900);
    }
  }, 1000);
}
function stopIronTimer() {
  if (S.ironTimerInterval) { clearInterval(S.ironTimerInterval); S.ironTimerInterval = null; }
}
function updateTimerDisplay() {
  var bar = document.getElementById('ironTimerBar');
  var lbl = document.getElementById('ironTimerLabel');
  if (bar) {
    var pct = (S.ironTimeLeft / 30) * 100;
    bar.style.width = pct + '%';
    // Color shift: green → yellow → red
    if (S.ironTimeLeft > 15) bar.style.background = '#27ae60';
    else if (S.ironTimeLeft > 8) bar.style.background = '#d4a052';
    else bar.style.background = '#e74c3c';
  }
  if (lbl) lbl.textContent = S.ironTimeLeft + 's';
}

function screenNmCheckpoint() {
  var blockStart = S.nmCheckpointAt;
  var blockEnd   = S.cur;
  var blockTotal = blockEnd - blockStart + 1;
  // Count only non-GY-injected future questions for the display (GY returns don't extend the run)
  var remaining = 0;
  for (var ri = S.cur + 1; ri < S.shuffled.length; ri++) {
    if (!S.shuffled[ri]._gyEntry) remaining++;
  }

  // Only push a checkpoint record the FIRST time this checkpoint renders.
  // Guard by checking if the last history entry already covers this block end.
  var lastCP = S.nmCheckpointHistory.length > 0
    ? S.nmCheckpointHistory[S.nmCheckpointHistory.length - 1] : null;
  var alreadyRecorded = lastCP && lastCP.blockEnd === blockEnd;

  if (!alreadyRecorded) {
    // scoreAtBlockStart = score recorded at the END of the previous block
    var scoreAtBlockStart = lastCP ? lastCP.scoreAtEnd : (S._resumeScoreBase !== undefined ? S._resumeScoreBase : 0);
    var cpEntry = {
      blockStart:      blockStart,
      blockEnd:        blockEnd,
      scoreAtStart:    scoreAtBlockStart, // score going INTO this block
      scoreAtEnd:      S.score,           // score coming OUT of this block
      // Retry restores to the START of this block (S.nmBlockStartSnap), not its
      // end. Restoring the end-of-block state and then rewinding S.cur back to
      // blockStart would "reawaken" graveyard returns already answered inside
      // this block while leaving any newer copies they spawned still queued
      // further out — producing duplicate copies of the same entry. Restoring
      // the true pre-block state avoids that entirely.
      snap:            S.nmBlockStartSnap,
    };
    S.nmCheckpointHistory.push(cpEntry);
  }

  var current = S.nmCheckpointHistory[S.nmCheckpointHistory.length - 1];
  var blockScore = current.scoreAtEnd - current.scoreAtStart;
  var blockPct   = blockTotal > 0 ? Math.round((blockScore / blockTotal) * 100) : 0;
  var passed     = blockPct >= 70;

  return '<div class="nm-checkpoint-wrap">'+
    '<div class="nm-checkpoint-badge">🚩</div>'+
    '<div class="nm-checkpoint-title">Checkpoint!</div>'+
    '<div class="nm-checkpoint-sub">You just completed questions '+(blockStart+1)+'–'+(blockEnd+1)+'. Here’s how you did:</div>'+
    '<div class="nm-checkpoint-stat-row">'+
      '<span class="nm-checkpoint-pill">✅ '+blockScore+' / '+blockTotal+' correct</span>'+
      '<span class="nm-checkpoint-pill" style="color:'+(passed?'var(--green-text)':'var(--red-text)')+'">'+blockPct+'% '+(passed?'Passing':'Below 70%')+'</span>'+
      '<span class="nm-checkpoint-pill">'+remaining+' questions left</span>'+
    '</div>'+
    '<div class="nm-checkpoint-btns">'+
      '<button class="btn pri" onclick="nmCheckpointContinue()">Continue →</button>'+
      '<button class="btn" onclick="nmCheckpointRetry()">↺ Retry last 15 questions</button>'+
      (S.nmEraser && S.cur > 0 ? '<button class="nm-eraser-btn" style="align-self:center;margin-top:4px" onclick="nmEraseOne()">✏️ Undo last answer</button>' : '')+
    '</div>'+
  '</div>';
}

function nmCheckpointContinue() {
  S.nmCheckpointAt = S.cur + 1;
  S.nmCheckpointReturnAt = S.cur + 1; // undo from this question (or any after, while unanswered) returns to checkpoint
  S.screen = 'quiz';
  S.cur++;
  S.done = false; S.chosen = null;
  S.nmIsGraveyardQ = !!(S.shuffled[S.cur] && S.shuffled[S.cur]._gyEntry);
  S.nmGraveyardReturnInfo = S.nmIsGraveyardQ ? { prevAnswer: S.shuffled[S.cur]._gyPrevAnswer, returnNum: (S.shuffled[S.cur] && S.shuffled[S.cur]._gyReturnNum) || 1 } : null;
  // Snapshot the start of this new block — see nmBlockStartSnap comment in startQuiz().
  S.nmBlockStartSnap = nmSnapshot();
  render();
}

function nmCheckpointRetry() {
  unlockAchievement('run_it_back');
  // Pop the current block's record — we are retrying it
  var thisCP = S.nmCheckpointHistory.pop();

  // The score baseline for this retry = scoreAtStart of the block we just popped
  var retryScoreBase = thisCP ? thisCP.scoreAtStart : 0;
  var blockStart = thisCP ? thisCP.blockStart : S.nmCheckpointAt;

  // Restore quiz state from the snapshot taken at the START of this block
  if (thisCP && thisCP.snap) {
    nmRestore(thisCP.snap);
  } else {
    // Fallback: manual reset to block start
    S.score = retryScoreBase;
    S.missed = [];
    S.nmCheckpointAt = blockStart;
  }

  // Save undo entry AFTER nmRestore so it isn't wiped by the restore
  if (S.nmEraser) {
    var undoSnap = nmSnapshot();
    undoSnap.nmCheckpointHistory = S.nmCheckpointHistory.concat([thisCP]);
    S.nmHistory.push(undoSnap);
  }

  // Ensure position and state are correct for the retry
  S.cur = blockStart;
  S.score = retryScoreBase; // always enforce — in case snap had drift
  S.nmCheckpointReturnAt = -1; // retry resets the post-checkpoint boundary
  S.done = false; S.chosen = null;
  S.nmIsGraveyardQ = !!(S.shuffled[S.cur] && S.shuffled[S.cur]._gyEntry);
  S.nmGraveyardReturnInfo = S.nmIsGraveyardQ ? { prevAnswer: S.shuffled[S.cur]._gyPrevAnswer, returnNum: (S.shuffled[S.cur] && S.shuffled[S.cur]._gyReturnNum) || 1 } : null;
  S.nmCheckpointAt = blockStart;
  S.screen = 'quiz';
  render();
}

    '<button class="iron-back-btn" style="margin-top:20px" onclick="goTo(\'home\')">← I\'m not ready for this</button>'+
  '</div>';
}
function screenIronCodex() {
  var entries = codexLoad();
  var pr2 = prLoad();
  var hasLunar = pr2.shopMoonCodex;
  var IRON_CLASS_ICONS = {};
  for (var k in IRON_CLASSES) IRON_CLASS_ICONS[k] = IRON_CLASSES[k].icon;

  // Build display list: starred entries (most recent first) then unstarred (most recent first)
  // We preserve raw index so star/unstar calls use the correct position in the saved array
  var starred = [], unstarred = [];
  entries.forEach(function(e, i) { (e.starred ? starred : unstarred).push({ e: e, rawIndex: i }); });
  var displayList = starred.concat(unstarred);

  var entriesHtml = '';
  if (!displayList.length) {
    entriesHtml =
      '<div style="text-align:center;padding:40px 0;color:var(--sub)">'+
        '<div style="font-size:36px;margin-bottom:10px">🕊️</div>'+
        '<div style="font-size:14px">No fallen questions yet.<br>Survive your first Iron Man run to fill the '+esc(codexLabel())+'.</div>'+
      '</div>';
  } else {
    // Section header for starred block
    var lastWasStarred = null;
    entriesHtml = displayList.map(function(item, displayIdx) {
      var e = item.e, rawIndex = item.rawIndex;
      var isStarred = !!e.starred;
      var sectionHeader = '';
      if (hasLunar) {
        if (isStarred && lastWasStarred === false) sectionHeader = ''; // shouldn't happen
        if (isStarred && lastWasStarred === null) {
          sectionHeader = '<div style="font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin:0 0 8px">⭐ Starred Deaths</div>';
        }
        if (!isStarred && lastWasStarred !== false) {
          sectionHeader = '<div style="font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:'+(lastWasStarred === null ? '0' : '16px')+' 0 8px">📜 Death Records</div>';
        }
      }
      lastWasStarred = isStarred;

      var clsIcon = IRON_CLASS_ICONS[e.cls] || '⚔️';
      var cause = e.cause || 'wrong_answer';
      var causeIcon, causeLabel, redLabel;
      if (cause === 'timeout') {
        causeIcon = '⏱️'; causeLabel = 'Time Out'; redLabel = '⏱️ Cause of death: Time ran out';
      } else if (cause === 'rogue_escape') {
        causeIcon = '🎲'; causeLabel = 'Risky Escape Failed'; redLabel = '🎲 Cause of death: Risky Escape — the coin flip didn\'t go your way';
      } else if (cause === 'alchemist_transmutation') {
        causeIcon = '⚗️'; causeLabel = 'Transmutation Backfired'; redLabel = '⚗️ Cause of death: Transmutation — sacrificed the last life for consumables';
      } else if (cause === 'mage_vespera') {
        causeIcon = '✨'; causeLabel = 'Vespera Consumed You'; redLabel = '✨ Cause of death: Vespera — streak was below 15, the forbidden magic claimed your last life';
      } else {
        causeIcon = '❌'; causeLabel = 'Wrong Answer'; redLabel = '❌ You picked: ' + esc(e.chosen);
      }

      var borderColor = isStarred ? 'var(--gold-glow)' : 'var(--bd)';
      var bgExtra = isStarred ? 'background:var(--gold-bg);' : '';

      var starBtn = hasLunar
        ? '<button onclick="codexToggleStar('+rawIndex+')" title="'+(isStarred?'Unstar this death':'Star this death — pins it to the top and protects it from deletion')+'" style="background:none;border:none;cursor:pointer;font-size:18px;padding:2px 4px;line-height:1;opacity:'+(isStarred?'1':'0.35')+';transition:opacity .15s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=\''+(isStarred?'1':'0.35')+'\'">⭐</button>'
        : '';

      return (
        sectionHeader+
        '<div style="'+bgExtra+'border:0.5px solid '+borderColor+';border-radius:var(--r);padding:14px 16px;margin-bottom:12px">'+
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
            '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'+
              '<span style="font-size:11px;font-weight:700;color:var(--muted)">#'+(displayIdx+1)+'</span>'+
              '<span style="font-size:11px;color:var(--hint)">·</span>'+
              '<span style="font-size:11px;font-weight:600;color:var(--text)">'+clsIcon+' '+(e.cls ? e.cls.charAt(0).toUpperCase()+e.cls.slice(1) : '—')+'</span>'+
              '<span style="font-size:11px;color:var(--hint)">·</span>'+
              '<span style="font-size:11px;color:var(--muted)">Score '+e.score+'</span>'+
              '<span style="font-size:11px;color:var(--hint)">·</span>'+
              '<span style="font-size:11px;color:var(--muted)">Round '+e.round+'</span>'+
            '</div>'+
            '<div style="display:flex;align-items:center;gap:4px;flex-shrink:0">'+
              starBtn+
              '<span style="font-size:10px;color:var(--hint);white-space:nowrap">'+esc(e.date)+'</span>'+
            '</div>'+
          '</div>'+
          '<div style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--red-text);background:var(--red-bg);border:0.5px solid var(--red-bd);border-radius:20px;padding:2px 10px;margin-bottom:10px">'+
            causeIcon+' '+esc(causeLabel)+
          '</div>'+
          '<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;line-height:1.5">'+esc(e.question)+'</div>'+
          '<div style="display:flex;flex-direction:column;gap:6px">'+
            '<div style="font-size:12px;padding:8px 12px;border-radius:var(--rs);background:var(--green-bg);border:0.5px solid var(--green-bd);color:var(--green-text)">'+
              '✅ Correct answer: '+esc(e.correct)+
            '</div>'+
            '<div style="font-size:12px;padding:8px 12px;border-radius:var(--rs);background:var(--red-bg);border:0.5px solid var(--red-bd);color:var(--red-text)">'+
              redLabel+
            '</div>'+
          '</div>'+
        '</div>'
      );
    }).join('');
  }

  var hasUnstarred = unstarred.length > 0;
  var hasStarred   = starred.length > 0;
  var clearBtn = '';
  if (hasUnstarred) {
    clearBtn += '<button class="btn" style="width:100%;margin-top:4px;font-size:12px;color:var(--muted)" onclick="selenaConfirm(\'Clear all unstarred Codex entries?\',function(){var es=codexLoad().filter(function(e){return !!e.starred;});codexSave(es);goTo(\'ironcodex\');})">🗑 Clear Unstarred Deaths</button>';
  }
  if (hasStarred && hasLunar) {
    clearBtn += '<button class="btn" style="width:100%;margin-top:4px;font-size:12px;color:var(--muted)" onclick="selenaConfirm(\'Clear ALL entries including starred? This cannot be undone.\',function(){localStorage.removeItem(\''+CODEX_KEY+'\');goTo(\'ironcodex\');})">🗑 Clear All (including ⭐ Starred)</button>';
  } else if (!hasUnstarred && hasStarred && !hasLunar) {
    clearBtn = '<button class="btn" style="width:100%;margin-top:4px;font-size:12px;color:var(--muted)" onclick="selenaConfirm(\'Clear all Codex entries?\',function(){localStorage.removeItem(\''+CODEX_KEY+'\');goTo(\'ironcodex\');})">🗑 Clear '+codexLabel()+'</button>';
  } else if (!hasStarred && !hasUnstarred) {
    clearBtn = '';
  }

  var lbl = codexLabel();
  var jesterCard = hasLunar
    ? '<div class="jester-card" onclick="jesterOpenOrReturn()">'+
        '<div class="jester-card-avatar">🃏</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div class="jester-card-name">JESTER</div>'+
          '<div class="jester-card-sub">The Prisoner of the Lunar Codex · Tap to speak</div>'+
        '</div>'+
        '<div style="font-size:18px;opacity:.5">›</div>'+
      '</div>'
    : '';

  var starHint = hasLunar && entries.length
    ? '<div style="font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.6">⭐ Tap the star on any death to pin it to the top and protect it from deletion when the log fills up.</div>'
    : '';

  return (
    '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:18px">'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:18px;font-weight:700;color:var(--text);line-height:1.2">📜 '+esc(lbl)+'</div>'+
        '<div style="font-size:12px;color:var(--muted);margin-top:2px">Questions that ended your runs · Last '+codexMax()+' deaths recorded'+(hasLunar ? ' · ⭐ Starred deaths are protected' : '')+'</div>'+
      '</div>'+
      '<button class="dm-btn" title="Toggle theme" onclick="toggleDark()">'+(THEME_ICONS[S.theme]||'🌙')+'</button>'+
    '</div>'+
    jesterCard+
    starHint+
    entriesHtml+
    clearBtn+
    '<div class="brow" style="margin-top:16px">'+
      '<button class="btn" onclick="goTo(\'home\')">← Back to Home</button>'+
    '</div>'
  );
}

function screenIronOver() {
  stopIronTimer();

  // ── Iron Codex: record the killing question (only on natural death, not exit) ──
  if (!S.ironRunSaved) {
    var _q = S.shuffled && S.shuffled[S.cur];
    if (_q) {
      var _chosenLabel = S.chosen !== null && S.chosen !== undefined && S.chosen >= 0
        ? _q.choices[S.chosen] : '(unanswered)';
      var _cause = (S.chosen === -1) ? 'timeout' : 'wrong_answer';
      codexPushDeath({
        question: _q.question,
        correct:  _q.choices[_q.answer],
        chosen:   _chosenLabel,
        cause:    _cause,
        cls:      S.ironClass || '—',
        score:    S.score || 0,
        round:    S.ironRound || 0,
        date:     new Date().toLocaleString()
      });
    }
  }

  // ── Personal Records: save Iron Man run stats ──
  if (!S.ironRunSaved) {
    S.ironRunSaved = true;
    prRecord(function(pr) {
      pr.ironRoundsSurvivedAllTime += (S.ironTotalRounds || 0);
      if (S.ironHighStreak > pr.ironLongestStreakEver) pr.ironLongestStreakEver = S.ironHighStreak;
      if (S.score > pr.ironHighestScore) pr.ironHighestScore = S.score;
      if (S.ironClass && S.score > pr.ironClassBest[S.ironClass]) pr.ironClassBest[S.ironClass] = S.score;
    });
  }
  var msgs = [
    'Every run makes you sharper. The questions fear your return.',
    'You pushed further than most dare. Come back stronger.',
    'Defeat is just data. Now you know where to focus.',
    'The best engineers are forged through failure. Keep going.',
    'One more run and you will surprise yourself.',
    'This is how mastery is built — one hard attempt at a time.',
    'Iron Man rewards the persistent. You are not done yet.',
    'Each wrong answer is a lesson. You just leveled up without knowing it.'
  ];
  var msg = msgs[Math.floor(Math.random() * msgs.length)];

  var totalRounds  = S.ironTotalRounds || 0;
  var correctAns   = S.ironTotalCorrect || 0;
  var accuracy     = totalRounds > 0 ? Math.round((correctAns / totalRounds) * 100) : 0;
  var highStreak   = S.ironHighStreak || 0;
  var wrongAns     = S.ironTotalWrong || 0;
  var shieldBlocks = S.ironTotalShieldBlocks || 0;
  var skipped      = S.ironTotalSkipped || 0;
  var bombsRemoved = S.ironTotalBombsRemoved || 0;
  var necroRemovals = (S.ironClass === 'necromancer') ? S.necroGraveyard.length : -1;

  function statRow(icon, label, value, colour) {
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid #2c2a48">'+
      '<span style="font-size:13px;color:#9590ad">'+icon+' '+label+'</span>'+
      '<span style="font-size:14px;font-weight:700;color:'+(colour||'#ebe8f7')+'">'+value+'</span>'+
    '</div>';
  }

  var accuracyColour = accuracy >= 70 ? '#4caf8a' : accuracy >= 40 ? '#d4a052' : '#e07070';

  var statsHtml =
    '<div style="background:#1b1930;border:0.5px solid #2c2a48;border-radius:10px;padding:14px 18px;margin:18px 0;width:100%;max-width:400px;text-align:left">'+
      '<div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#6e6890;margin-bottom:8px">Run Statistics</div>'+
      statRow('&#128293;', 'Highest Streak',          highStreak,   '#f0c040')+
      statRow('&#127919;', 'Game Accuracy',            accuracy+'%', accuracyColour)+
      statRow('&#10060;',  'Wrong Answers',            wrongAns,     '#e07070')+
      statRow('&#128737;', 'Damage Blocked by Shield', shieldBlocks, '#4a9edd')+
      statRow('&#9197;',   'Skipped Questions',        skipped,      '#9590ad')+
      statRow('&#128163;', 'Choices Removed by Bombs', bombsRemoved, '#e67e22')+
      (necroRemovals >= 0 ? statRow('&#128128;', 'Graveyard Souls Remaining', necroRemovals, '#e07070') : '')+
    '</div>';

  return '<div class="iron-gameover-wrap">'+
    '<div class="iron-gameover-icon">&#128128;</div>'+
    '<div class="iron-gameover-title">GAME OVER</div>'+
    '<div class="iron-gameover-score">You scored <strong>'+S.score+'</strong> point'+(S.score!==1?'s':'')+' across <strong>'+totalRounds+'</strong> round'+(totalRounds!==1?'s':'')+' before falling.</div>'+
    statsHtml+
    '<div class="iron-gameover-msg" style="font-style:italic;color:#9590ad;margin-bottom:24px">'+esc(msg)+'</div>'+
    '<button class="iron-gameover-btn" onclick="goTo(\'home\')">&#8592; Return home</button>'+
  '</div>';
}

function screenNecroCoinFlip() {
  // Upgrade: Conqueror of Life → dice. Base: Master of Death → coins.
  if (S.ironUpgradeActive) return _screenNecrodice();
  return _screenNecroCoin();
}

function _screenNecrodice() {
  var DICE_FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];
  if (!S.necroCoinResults) {
    // Roll one die (1–6)
    var rolled = Math.floor(Math.random() * 6) + 1;
    S.necroCoinResults = [rolled]; // store result as array of 1 number
    S.necroCoinChoice = null;
  }
  var rolledFace = S.necroCoinResults[0];
  var chosen = S.necroCoinChoice; // null or 1–6
  var gyCount = S.necroGraveyard.length;
  var removals = S.ironNecroRemovals || 0;

  var diceHtml = '<div style="font-size:80px;line-height:1;margin:18px 0">' +
    (chosen !== null ? DICE_FACES[rolledFace - 1] : '🎲') + '</div>';

  var actionHtml = '';
  if (chosen === null) {
    // Player picks 1–6
    var btnRow = DICE_FACES.map(function(f, i) {
      return '<button class="btn" style="font-size:24px;padding:8px 14px;margin:4px" onclick="necroCoinChoose(' + (i+1) + ')">' + f + '</button>';
    }).join('');
    actionHtml =
      '<p style="color:var(--muted);font-size:14px;margin-bottom:12px">The die is cast — choose a face to challenge death.</p>' +
      '<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px;margin-bottom:8px">' + btnRow + '</div>';
  } else {
    var guessedRight = (chosen === rolledFace);
    if (guessedRight) {
      actionHtml =
        '<p style="font-size:14px;margin-bottom:8px">You chose <strong>' + DICE_FACES[chosen-1] + '</strong> — <span style="color:#4caf8a;font-weight:700">The die agrees. You live.</span></p>' +
        '<button class="btn pri" style="margin-top:12px;padding:10px 28px" onclick="necroCoinContinue()">Rise Again →</button>';
    } else {
      var bonusScore = (gyCount * 3) + (removals * 5);
      actionHtml =
        '<p style="font-size:14px;margin-bottom:8px">You chose <strong>' + DICE_FACES[chosen-1] + '</strong> — <span style="color:#e07070;font-weight:700">Wrong. But your work earns +' + bonusScore + ' score.</span></p>' +
        '<p style="font-size:12px;color:var(--muted);margin-bottom:8px">' + gyCount + ' soul' + (gyCount!==1?'s':'') + ' × 3 = +' + (gyCount*3) + ' · ' + removals + ' redeemed × 5 = +' + (removals*5) + '</p>' +
        '<button class="btn pri" style="margin-top:12px;padding:10px 28px" onclick="necroCoinContinue()">Accept Fate →</button>';
    }
  }

  return '<div class="iron-confirm-wrap">' +
    '<div class="iron-confirm-badge">🎲</div>' +
    '<div class="iron-confirm-title">CONQUEROR OF LIFE</div>' +
    '<div class="iron-confirm-sub">One die. One chance. Guess the face and live — or fall with honor.</div>' +
    diceHtml +
    actionHtml +
  '</div>';
}

function _screenNecroCoin() {
  var graveyardCount = S.necroGraveyard.length;
  // Generate coin results if not yet done this activation
  if (!S.necroCoinResults) {
    S.necroCoinResults = [];
    for (var i = 0; i < graveyardCount; i++) {
      S.necroCoinResults.push(Math.random() < 0.5 ? 'heads' : 'tails');
    }
    S.necroCoinChoice = null; // player hasn't chosen yet
  }

  var chosen = S.necroCoinChoice;

  function coinHtml(result, idx) {
    var revealed = chosen !== null;
    var matched = revealed && result === chosen;
    var color = !revealed ? '#f0c040' : matched ? '#4caf8a' : '#e07070';
    var label = revealed ? (matched ? '✔' : '✘') + ' ' + result : '?';
    return '<div style="display:inline-flex;flex-direction:column;align-items:center;gap:4px;margin:6px">' +
      '<div style="width:52px;height:52px;border-radius:50%;border:2px solid ' + color + ';background:var(--surface);' +
        'display:flex;align-items:center;justify-content:center;font-size:20px;color:' + color + ';font-weight:700">' +
        (revealed ? (result === 'heads' ? '👑' : '🌙') : '🪙') +
      '</div>' +
      '<div style="font-size:11px;color:' + color + ';font-weight:700">' + (revealed ? result : '?') + '</div>' +
    '</div>';
  }

  var coinsHtml = S.necroCoinResults.map(coinHtml).join('');

  var matches = chosen !== null ? S.necroCoinResults.filter(function(r){ return r === chosen; }).length : 0;
  var survived = matches > 0;

  var actionHtml = '';
  if (chosen === null) {
    // Player chooses
    actionHtml =
      '<p style="color:var(--muted);font-size:14px;margin-bottom:16px">Call your flip — ' + graveyardCount + ' coin' + (graveyardCount !== 1 ? 's' : '') + ' are in the air.</p>' +
      '<div style="display:flex;gap:12px;justify-content:center">' +
        '<button class="btn pri" style="padding:10px 28px;font-size:15px" onclick="necroCoinChoose(\'heads\')">👑 Heads</button>' +
        '<button class="btn pri" style="padding:10px 28px;font-size:15px" onclick="necroCoinChoose(\'tails\')">🌙 Tails</button>' +
      '</div>';
  } else {
    var resultMsg = survived
      ? '<span style="color:#4caf8a;font-weight:700">' + matches + ' coin' + (matches !== 1 ? 's' : '') + ' matched — +' + (matches * 3) + ' score!</span>'
      : '<span style="color:var(--muted);font-weight:700">No coins matched. You rise empty-handed.</span>';
    actionHtml =
      '<p style="font-size:14px;margin-bottom:8px">You called <strong>' + chosen + '</strong>. ' + resultMsg + '</p>' +
      '<button class="btn pri" style="margin-top:12px;padding:10px 28px" onclick="necroCoinContinue()">' +
        'Accept Fate →' +
      '</button>';
  }

  return '<div class="iron-confirm-wrap">' +
    '<div class="iron-confirm-badge">💀</div>' +
    '<div class="iron-confirm-title">MASTER OF DEATH</div>' +
    '<div class="iron-confirm-sub">The graveyard stirs. ' + graveyardCount + ' soul' + (graveyardCount !== 1 ? 's' : '') + ' witness your fall — call the flip and earn your final score.</div>' +
    '<div style="display:flex;flex-wrap:wrap;justify-content:center;margin:16px 0">' + coinsHtml + '</div>' +
    actionHtml +
  '</div>';
}

function necroCoinChoose(face) {
  S.necroCoinChoice = face;
  render();
}

function necroCoinContinue() {
  // Conqueror of Life (upgrade): dice — correct guess = revive 1 life; wrong = bonus score then death
  if (S.ironUpgradeActive) {
    var rolledFace = S.necroCoinResults[0];
    var guessedRight = (S.necroCoinChoice === rolledFace);
    S.necroCoinFlipPending = false;
    S.necroCoinResults = null;
    S.necroCoinChoice = null;
    if (guessedRight) {
      // Revive with 1 life
      S.ironWrong = S.ironMaxLives - 1;
      S.ironLives = 1;
      showBanner('synced', '🎲 Conqueror of Life — Defied death! Revived with 1 life!', 3500);
      S.screen = 'ironquiz';
      render();
    } else {
      // Wrong: bonus score then game over
      var gyCount = S.necroGraveyard.length;
      var removals = S.ironNecroRemovals || 0;
      var bonusScore = (gyCount * 3) + (removals * 5);
      if (bonusScore > 0) {
        S.score += bonusScore;
        S.ironNecroDeathScoreThisRun = (S.ironNecroDeathScoreThisRun || 0) + bonusScore;
        if (S.ironNecroDeathScoreThisRun >= 15) unlockAchievement('martyr_of_death');
        showBanner('synced', '🎲 Conqueror of Life — Wrong face, but your legacy earns +' + bonusScore + ' score!', 3500);
      }
      S.screen = 'ironover';
      render();
    }
    return;
  }
  // Base: Master of Death — coins → bonus score then game over
  var matches = S.necroCoinResults.filter(function(r){ return r === S.necroCoinChoice; }).length;
  // No revive — death stands. Coin matches only award bonus score before game over.
  if (matches > 0) {
    var earned = matches * 3;
    S.score += earned;
    S.ironNecroDeathScoreThisRun = (S.ironNecroDeathScoreThisRun || 0) + earned;
    if (S.ironNecroDeathScoreThisRun >= 15) unlockAchievement('martyr_of_death');
    showBanner('synced', '💀 Master of Death — ' + matches + ' coin' + (matches !== 1 ? 's' : '') + ' matched! +' + earned + ' score!', 3500);
  } else {
    showBanner('synced', '💀 Master of Death — No coins matched. A worthy final stand.', 3000);
  }
  // Cleanup
  S.necroCoinFlipPending = false;
  S.necroCoinResults = null;
  S.necroCoinChoice = null;
  // Death stands — go to game over
  S.screen = 'ironover';
  render();
}

// Check and trigger Class Upgrade milestone (50 points). Safe to call after any score increment.
function checkIronUpgrade() {
  if (!S.ironMode || S.ironUpgradeTriggered || S.score < 50) return;
  if (!S.ironClass || !IRON_UPGRADE_DATA[S.ironClass]) return;
  S.ironUpgradeTriggered = true;
  S.ironUpgradeActive = true;
  prRecord(function(pr) {
    if (S.ironClass && pr.ironClassUpgrade) pr.ironClassUpgrade[S.ironClass] = true;
  });
  render();
  setTimeout(function() { S.screen = 'ironupgrade'; render(); }, 700);
}

function continueAfterUpgrade() {
  S.screen = 'quiz';
  render();
}

function screenSubjects() {
  var cards = S.subjects.map(function(subj, idx) {
    if (!subj.name.trim()) return '';
    var isLoading = (S.loadingSubject === subj.name);
    var err = S.loadErrors[subj.name];
    var cached = S.loadedQ[subj.name];
    var cachedCount = (S._idbCounts && S._idbCounts[subj.name]) || 0;

    var info = '';
    if (cached) {
      info = cached.length + ' question' + (cached.length !== 1 ? 's' : '');
      if (cachedCount > 0) info += ' \u00b7 <span class="cache-badge">\u2713 ' + cachedCount + ' offline</span>';
    } else if (cachedCount > 0) {
      info = cachedCount + ' question' + (cachedCount !== 1 ? 's' : '') + ' <span class="cache-badge">\u2713 offline</span>';
    } else {
      info = '';
    }

    var statusHtml = '';
    if (isLoading) statusHtml = '<div class="subj-count"><span class="spin"></span> Loading\u2026</div>';
    else if (err) statusHtml = '<div class="subj-count" style="color:var(--red-text)">\u26a0 Click to retry</div>';
    else statusHtml = '<div class="subj-count">'+info+'</div>';

    var errBox = err
      ? '<div class="err-box" style="margin-top:6px;font-size:12px;border-radius:0 0 var(--rs) var(--rs)" onclick="event.stopPropagation()"><strong>Error:</strong> '+esc(err)+'</div>'
      : '';

    var cls = 'subj-card' + (isLoading ? ' loading-card' : '');
    var cardStyle = err ? ' style="border-radius:var(--r) var(--r) 0 0;margin-bottom:0"' : '';
    var numLabel = 'Subject ' + (idx + 1);
    return '<div style="margin-bottom:10px">'+
      '<div class="'+cls+'"'+cardStyle+' onclick="selectSubject(\''+esc(subj.name).replace(/'/g,"\\'")+'\')">'+
        '<div class="subj-num">'+numLabel+'</div>'+
        '<div class="subj-name">'+esc(subj.name)+'</div>'+
        statusHtml+
      '</div>'+
      errBox+
    '</div>';
  }).filter(Boolean).join('');

  var onlineStatus = navigator.onLine
    ? ''
    : '<div style="font-size:11.5px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:5px">'+
        '<span style="width:6px;height:6px;border-radius:50%;background:#e07070;display:inline-block"></span>Offline \u2014 subjects with \u2713 offline badge available'+
      '</div>';

  return '<div style="display:flex;align-items:center;gap:10px">'+
      '<button class="nav-back-btn" title="Back to home" onclick="goTo(\'home\')">\u2190</button>'+
      '<div class="selena-logo" style="font-size:24px"><span class="moon">\ud83c\udf19</span>PROJECT <span class="accent">SELENA</span></div>'+
    '</div>'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:12px;margin-bottom:4px">'+
    '<div>'+
      '<p class="sub" style="margin-bottom:0">Select a subject to start practicing</p>'+
      onlineStatus+
    '</div>'+
    '<button class="dm-btn" title="Toggle dark mode" onclick="toggleDark()">'+(THEME_ICONS[S.theme]||'🌙')+'</button>'+
  '</div>'+
  '<div class="subj-grid" style="margin-top:18px">'+cards+'</div>';
}

function screenTopics() {
  var selQ = totalSelected();
  var qs = S.loadedQ[S.curSubject] || [];

  var topicItems = S.topics.map(function(t, ti) {
    var cnt = topicCount(t);
    var chk = S.checkedTopics[t] ? 'checked' : '';
    return '<label class="topic-check">'+
      '<input type="checkbox" '+chk+' onchange="S.checkedTopics[S.topics['+ti+']] = this.checked; renderTopicCounts()">'+
      '<div class="topic-check-lbl">'+
        '<div class="topic-name">'+esc(t)+'</div>'+
        '<div class="topic-cnt">'+cnt+' question'+(cnt!==1?'s':'')+'</div>'+
      '</div>'+
    '</label>';
  }).join('');

  return '<div class="breadcrumb">'+
    '<span onclick="goTo(\'subjects\')">Subjects</span>'+
    '<span class="sep">/</span>'+
    '<span class="cur">'+esc(S.curSubject)+'</span>'+
  '</div>'+
  '<h1>'+esc(S.curSubject)+'</h1>'+
  '<p class="sub">Choose the topics to include in your quiz · <a href="#" onclick="reloadSubject(\''+esc(S.curSubject).replace(/'/g,"\\'")+'\');return false;" style="color:var(--blue-text);text-decoration:none">↺ Reload from Sheets</a></p>'+
  '<div class="card">'+
    '<div class="check-all-row">'+
      '<div class="check-all-btns">'+
        '<button class="check-all-btn" onclick="toggleAll(true); renderTopicCounts()">Select all</button>'+
        '<button class="check-all-btn" onclick="toggleAll(false); renderTopicCounts()">Deselect all</button>'+
      '</div>'+
      '<span class="sel-count" id="selCount">'+selQ+' question'+(selQ!==1?'s':'')+' selected</span>'+
    '</div>'+
    '<div id="topicList">'+topicItems+'</div>'+
  '</div>'+
  '<div class="brow" style="align-items:center">'+
    '<button class="btn" onclick="goTo(\'subjects\')">← Back</button>'+
    '<button class="btn" onclick="S.screen=\'nmsettings\';render()" '+(selQ===0?'disabled':'')+'>⚙ Settings</button>'+
    '<button class="btn pri" id="startBtn" onclick="startQuiz()" '+(selQ===0?'disabled':'')+'>Start quiz ('+selQ+' q) ▶</button>'+
  '</div>';
}

function screenQuiz() {
  var q = S.shuffled[S.cur];
  var total = S.shuffled.length;
  var pct = Math.round(((S.cur + (S.done ? 1 : 0)) / total) * 100);

  var fbHtml = '';
  if (S.done) {
    if (S.skipped) {
      // Thief Gold Rush: skip no longer breaks streak
      var skipMsg = (S.ironClass === 'thief' && S.ironMasteryActive)
        ? '⏭ Skipped — 🗝️ Gold Rush: streak preserved!'
        : '⏭ Skipped — streak broken';
      fbHtml = '<div class="fb no">'+skipMsg+'</div>';
      if (S.ironMode && S.ironSkillEvent) fbHtml += '<div class="iron-skill-event">'+esc(S.ironSkillEvent)+'</div>';
    } else {
      var isOk = (S.chosen === q.answer);
      var fbMsg = isOk ? '✓ Correct!' : (S.chosen === -1 ? '⏱ Time\'s up — correct answer highlighted' : '✗ Incorrect — correct answer highlighted');
      if (!isOk && S.ironMode && S.ironShielded) fbMsg += ' · 🛡 Shield absorbed the damage!';
      if (!isOk && S.ironMode && S.ironPaladinSaved) fbMsg += ' · 🛡️ Paladin\'s resolve — you cling on at 1 life!';
      if (isOk && S.ironMode && S.ironRogueBonus) fbMsg += ' · 🎲 Rogue bonus +1 point!';
      if (isOk && S.ironMode && S.ironRogueSpeedBonus) fbMsg += ' · ⚡ Speedy Slingshot — answered in time! +1 point!';
      if (isOk && S.ironMode && S.ironMonkHeal) fbMsg += ' · 🧘 Monk healing — +1 life!';
      if (isOk && S.ironMode && S.ironMasteryActive && S.ironClass === 'monk') fbMsg += ' · 🎯 Concentration: '+(S.ironMonkHeal ? 'stacks consumed' : S.ironMonkConcentration+' stack'+(S.ironMonkConcentration!==1?'s':'')+' ('+Math.min(S.ironMonkConcentration*2,100)+'% heal chance)');
      if (isOk && S.ironMode && S.ironThiefGrantType) fbMsg += ' · 🗝️ Thief steals a '+IRON_CONSUMABLE_INFO[S.ironThiefGrantType].name+'!';
      if (isOk && S.ironMode && S.ironClass === 'necromancer' && q._necroRedemption) fbMsg += ' · 💀 Soul redeemed — +1 Life & ×1 each consumable!';
      if (!isOk && S.ironMode && S.ironClass === 'necromancer' && q._necroRedemption) fbMsg += ' · 💀 Soul lingers — redemption failed';
      if (isOk && S.ironMode && S.ironClass === 'beastman' && S.ironBeastWildRoarActive) fbMsg += ' · 🐺 Wild Roar — Double score! (+2 points)';
      if (!isOk && S.ironMode && S.ironClass === 'beastman' && S.ironBeastWildRoarActive) fbMsg += ' · 🐺 Wild Roar — Lost 2 lives! Shields offered no protection.';
      if (isOk && S.ironMode && S.ironClass === 'assassin' && S.ironAssassinStabResult === 'success') fbMsg += ' · 🗡️ Stab landed! −1 wrong choice on all ' + esc(q.topic) + ' questions!';
      if (isOk && S.ironMode && S.ironClass === 'assassin' && S.ironAssassinStabResult === 'fail') fbMsg += ' · 🗡️ Stab missed — exposure burned';
      if (isOk && S.ironMode && S.ironClass === 'assassin') fbMsg += ' · 🗡️ Exposure: ' + esc(q.topic) + ' +1 stack (' + (S.ironAssassinExposure[q.topic] || 0) + ' total)';
      if (isOk && S.ironMode && S.ironClass === 'scout' && S.ironScoutReadyUpBonus) fbMsg += ' · 🏹 Ready Up — bonus point claimed!';
      if (isOk && S.ironMode && S.ironClass === 'scout' && S.ironScoutCalculatedBonus) fbMsg += ' · 🔥 Calculated — streak ' + S.ironStreak + ' bonus point!';
      if (!isOk && S.ironMode && S.ironClass === 'scout' && !S.ironScoutReadyUpActive && S.done) {
        // Ready Up was consumed on wrong (streak protected) — handled via banner, nothing extra needed
      }
      if (isOk && S.ironMode && S.ironClass === 'beastman' && !S.ironBeastWildRoarActive && !isBeastFormRound() && !S.ironMasteryActive) fbMsg += ' · 🧍 Human Form — no points this round';
      if (isOk && S.ironMode && S.ironClass === 'beastman' && !S.ironBeastWildRoarActive && !isBeastFormRound() && S.ironMasteryActive) fbMsg += ' · 🐺✨ Free from the Curse — scored in Human Form!';
      fbHtml = '<div class="fb '+(isOk?'ok':'no')+'">'+fbMsg+'</div>';
      if (S.ironMode && S.ironSkillEvent) fbHtml += '<div class="iron-skill-event">'+esc(S.ironSkillEvent)+'</div>';
      // ── Elf: spirit reveal label after answering ──
      if (S.ironMode && S.ironClass === 'elf' && S.ironElfSpiritSuggestion !== null) {
        var elfGraced = S.ironElfSpiritWasCorrect;
        fbHtml +=
          '<div style="display:inline-flex;align-items:center;gap:6px;margin-top:6px;padding:7px 12px;border-radius:var(--rs);font-size:13px;font-weight:600;'+
            (elfGraced
              ? 'background:var(--blue-bg);border:0.5px solid var(--blue);color:var(--blue-text)'
              : 'background:var(--amber-bg);border:0.5px solid var(--bdh);color:var(--amber-text)')+
          '">'+
            (elfGraced
              ? '🧝 The spirits gave you their grace.'
              : '🧝 Spirits don\'t love you that much.')+
          '</div>';
      }
    }
  }

  // ── Graveyard palette ──
  var gyMode = S.nmIsGraveyardQ ? S.nmRedemption : '';
  var gyCardClass = gyMode ? ' gy-card-'+gyMode : '';
  var gyCbtnClass = gyMode ? ' gy-cbtn-'+gyMode : '';

  var choicesHtml = q._order.map(function(origIdx, pos) {
    var cls = '';
    var removed = S.ironMode && S.ironRemoved[pos];
    if (S.done) {
      if (origIdx === q.answer) cls = 'correct';
      else if (origIdx === S.chosen) cls = 'wrong';
    } else if (removed) {
      cls = 'removed';
    }
    // Medium: highlight peeked choice during possession
    var mediumPeekedGlow = (S.ironMode && S.ironClass === 'medium' && S.ironMediumPeekedPos === pos && !S.done)
      ? ' style="outline:2px solid #9b59b6;outline-offset:2px"' : '';
    var mediumPeekedLabel = '';
    if (S.ironMode && S.ironClass === 'medium' && S.ironMediumPeekedPos === pos && !S.done) {
      var _pQ = S.shuffled[S.cur];
      mediumPeekedLabel = (_pQ._order[pos] === _pQ.answer)
        ? ' <span style="font-size:10px;color:#27ae60;font-weight:700">✅ Correct</span>'
        : ' <span style="font-size:10px;color:#e74c3c;font-weight:700">❌ Wrong</span>';
    }
    // Elf: highlight the spirit's suggested choice
    var spiritGlow = (S.ironMode && S.ironClass === 'elf' && S.ironElfSpiritSuggestion === pos && !S.done)
      ? ' style="outline:2px solid #9b59b6;outline-offset:2px"' : '';
    var spiritLabel = (S.ironMode && S.ironClass === 'elf' && S.ironElfSpiritSuggestion === pos && !S.done)
      ? ' <span style="font-size:10px;color:#9b59b6;font-weight:700">🧝 Spirit</span>' : '';
    var umbraRevealGlow = (S.ironMode && S.ironClass === 'mage' && (S.theme||'dark') === 'dark' && S.ironMageUmbraRevealAnswer === pos && !S.done)
      ? ' style="outline:2px solid #8e44ad;outline-offset:2px"' : '';
    var umbraRevealLabel = (S.ironMode && S.ironClass === 'mage' && (S.theme||'dark') === 'dark' && S.ironMageUmbraRevealAnswer === pos && !S.done)
      ? ' <span style="font-size:10px;color:#8e44ad;font-weight:700">✨ Umbra</span>' : '';
    var combinedGlow = mediumPeekedGlow || spiritGlow || umbraRevealGlow;
    return '<button class="cbtn'+gyCbtnClass+' '+cls+'"'+combinedGlow+' onclick="pick('+pos+')" '+((S.done||removed)?'disabled':'')+'>'+
      '<span class="cltr">'+L[pos]+'.</span><span>'+esc(q.choices[origIdx])+(removed?' <span style="font-size:11px;opacity:.7">(removed)</span>':'')+spiritLabel+umbraRevealLabel+mediumPeekedLabel+'</span></button>';
  }).join('');

  var nxBtn = '';
  if (S.done && !(S.ironMode && S.ironWrong >= S.ironMaxLives)) {
    nxBtn = '<button class="btn pri" onclick="next()" style="width:100%;margin-top:6px">'+(S.cur+1>=total?'See results →':'Next question →')+'</button>';
  }

  // Iron Man header: lives + score + timer
  var topBar = '';
  if (S.ironMode) {
    var hearts = '';
    for (var h = 0; h < S.ironMaxLives; h++) {
      hearts += '<span class="iron-heart'+(h >= S.ironLives ? ' dead' : '')+'">❤️</span>';
    }
    var shieldBadge = S.ironShieldRounds > 0 ? '<span class="iron-shield-badge" title="Shield active">🛡 '+S.ironShieldRounds+'r</span>' : '';
    var classInfo = S.ironClass ? IRON_CLASSES[S.ironClass] : null;
    var _upgradeInfo = (S.ironUpgradeActive && S.ironClass && IRON_UPGRADE_DATA[S.ironClass]) ? IRON_UPGRADE_DATA[S.ironClass] : null;
    var _displayName = _upgradeInfo ? _upgradeInfo.upgradedName : (classInfo ? classInfo.name : '');
    var classBadge = classInfo ? '<span style="font-size:11px;color:#9b59b6;margin-left:6px" title="'+esc(classInfo.desc)+'">'+classInfo.icon+' '+esc(_displayName)+'</span>' : '';
    var gyBadge = (S.ironClass === 'necromancer' && S.necroGraveyard.length > 0)
      ? '<span class="nm-graveyard-badge" style="margin-left:6px" title="Graveyard souls">💀 '+S.necroGraveyard.length+'</span>'
      : '';
    topBar =
      '<div style="margin-bottom:6px">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;margin-bottom:3px">'+
          '<div class="iron-lives" style="flex-wrap:wrap;row-gap:2px;flex-shrink:1;min-width:0">'+hearts+'<span style="font-size:12px;color:#c0392b;margin-left:4px;white-space:nowrap">'+S.ironLives+' left</span>'+shieldBadge+'</div>'+
          '<div style="display:flex;align-items:center;gap:4px;flex-shrink:0">'+
            '<span style="color:#c0a060;font-weight:600;font-size:12px;white-space:nowrap">'+S.score+' pts</span>'+
            (S.ironStreak > 1 ? '<span style="font-size:12px;color:#e67e22;font-weight:600;white-space:nowrap">🔥'+S.ironStreak+'</span>' : '')+
            '<button class="dm-btn" onclick="toggleDark()" style="width:26px;height:26px;font-size:13px;border:none;background:none;cursor:pointer">'+(THEME_ICONS[S.theme]||'🌙')+'</button>'+
            '<button class="dm-btn quit-btn" title="Quit to subjects" onclick="quitQuiz()" style="width:26px;height:26px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--muted)">✕</button>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="iron-timer-wrap">'+(S.done?
        ((classBadge || gyBadge) ? '<div style="display:flex;align-items:center;gap:4px">'+classBadge+gyBadge+'</div>' : ''):
        '<div class="iron-timer-bar-bg"><div class="iron-timer-bar" id="ironTimerBar" style="width:100%"></div></div>'+
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:3px">'+
          '<div style="display:flex;align-items:center;gap:4px">'+classBadge+gyBadge+'</div>'+
          '<div class="iron-timer-label" id="ironTimerLabel">30s</div>'+
        '</div>'
      )+'</div>'+
      ironConsumableRow(q)+
      ironSkillRow();
  } else {
    topBar =
      '<div class="qmeta">'+
        '<span>Q '+(S.cur+1)+' / '+total+'</span>'+
        '<div style="display:flex;align-items:center;gap:8px">'+
          '<span>Score: '+S.score+'</span>'+
          '<button class="dm-btn" onclick="toggleDark()" style="width:26px;height:26px;font-size:13px;border:none;background:none;cursor:pointer">'+(THEME_ICONS[S.theme]||'🌙')+'</button>'+
          '<button class="dm-btn quit-btn" title="Quit to subjects" onclick="quitQuiz()" style="width:26px;height:26px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--muted)">✕</button>'+
        '</div>'+
      '</div>'+
      '<div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div>';
  }

  var quitBtn = '<button class="btn" onclick="quitQuiz()" style="width:100%;margin-top:8px;color:var(--muted);font-size:13px">← Return to subjects</button>';

  // ── Study Mode HUD extras ──
  var nmHud = '';
  if (!S.ironMode) {
    var gyActive = S.nmGraveyard.filter(function(e){ return !e.removed; });
    var gyBadge = gyActive.length > 0
      ? '<span class="nm-graveyard-badge">💀 '+gyActive.length+' in graveyard</span>'
      : '';
    var canUndo = S.nmEraser && (S.done || S.cur > 0);
    var eraserBtn = canUndo
      ? '<button class="nm-eraser-btn" onclick="nmEraseOne()">✏️ ' + (S.done ? 'Undo answer' : 'Undo ←') + '</button>'
      : '';
    if (gyBadge || eraserBtn) {
      nmHud = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">'+gyBadge+eraserBtn+'</div>';
    }
    // Graveyard return banner — narrative per mode
    if (S.nmIsGraveyardQ && S.nmGraveyardReturnInfo) {
      var prevA = S.nmGraveyardReturnInfo.prevAnswer || '';
      var retNum = S.nmGraveyardReturnInfo.returnNum || 1;
      var retBannerIcon = '💀';
      var retBannerTxt = '';
      var retBannerClass = 'nm-graveyard-return-banner';

      if (S.nmRedemption === 'ghost') {
        retBannerIcon = '👻';
        retBannerTxt = 'You are being haunted. This question lingers — you once answered: <strong>'+esc(prevA)+'</strong>';
        retBannerClass = 'nm-ghost-banner';
      } else if (S.nmRedemption === 'zombie') {
        retBannerIcon = '🧟';
        retBannerTxt = 'The dead return, calling for you to end their misery.';
        retBannerClass = 'nm-zombie-banner';
      } else if (S.nmRedemption === 'vampire') {
        var vEntry = S.shuffled[S.cur] && S.shuffled[S.cur]._gyEntry;
        var vElim = vEntry ? (vEntry.vampireWrongAnswers || []).length : 0;
        var vOrder = S.shuffled[S.cur] && S.shuffled[S.cur]._order;
        var isPity = vOrder && vOrder.length === 1;
        retBannerIcon = '🧛';
        retBannerClass = 'nm-vampire-banner';
        if (isPity) {
          retBannerTxt = 'There is not much more blood to drain — but this hunger cannot be helped otherwise.';
          retBannerClass = 'nm-pity-banner';
        } else {
          retBannerTxt = 'The vampire comes again for more blood.' + (vElim > 0 ? ' <em>' + vElim + ' wrong choice' + (vElim !== 1 ? 's' : '') + ' drained away.</em>' : '');
        }
      } else if (S.nmRedemption === 'mummy') {
        retBannerIcon = '🧙‍♀️';
        retBannerClass = 'nm-mummy-banner';
        var mummyLines = [
          "<em>“Oh, you’re back. I knew you would be. Come, sit by the fire — I kept your bowl warm.”</em>",
          "<em>“You have your father’s stubbornness, you know. Always wandering off to learn something new. But you always come home.”</em>",
          "<em>“I braided some dried lavender for your room. It keeps the cold spirits away. You used to love the smell.”</em>",
          "<em>“Don’t rush, little one. The cauldron can wait. Tell me about your day first. I want to hear everything.”</em>",
          "<em>“You’ve been quiet lately. That’s alright. I used to hold you without saying a word too. We understood each other that way.”</em>",
          "<em>“I found your old drawings behind the hearth. Lopsided stars and crooked moons. I laughed until I cried. I’m still not sure which one it was.”</em>",
          "<em>“You look at me sometimes… like you’re searching for something I can’t give you. I try not to notice. I’m sorry that I do.”</em>",
          "<em>“Your eyes. I keep looking at your eyes. They’re the right color. They’re the right shape. But… something behind them isn’t hers.”</em>",
          "<em>“What was her laugh like? I’m trying to remember and I can’t. I can’t. Why can’t I remember something so simple?”</em>",
          "<em>“You’re not her. You were never her. And I knew — I think I always knew — I just… I needed someone to feed. Someone to wait for. I’m so sorry, child. I’m so, so sorry. Go. Please go. And don’t look back at this old house.”</em>",
        ];
        var mIdx = Math.min(retNum - 1, mummyLines.length - 1);
        retBannerTxt = mummyLines[mIdx];
      } else {
        retBannerTxt = 'Graveyard Return — you previously answered: <strong>'+esc(prevA)+'</strong>';
      }

      nmHud += '<div class="'+retBannerClass+'">'+retBannerIcon+' '+retBannerTxt+'</div>';
    }
    // Mindful mode overlay
    if (S.nmMindful && S.nmMindfulCount > 0) {
      nmHud += '<div class="nm-mindful-overlay">'+
        '<div class="nm-mindful-box">'+
          '<div class="nm-mindful-title">🧘 Reflect on your mistake</div>'+
          '<div class="nm-mindful-sub">Take a moment to understand why that was wrong before moving on.</div>'+
          '<div class="nm-mindful-count" id="nmMindfulCount">'+S.nmMindfulCount+'</div>'+
        '</div>'+
      '</div>';
    }
  }

  var necroRedemptionBanner = '';
  if (S.ironMode && S.ironClass === 'necromancer' && q._necroRedemption) {
    necroRedemptionBanner = '<div style="'+
      'background:var(--red-bg);border:0.5px solid var(--red-bd);border-radius:var(--rs);'+
      'padding:7px 12px;font-size:12px;color:var(--red-text);margin-bottom:10px;line-height:1.5">'+
      '💀 <strong>Redemption</strong> — This soul rose from your graveyard. Answer correctly for <strong>+1 Life</strong> &amp; <strong>×1 of each consumable</strong>.'+
    '</div>';
  }

  return topBar+nmHud+
  '<div class="card'+gyCardClass+'" style="'+(S.ironMode?'border-color:#c0392b;':'')+'">'+(S.ironMode?'<div style="font-size:11px;font-weight:700;letter-spacing:.08em;color:#e74c3c;margin-bottom:4px">⚡ IRON MAN MODE · Q'+(S.cur+1)+'</div>':'')+
    necroRedemptionBanner+
    '<div class="qsubj">'+esc(q.subj)+'</div>'+
    '<div class="qtopic">'+esc(q.topic)+'</div>'+
    '<div class="qtxt">'+esc(q.question)+'</div>'+
    fbHtml+choicesHtml+nxBtn+
  '</div>'+
  quitBtn;
}

function ironConsumableRow(q) {
  var bombLeft = ironBombCandidatesLeft(q);
  var maxBombUses = (S.ironClass === 'bomber' && S.ironMasteryActive) ? 1 : 3;
  var shieldDisabled = S.done || S.ironConsumables.shield <= 0 || S.ironShieldRounds > 0;
  var skipDisabled   = S.done || S.ironConsumables.skip  <= 0;
  var bombDisabled   = S.done || S.ironConsumables.bomb  <= 0 || S.ironBombsUsedThisQ >= maxBombUses || bombLeft <= 0;
  var shieldTitle = (S.ironClass === 'knight' && S.ironMasteryActive) ? 'Nullifies damage for 3 rounds (Brace for Impact)' : 'Nullifies damage for 2 rounds';
  var skipTitle   = (S.ironClass === 'thief'  && S.ironMasteryActive) ? 'Skip · Gold Rush: streak preserved!' : 'Skip this question · breaks streak';
  var bombTitle   = (S.ironClass === 'bomber' && S.ironMasteryActive) ? 'Remove 2 wrong answers · 1 use per question (Calculated Detonation)' : 'Remove a wrong answer · up to 3 per question';
  return '<div class="iron-consumable-row">'+
    '<button class="iron-cbtn" '+(shieldDisabled?'disabled':'')+' onclick="useIronShield()" title="'+shieldTitle+'">🛡 Shield<span class="iron-cbtn-count">'+S.ironConsumables.shield+'</span></button>'+
    '<button class="iron-cbtn" '+(skipDisabled  ?'disabled':'')+' onclick="useIronSkip()"   title="'+skipTitle  +'">⏭ Skip<span class="iron-cbtn-count">'+S.ironConsumables.skip+'</span></button>'+
    '<button class="iron-cbtn" '+(bombDisabled  ?'disabled':'')+' onclick="useIronBomb()"   title="'+bombTitle  +'">💣 Bomb<span class="iron-cbtn-count">'+S.ironConsumables.bomb+'</span></button>'+
  '</div>';
}

function ironSkillRow() {
  if (!S.ironClass) return '';
  var cls = IRON_CLASSES[S.ironClass];
  var cd = S.ironSkillCooldown;

      'Next topic: ' + (nextTopic ? '<strong>' + esc(nextTopic) + '</strong>' : 'none (last question)') +
    '</div>';
    if (S.ironScoutReadyUpActive) {
      var _eagleMsg = '🏹 Ready Up ARMED — answering the next question correctly earns +1 bonus · streak protected!';
      if (S.ironUpgradeActive && nextQ && nextQ.answer) {
        _eagleMsg += '<br>🦅 Eagle Eye — Correct answer: <strong>' + esc(nextQ.answer) + '</strong>';
      }
      masteryCounter += '<div style="font-size:10px;color:#9b59b6;margin-top:2px;font-weight:700">' + _eagleMsg + '</div>';
    }
    if (S.ironMasteryActive) {
      masteryCounter += '<div style="font-size:10px;color:#9b59b6;margin-top:2px">'+
        'Calculated: streak '+ S.ironStreak + (S.ironStreak >= 10 ? ' ≥ 10 — +1 bonus each correct answer!' : ' / 10 needed') +
      '</div>';
    }
  }

  // Necromancer: show graveyard soul count as the right-side badge (replaces/augments cdHtml)
  if (S.ironClass === 'necromancer') {
    var gyCount = S.necroGraveyard.length;
    if (isNecroEmpty) {
      // Already handled above as 'Empty' badge
    } else if (cd > 0) {
      // On cooldown but has souls — show both
      cdHtml = '<div style="display:flex;flex-direction:column;align-items:center;gap:3px;align-self:center">'+
        '<span class="iron-skill-cd">'+cd+'r</span>'+
        '<span style="font-size:11px;color:#e07070;font-weight:700">💀 '+gyCount+'</span>'+
      '</div>';
    } else if (!usedThisQ) {
      // Ready and has souls — show soul count as main badge
      cdHtml = '<span class="iron-skill-cd ready" style="display:flex;align-items:center;gap:3px">💀 '+gyCount+'</span>';
    }
    masteryCounter = ''; // moved to right side
  }

  return '<div class="iron-skill-row">'+
    '<button class="iron-skill-btn" '+(canUse?'':'disabled')+' onclick="useClassSkill()" title="'+esc(cls.skillName)+'">'+
      '<div class="iron-skill-btn-emoji">'+(S.ironClass==='beastman'?(isBeastFormRound()?'\ud83d\udc3a':'\ud83e\uddd1'):cls.icon)+'</div>'+
      '<div class="iron-skill-btn-body">'+
        '<div class="iron-skill-name">'+(S.ironClass==='mage'?(S.theme==='light'?'Lumina':S.theme==='violet'?'Vespera':'Umbra'):esc(cls.skillName))+masteryBadge+'</div>'+
        '<div class="iron-skill-desc" style="'+((S.ironClass==="alchemist"&&(S.ironConsumables.shield+S.ironConsumables.skip+S.ironConsumables.bomb)<3&&S.ironLives<=1)||(S.ironClass==="rogue"&&!S.ironUpgradeActive&&S.ironLives<=1&&S.ironShieldRounds===0)?'color:#e74c3c;font-weight:600':'')+'">'+esc(desc)+'</div>'+
        masteryCounter+
      '</div>'+
      cdHtml+
    '</button>'+
  '</div>';
}
