function useIronShield() {
  if (!S.ironMode || S.done) return;
  if (S.ironConsumables.shield <= 0) return;
  if (S.ironShieldRounds > 0) return;
  S.ironConsumables.shield--;
  prRecord(function(pr){ pr.ironTotalShieldsUsed++; });
  // Knight Mastery — Brace for Impact: shield lasts 3 rounds instead of 2
  S.ironShieldRounds = (S.ironClass === 'knight' && S.ironMasteryActive) ? 3 : 2;
  render();
}
function useIronSkip() {
  if (!S.ironMode || S.done) return;
  if (S.ironConsumables.skip <= 0) return;
  S.ironConsumables.skip--;
  prRecord(function(pr){ pr.ironTotalSkipsUsed++; });
  if (!(S.ironClass === 'thief' && S.ironMasteryActive)) {
    S.ironStreak = 0;
  }
  S.done = true;
  S.skipped = true;
  S.chosen = null;
  S.ironTotalSkipped++;
  stopIronTimer();
  render();
}
function ironBombCandidatesLeft(q) {
  if (!q) return 0;
  var c = 0;
  for (var pos = 0; pos < q._order.length; pos++) {
    if (q._order[pos] !== q.answer && !S.ironRemoved[pos]) c++;
  }
  return c;
}
function useIronBomb() {
  if (!S.ironMode || S.done) return;
  if (S.ironConsumables.bomb <= 0) return;
  // Bomber Mastery — Calculated Detonation: only 1 use per question (no multi-bomb)
  var maxUses = (S.ironClass === 'bomber' && S.ironMasteryActive) ? 1 : 3;
  if (S.ironBombsUsedThisQ >= maxUses) return;
  var q = S.shuffled[S.cur];
  var candidates = [];
  for (var pos = 0; pos < q._order.length; pos++) {
    if (q._order[pos] !== q.answer && !S.ironRemoved[pos]) candidates.push(pos);
  }
  if (!candidates.length) return;
  // Bomber Mastery: remove 2 wrong answers with one bomb
  var removeCount = (S.ironClass === 'bomber' && S.ironMasteryActive) ? 2 : 1;
  var toRemove = shuf(candidates).slice(0, removeCount);
  for (var ri = 0; ri < toRemove.length; ri++) S.ironRemoved[toRemove[ri]] = true;
  S.ironTotalBombsRemoved += toRemove.length;
  S.ironBombsUsedThisQ++;
  S.ironConsumables.bomb--;
  prRecord(function(pr){ pr.ironTotalBombsUsed++; });
  render();
}
function pickIronRewardOptions() {
  return shuf(['shield','skip','bomb']).slice(0, 2);
}
function claimIronReward(type) {
  var info = IRON_CONSUMABLE_INFO[type];
  if (!info) return;
  S.ironConsumables[type] += info.qty;
  advanceQuestion();
}
function grantRandomConsumable() {
  var type = shuf(['shield','skip','bomb'])[0];
  S.ironConsumables[type] += IRON_CONSUMABLE_INFO[type].qty;
  S.ironThiefGrantType = type;
}
function applyIronDamage() {
  var wouldBeWrong = S.ironWrong + 1;
  if (wouldBeWrong >= S.ironMaxLives && S.ironClass === 'paladin' && !S.ironPaladinUsed) {
    S.ironPaladinUsed = true;
    S.ironPaladinSaved = true;
    S.ironWrong = S.ironMaxLives - 1;
    S.ironLives = 1;
    prRecord(function(pr){ pr.paladinSaves++; });
    return;
  }
  S.ironWrong = wouldBeWrong;
  S.ironLives = S.ironMaxLives - S.ironWrong;
}

/* ─────────────────────────────────────────────
   IRON MAN CLASS SKILLS
───────────────────────────────────────────── */
function useClassSkill() {
  if (!S.ironMode || !S.ironClass) return;
  if (S.ironSkillUsedThisQ) return;
  if (S.ironSkillCooldown > 0) return;
  var cls = S.ironClass;
  var cd = IRON_CLASSES[cls].skillCooldown;

  if (cls === 'knight') {
    // Raise Shield: Nullify damage for 1 round (2 with mastery)
    if (S.done) return;
    var knightShieldDuration = (S.ironMasteryActive) ? 2 : 1;
    S.ironShieldRounds = Math.max(S.ironShieldRounds, knightShieldDuration);
    S.ironSkillEvent = S.ironMasteryActive
      ? '🛡 Brace for Impact — shield raised for 2 rounds!'
      : '🛡 Shield raised — damage nullified this round!';
  } else if (cls === 'bomber') {
    // Absolute Destruction: Remove ALL wrong answers
    if (S.done) return;
    var q = S.shuffled[S.cur];
    var removed = 0;
    for (var pos = 0; pos < q._order.length; pos++) {
      if (q._order[pos] !== q.answer && !S.ironRemoved[pos]) {
        S.ironRemoved[pos] = true;
        removed++;
      }
    }
    if (!removed) return; // nothing to bomb
    S.ironSkillEvent = '💣 Absolute Destruction — all wrong answers eliminated!';
  } else if (cls === 'thief') {
    // Snatch: trigger a random consumable effect
    if (S.done) return;
    var types = ['shield','skip','bomb'];
    var type = types[Math.floor(Math.random()*types.length)];
    S.ironConsumables[type] += IRON_CONSUMABLE_INFO[type].qty;
    S.ironSkillEvent = '🗝️ Snatch — pilfered ×'+IRON_CONSUMABLE_INFO[type].qty+' '+IRON_CONSUMABLE_INFO[type].name+'!';
  } else if (cls === 'rogue') {
    // Risky Escape: Skip + 50/50 chance to get the point or lose a life
    if (S.done) return;
    S.ironSkillUsedThisQ = true; // set early so skip doesn't double-count
    S.ironSkillCooldown = cd;
    S.done = true;
    S.skipped = true;
    S.chosen = null;
    S.ironStreak = 0;
    S.ironTotalSkipped++;
    stopIronTimer();
    var lucky = Math.random() < 0.5;
    if (lucky) {
      S.score++;
      S.ironSkillEvent = '🎲 Risky Escape — Lucky! Skipped and claimed the point!';
    } else {
      applyIronDamage();
      S.ironSkillEvent = '🎲 Risky Escape — Unlucky! Skipped but lost a life!';
    }
    render();
    if (S.ironWrong >= S.ironMaxLives) setTimeout(function(){ S.screen='ironover'; render(); }, 900);
    return;
  } else if (cls === 'paladin') {
    // Pray: 5% heal 1 HP, 15% get a random consumable, otherwise nothing special
    var roll = Math.random();
    if (roll < 0.05 && S.ironWrong > 0) {
      S.ironWrong--;
      S.ironLives = S.ironMaxLives - S.ironWrong;
      S.ironSkillEvent = '✨ Pray — Miracle! Healed 1 life!';
    } else if (roll < 0.20) {
      var t2 = shuf(['shield','skip','bomb'])[0];
      S.ironConsumables[t2] += IRON_CONSUMABLE_INFO[t2].qty;
      S.ironSkillEvent = '🙏 Pray — Blessed! Received ×'+IRON_CONSUMABLE_INFO[t2].qty+' '+IRON_CONSUMABLE_INFO[t2].name+'!';
    } else {
      S.ironSkillEvent = '🙏 Pray — The heavens are silent this time…';
    }
  } else if (cls === 'monk') {
    // Focus: next round guaranteed to heal a missing life; inactive when full
    if (S.ironWrong === 0) return; // full life, inactive
    S.ironMonkFocusActive = true;
    S.ironSkillEvent = '🧘 Focus — Centered. Next correct answer will restore a life.';
  } else if (cls === 'alchemist') {
    // Transmutation: randomize consumable types; if ≥3 gain life lose 3; if <3 lose life gain 3
    var total = S.ironConsumables.shield + S.ironConsumables.skip + S.ironConsumables.bomb;
    // Randomize all current consumables into random types
    var newPool = { shield: 0, skip: 0, bomb: 0 };
    var typeKeys = ['shield','skip','bomb'];
    var allUnits = [];
    for (var ti = 0; ti < S.ironConsumables.shield; ti++) allUnits.push('shield');
    for (var ti = 0; ti < S.ironConsumables.skip; ti++) allUnits.push('skip');
    for (var ti = 0; ti < S.ironConsumables.bomb; ti++) allUnits.push('bomb');
    allUnits = shuf(allUnits);
    // Re-assign shuffled
    var reshuffled = shuf(allUnits.map(function(_){ return shuf(typeKeys)[0]; }));
    for (var ri = 0; ri < reshuffled.length; ri++) newPool[reshuffled[ri]]++;
    S.ironConsumables = newPool;
    if (total >= 3) {
      // Gain a life, lose 3 consumables
      var lost = 3;
      var order2 = shuf(typeKeys);
      for (var oi = 0; oi < order2.length && lost > 0; oi++) {
        var take = Math.min(S.ironConsumables[order2[oi]], lost);
        S.ironConsumables[order2[oi]] -= take;
        lost -= take;
      }
      if (S.ironWrong > 0) { S.ironWrong--; S.ironLives = S.ironMaxLives - S.ironWrong; }
      S.ironAlchemistSacrificeForLife = true;
      S.ironSkillEvent = '⚗️ Transmutation — Sacrificed 3 consumables, gained 1 life!';
    } else {
      // Lose a life, get 3 consumables
      applyIronDamage();
      var bonus3 = shuf(['shield','skip','bomb','shield','skip','bomb','shield','skip','bomb']).slice(0,3);
      for (var bi = 0; bi < bonus3.length; bi++) S.ironConsumables[bonus3[bi]]++;
      S.ironSkillEvent = '⚗️ Transmutation — Sacrificed 1 life, gained 3 consumables!';
    }
    if (S.ironAlchemistSacrificeForLife) prRecord(function(pr){ pr.alchemistTransmutationLivesGained++; });
    S.ironAlchemistSacrificeForLife = false;
    if (S.ironWrong >= S.ironMaxLives) {
      S.ironSkillUsedThisQ = true; S.ironSkillCooldown = cd;
      render();
      setTimeout(function(){ S.screen='ironover'; render(); }, 900);
      return;
    }
  }

  S.ironSkillUsedThisQ = true;
  S.ironSkillCooldown = cd;
  render();
}

  }
  return false;
}

function startIronTimer() {
  stopIronTimer();
  S.ironTimeLeft = 30;
  updateTimerDisplay();
  S.ironTimerInterval = setInterval(function() {
    S.ironTimeLeft--;
    updateTimerDisplay();
    if (S.ironTimeLeft <= 0) {
      stopIronTimer();
      // Time's up = wrong answer
      S.done = true;
      S.ironStreak = 0;
      var q = S.shuffled[S.cur];
      S.chosen = -1; // no choice = timeout
      S.missed.push({ subj: q.subj, topic: q.topic, q: q.question, ok: q.choices[q.answer], bad: '⏱ Time ran out' });
      S.ironTotalWrong++;
      if (S.ironShieldRounds > 0) {
        S.ironShielded = true;
        S.ironTotalShieldBlocks++;
      } else {
        applyIronDamage();
      }
      render();
      if (S.ironWrong >= S.ironMaxLives) setTimeout(function() { S.screen = 'ironover'; render(); }, 900);
    }
  }, 1000);
}
function stopIronTimer() {
  if (S.ironTimerInterval) { clearInterval(S.ironTimerInterval); S.ironTimerInterval = null; }
}
function updateTimerDisplay() {
  var bar = document.getElementById('ironTimerBar');
  var lbl = document.getElementById('ironTimerLabel');
  if (bar) {
    var pct = (S.ironTimeLeft / 30) * 100;
    bar.style.width = pct + '%';
    // Color shift: green → yellow → red
    if (S.ironTimeLeft > 15) bar.style.background = '#27ae60';
    else if (S.ironTimeLeft > 8) bar.style.background = '#d4a052';
    else bar.style.background = '#e74c3c';
  }
  if (lbl) lbl.textContent = S.ironTimeLeft + 's';
}

function screenNmCheckpoint() {
  var blockStart = S.nmCheckpointAt;
  var blockEnd   = S.cur;
  var blockTotal = blockEnd - blockStart + 1;
  // Count only non-GY-injected future questions for the display (GY returns don't extend the run)
  var remaining = 0;
  for (var ri = S.cur + 1; ri < S.shuffled.length; ri++) {
    if (!S.shuffled[ri]._gyEntry) remaining++;
  }

  // Only push a checkpoint record the FIRST time this checkpoint renders.
  // Guard by checking if the last history entry already covers this block end.
  var lastCP = S.nmCheckpointHistory.length > 0
    ? S.nmCheckpointHistory[S.nmCheckpointHistory.length - 1] : null;
  var alreadyRecorded = lastCP && lastCP.blockEnd === blockEnd;

  if (!alreadyRecorded) {
    // scoreAtBlockStart = score recorded at the END of the previous block
    var scoreAtBlockStart = lastCP ? lastCP.scoreAtEnd : (S._resumeScoreBase !== undefined ? S._resumeScoreBase : 0);
    var cpEntry = {
      blockStart:      blockStart,
      blockEnd:        blockEnd,
      scoreAtStart:    scoreAtBlockStart, // score going INTO this block
      scoreAtEnd:      S.score,           // score coming OUT of this block
      // Retry restores to the START of this block (S.nmBlockStartSnap), not its
      // end. Restoring the end-of-block state and then rewinding S.cur back to
      // blockStart would "reawaken" graveyard returns already answered inside
      // this block while leaving any newer copies they spawned still queued
      // further out — producing duplicate copies of the same entry. Restoring
      // the true pre-block state avoids that entirely.
      snap:            S.nmBlockStartSnap,
    };
    S.nmCheckpointHistory.push(cpEntry);
  }

  var current = S.nmCheckpointHistory[S.nmCheckpointHistory.length - 1];
  var blockScore = current.scoreAtEnd - current.scoreAtStart;
  var blockPct   = blockTotal > 0 ? Math.round((blockScore / blockTotal) * 100) : 0;
  var passed     = blockPct >= 70;

  return '<div class="nm-checkpoint-wrap">'+
    '<div class="nm-checkpoint-badge">🚩</div>'+
    '<div class="nm-checkpoint-title">Checkpoint!</div>'+
    '<div class="nm-checkpoint-sub">You just completed questions '+(blockStart+1)+'–'+(blockEnd+1)+'. Here’s how you did:</div>'+
    '<div class="nm-checkpoint-stat-row">'+
      '<span class="nm-checkpoint-pill">✅ '+blockScore+' / '+blockTotal+' correct</span>'+
      '<span class="nm-checkpoint-pill" style="color:'+(passed?'var(--green-text)':'var(--red-text)')+'">'+blockPct+'% '+(passed?'Passing':'Below 70%')+'</span>'+
      '<span class="nm-checkpoint-pill">'+remaining+' questions left</span>'+
    '</div>'+
    '<div class="nm-checkpoint-btns">'+
      '<button class="btn pri" onclick="nmCheckpointContinue()">Continue →</button>'+
      '<button class="btn" onclick="nmCheckpointRetry()">↺ Retry last 15 questions</button>'+
      (S.nmEraser && S.cur > 0 ? '<button class="nm-eraser-btn" style="align-self:center;margin-top:4px" onclick="nmEraseOne()">✏️ Undo last answer</button>' : '')+
    '</div>'+
  '</div>';
}

function nmCheckpointContinue() {
  S.nmCheckpointAt = S.cur + 1;
  S.nmCheckpointReturnAt = S.cur + 1; // undo from this question (or any after, while unanswered) returns to checkpoint
  S.screen = 'quiz';
  S.cur++;
  S.done = false; S.chosen = null;
  S.nmIsGraveyardQ = !!(S.shuffled[S.cur] && S.shuffled[S.cur]._gyEntry);
  S.nmGraveyardReturnInfo = S.nmIsGraveyardQ ? { prevAnswer: S.shuffled[S.cur]._gyPrevAnswer, returnNum: (S.shuffled[S.cur] && S.shuffled[S.cur]._gyReturnNum) || 1 } : null;
  // Snapshot the start of this new block — see nmBlockStartSnap comment in startQuiz().
  S.nmBlockStartSnap = nmSnapshot();
  render();
}

function nmCheckpointRetry() {
  // Pop the current block's record — we are retrying it
  var thisCP = S.nmCheckpointHistory.pop();

  // The score baseline for this retry = scoreAtStart of the block we just popped
  var retryScoreBase = thisCP ? thisCP.scoreAtStart : 0;
  var blockStart = thisCP ? thisCP.blockStart : S.nmCheckpointAt;

  // Restore quiz state from the snapshot taken at the START of this block
  if (thisCP && thisCP.snap) {
    nmRestore(thisCP.snap);
  } else {
    // Fallback: manual reset to block start
    S.score = retryScoreBase;
    S.missed = [];
    S.nmCheckpointAt = blockStart;
  }

  // Save undo entry AFTER nmRestore so it isn't wiped by the restore
  if (S.nmEraser) {
    var undoSnap = nmSnapshot();
    undoSnap.nmCheckpointHistory = S.nmCheckpointHistory.concat([thisCP]);
    S.nmHistory.push(undoSnap);
  }

  // Ensure position and state are correct for the retry
  S.cur = blockStart;
  S.score = retryScoreBase; // always enforce — in case snap had drift
  S.nmCheckpointReturnAt = -1; // retry resets the post-checkpoint boundary
  S.done = false; S.chosen = null;
  S.nmIsGraveyardQ = !!(S.shuffled[S.cur] && S.shuffled[S.cur]._gyEntry);
  S.nmGraveyardReturnInfo = S.nmIsGraveyardQ ? { prevAnswer: S.shuffled[S.cur]._gyPrevAnswer, returnNum: (S.shuffled[S.cur] && S.shuffled[S.cur]._gyReturnNum) || 1 } : null;
  S.nmCheckpointAt = blockStart;
  S.screen = 'quiz';
  render();
}

    'One more run and you will surprise yourself.',
    'This is how mastery is built — one hard attempt at a time.',
    'Iron Man rewards the persistent. You are not done yet.',
    'Each wrong answer is a lesson. You just leveled up without knowing it.'
  ];
  var msg = msgs[Math.floor(Math.random() * msgs.length)];

  var totalRounds  = S.ironTotalRounds || 0;
  var correctAns   = S.ironTotalCorrect || 0;
  var accuracy     = totalRounds > 0 ? Math.round((correctAns / totalRounds) * 100) : 0;
  var highStreak   = S.ironHighStreak || 0;
  var wrongAns     = S.ironTotalWrong || 0;
  var shieldBlocks = S.ironTotalShieldBlocks || 0;
  var skipped      = S.ironTotalSkipped || 0;
  var bombsRemoved = S.ironTotalBombsRemoved || 0;

  function statRow(icon, label, value, colour) {
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid #2c2a48">'+
      '<span style="font-size:13px;color:#9590ad">'+icon+' '+label+'</span>'+
      '<span style="font-size:14px;font-weight:700;color:'+(colour||'#ebe8f7')+'">'+value+'</span>'+
    '</div>';
  }

  var accuracyColour = accuracy >= 70 ? '#4caf8a' : accuracy >= 40 ? '#d4a052' : '#e07070';

  var statsHtml =
    '<div style="background:#1b1930;border:0.5px solid #2c2a48;border-radius:10px;padding:14px 18px;margin:18px 0;width:100%;max-width:400px;text-align:left">'+
      '<div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#6e6890;margin-bottom:8px">Run Statistics</div>'+
      statRow('&#128293;', 'Highest Streak',          highStreak,   '#f0c040')+
      statRow('&#127919;', 'Game Accuracy',            accuracy+'%', accuracyColour)+
      statRow('&#10060;',  'Wrong Answers',            wrongAns,     '#e07070')+
      statRow('&#128737;', 'Damage Blocked by Shield', shieldBlocks, '#4a9edd')+
      statRow('&#9197;',   'Skipped Questions',        skipped,      '#9590ad')+
      statRow('&#128163;', 'Choices Removed by Bombs', bombsRemoved, '#e67e22')+
    '</div>';

  return '<div class="iron-gameover-wrap">'+
    '<div class="iron-gameover-icon">&#128128;</div>'+
    '<div class="iron-gameover-title">GAME OVER</div>'+
    '<div class="iron-gameover-score">You scored <strong>'+S.score+'</strong> point'+(S.score!==1?'s':'')+' across <strong>'+totalRounds+'</strong> round'+(totalRounds!==1?'s':'')+' before falling.</div>'+
    statsHtml+
    '<div class="iron-gameover-msg" style="font-style:italic;color:#9590ad;margin-bottom:24px">'+esc(msg)+'</div>'+
    '<button class="iron-gameover-btn" onclick="goTo(\'subjects\')">&#8592; Return to subject selection</button>'+
  '</div>';
}

function screenIronMastery() {
  var cls = S.ironClass ? IRON_CLASSES[S.ironClass] : null;
  var MASTERY_DATA = {
    knight:    { mastery: 'Brace for Impact',       desc: 'Shields last one more round.' },
    bomber:    { mastery: 'Calculated Detonation',   desc: 'Bombs now remove 2 wrong answers instead of one. Bombs can no longer be used multiple times for one question.' },
    thief:     { mastery: 'Gold Rush',               desc: 'Skip no longer breaks streaks.' },
    rogue:     { mastery: 'Speedy Slingshot',        desc: 'Earn an extra point for scoring within 3 seconds.' },
    paladin:   { mastery: 'Call for Karma',          desc: 'Every round, gain a stack of blessing. When Paladin passive is used up, consume all stacks every round — each stack triggers a chance to recover your Paladin Passive, increasing by 2% per stack.' },
    monk:      { mastery: 'Lock In',                 desc: 'Correct answers now give a stack of concentration. For every stack, increase the chance of healing a missing life by 1.5% when getting a correct answer. Stacks are consumed whenever healing is triggered. Stacks accumulate even at full HP — healing just won\'t activate until a life is missing.' },
    alchemist: { mastery: 'Complete Ingredients',    desc: 'Every round, gain a stack of adrenaline for every type of consumable you currently own. When 10 stacks are reached, consume all 10 and earn an extra point.' }
  };

  var m = cls ? MASTERY_DATA[S.ironClass] : null;
  if (!m || !cls) return '<div class="iron-gameover-wrap"><div class="iron-gameover-title">MASTERY UNLOCKED</div></div>';

  var starPositions = [
    { top: '-8px', left: '50%', delay: '0s' },
    { top: '20%',  left: '-12px', delay: '.1s' },
    { top: '20%',  right: '-12px', delay: '.15s' },
    { bottom: '10%', left: '-10px', delay: '.2s' },
    { bottom: '10%', right: '-10px', delay: '.25s' },
    { bottom: '-8px', left: '45%', delay: '.3s' }
  ];
  var starsHtml = starPositions.map(function(p) {
    var style = 'animation-delay:' + p.delay + ';';
    Object.keys(p).forEach(function(k) { if (k !== 'delay') style += k + ':' + p[k] + ';'; });
    return '<span class="mastery-star" style="' + style + '">⭐</span>';
  }).join('');

  // Confetti pieces
  var confettiColors = ['#f0c040','#9b59b6','#e74c3c','#27ae60','#3498db','#e67e22'];
  var confetti = '';
  for (var ci = 0; ci < 18; ci++) {
    var cx = Math.random() * 100;
    var cc = confettiColors[ci % confettiColors.length];
    var cd = (Math.random() * 0.6).toFixed(2);
    var cdu = (1.2 + Math.random() * 0.8).toFixed(2);
    confetti += '<div class="mastery-confetti-piece" style="left:' + cx + '%;background:' + cc + ';animation-delay:' + cd + 's;animation-duration:' + cdu + 's;top:-10px"></div>';
  }

  return '<div class="mastery-wrap">' +
    confetti +
    '<div class="mastery-banner">⚡ Iron Man Mode · 15 Points Reached</div>' +
    '<div class="mastery-badge-wrap">' +
      '<div class="mastery-badge">' + cls.icon + '</div>' +
      '<div class="mastery-stars">' + starsHtml + '</div>' +
    '</div>' +
    '<div class="mastery-title">MASTERY UNLOCKED</div>' +
    '<div class="mastery-sub">You have proven your worth, ' + esc(cls.name) + '.<br>A new power awakens within you.</div>' +
    '<div class="mastery-score-row">' +
      '<span class="mastery-score-pill">⭐ 15 Points</span>' +
      '<span class="mastery-score-pill">🏆 Current Score: ' + S.score + '</span>' +
    '</div>' +
    '<div class="mastery-class-card">' +
      '<div class="mastery-class-header">' +
        '<div class="mastery-class-icon">' + cls.icon + '</div>' +
        '<div>' +
          '<div class="mastery-class-name">' + esc(cls.name) + '</div>' +
          '<div class="mastery-class-tag">Class Mastery</div>' +
        '</div>' +
      '</div>' +
      '<div class="mastery-divider"></div>' +
      '<div class="mastery-ability-label">✦ Mastery Trait Unlocked</div>' +
      '<div class="mastery-ability-name">' + esc(m.mastery) + '</div>' +
      '<div class="mastery-ability-desc">' + esc(m.desc) + '</div>' +
    '</div>' +
    '<button class="mastery-continue-btn" onclick="continueAfterMastery()">Continue the Run →</button>' +
    '<button class="mastery-back-btn" onclick="goTo(\'subjects\')">← Quit to subjects</button>' +
  '</div>';
}

function continueAfterMastery() {
  // The current question was already answered (S.done=true), so just re-render quiz
  // so the player can see the result feedback and press Next normally.
  // Do NOT restart the timer — the question is already done.
  S.screen = 'quiz';
  render();
}

function screenIronReward() {

    return '<button class="iron-reward-card" onclick="claimIronReward(\''+type+'\')">'+
      '<div class="iron-reward-icon">'+info.icon+'</div>'+
      '<div class="iron-reward-name">'+esc(info.name)+' \u00d7'+info.qty+'</div>'+

    '<div class="iron-confirm-badge">🎁</div>'+
    '<div class="iron-confirm-title" style="color:#f0c040;text-shadow:0 0 20px rgba(240,192,64,0.5)">'+S.ironRound+' ROUNDS SURVIVED</div>'+
    '<div class="iron-confirm-sub">Choose one reward to carry into the next stretch.</div>'+
    '<div class="iron-reward-grid">'+cards+'</div>'+
  '</div>';
}

function screenSubjects() {
  var cards = S.subjects.map(function(subj, idx) {
    if (!subj.name.trim()) return '';
    var isLoading = (S.loadingSubject === subj.name);
    var err = S.loadErrors[subj.name];
    var cached = S.loadedQ[subj.name];
    var cachedCount = (S._idbCounts && S._idbCounts[subj.name]) || 0;

    var isIron = (subj.name === IRON_MAN.name);
    var sheetCount = isIron ? DEFAULT_SUBJECTS.length - 1 : subj.sheets.filter(function(u){ return u.trim(); }).length;
    var info = '';
    if (cached) {
      info = cached.length + ' question' + (cached.length !== 1 ? 's' : '');
      if (cachedCount > 0) info += ' \u00b7 <span class="cache-badge">\u2713 ' + cachedCount + ' offline</span>';
    } else if (cachedCount > 0) {
      info = cachedCount + ' question' + (cachedCount !== 1 ? 's' : '') + ' <span class="cache-badge">\u2713 offline</span>';
    } else {
      info = isIron ? 'All subjects combined' : '';
    }

    var badge = '';

    var statusHtml = '';
    if (isLoading) statusHtml = '<div class="subj-count"><span class="spin"></span> Loading\u2026</div>';
    else if (err) statusHtml = '<div class="subj-count" style="color:var(--red-text)">\u26a0 Click to retry</div>';
    else statusHtml = '<div class="subj-count">'+info+badge+'</div>';

    var errBox = err
      ? '<div class="err-box" style="margin-top:6px;font-size:12px;border-radius:0 0 var(--rs) var(--rs)" onclick="event.stopPropagation()"><strong>Error:</strong> '+esc(err)+'</div>'
      : '';

    var cls = 'subj-card' + (isLoading ? ' loading-card' : '') + (isIron ? ' iron-card' : '');
    var cardStyle = err ? ' style="border-radius:var(--r) var(--r) 0 0;margin-bottom:0"' : '';
    var numLabel = isIron ? '\u26a1 Special' : 'Subject ' + (idx + 1);
    return '<div style="margin-bottom:10px">'+
      '<div class="'+cls+'"'+cardStyle+' onclick="selectSubject(\''+esc(subj.name).replace(/'/g,"\\'")+'\')">'+
        '<div class="subj-num">'+numLabel+'</div>'+
        '<div class="subj-name">'+esc(subj.name)+'</div>'+
        statusHtml+
      '</div>'+
      errBox+
    '</div>';
  }).filter(Boolean).join('');

  // Iron Man card — always appended, not part of editable S.subjects
  var ironLoading = (S.loadingSubject === IRON_MAN.name);
  var ironErr = S.loadErrors[IRON_MAN.name];
  var ironCached = S.loadedQ[IRON_MAN.name];
  // Sum all subject IDB counts for Iron Man offline total
  var ironOfflineTotal = 0;
  if (S._idbCounts) {
    DEFAULT_SUBJECTS.forEach(function(s) {
      if (s.name !== IRON_MAN.name) ironOfflineTotal += (S._idbCounts[s.name] || 0);
    });
  }
  var ironInfo = '';
  if (ironCached) {
    ironInfo = ironCached.length + ' question' + (ironCached.length !== 1 ? 's' : '') + ' \u00b7 all subjects';
    if (ironOfflineTotal > 0) ironInfo += ' \u00b7 <span class="cache-badge">\u2713 ' + ironOfflineTotal + ' offline</span>';
  } else if (ironOfflineTotal > 0) {
    ironInfo = ironOfflineTotal + ' question' + (ironOfflineTotal !== 1 ? 's' : '') + ' \u00b7 all subjects <span class="cache-badge">\u2713 offline</span>';
  } else {
    ironInfo = 'All subjects combined';
  }
  var ironStatus = ironLoading
    ? '<div class="subj-count"><span class="spin"></span> Loading\u2026</div>'
    : ironErr ? '<div class="subj-count" style="color:var(--red-text)">\u26a0 Click to retry</div>'
    : '<div class="subj-count">'+ironInfo+'</div>';
  var ironErrBox = ironErr ? '<div class="err-box" style="margin-top:6px;font-size:12px;border-radius:0 0 var(--rs) var(--rs)" onclick="event.stopPropagation()"><strong>Error:</strong> '+esc(ironErr)+'</div>' : '';
  var ironCard = '<div style="margin-bottom:10px">'+
    '<div class="subj-card iron-card'+(ironLoading?' loading-card':'')+'" onclick="selectSubject(\''+esc(IRON_MAN.name)+'\')">'+
      '<div class="subj-num">\u26a1 Special</div>'+
      '<div class="subj-name">'+esc(IRON_MAN.name)+'</div>'+
      ironStatus+
    '</div>'+ironErrBox+
  '</div>';

  // Global resume button — shown when a save slot exists
  var resumeCardHtml = '';
  if (saveStateExists()) {
    var rsnap = saveStateLoad();
    var rDate  = rsnap && rsnap.savedAt ? new Date(rsnap.savedAt).toLocaleString() : 'previously';
    var rSubj  = rsnap ? esc(rsnap.subject) : '?';
    var rQ     = rsnap ? rsnap.cur + 1 : '?';
    var rTotal = rsnap && rsnap.shuffled ? rsnap.shuffled.length : '?';
    var rScore = rsnap ? rsnap.score : '?';
    var rMode  = rsnap && rsnap.redemption && rsnap.redemption !== 'none' ? ' · ' + rsnap.redemption : '';
    resumeCardHtml =
      '<div class="nm-resume-card" style="margin-bottom:10px">'+
        '<div class="nm-resume-info">'+
          '<strong>💾 '+rSubj+'</strong>'+
          'Q'+rQ+' / '+rTotal+' · Score: '+rScore+rMode+'<br>'+
          '<span style="font-size:11px;color:var(--hint)">Saved '+rDate+'</span>'+
        '</div>'+
        '<div class="nm-resume-btns">'+
          '<button class="nm-resume-btn" onclick="saveStateResume()">Resume →</button>'+
          '<button class="nm-resume-discard" onclick="selenaConfirm(\'Discard this saved progress?\',function(){saveStateClear();render();})">Discard</button>'+
        '</div>'+
      '</div>';
  }

  var onlineStatus = navigator.onLine
    ? ''
    : '<div style="font-size:11.5px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:5px">'+
        '<span style="width:6px;height:6px;border-radius:50%;background:#e07070;display:inline-block"></span>Offline \u2014 subjects with \u2713 offline badge available'+
      '</div>';

  return '<div class="selena-brand">'+
      '<div class="selena-logo"><span class="moon">\ud83c\udf19</span>PROJECT <span class="accent">SELENA</span></div>'+
      '<div class="selena-tagline">Sanitary Engineering Licensure Exam Reviewer &amp; Quiz Mastery</div>'+
    '</div>'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:16px;margin-bottom:4px">'+
    '<div>'+
      '<p class="sub" style="margin-bottom:0">Select a subject to start practicing</p>'+
      onlineStatus+
    '</div>'+
    '<div style="display:flex;gap:8px">'+
      '<button class="btn" style="font-size:13px;padding:6px 12px" onclick="goTo(\'records\')">📊 Records</button>'+
      '<button class="dm-btn" title="Toggle dark mode" onclick="toggleDark()">'+(S.dark?'\u2600\ufe0f':'\ud83c\udf19')+'</button>'+
    '</div>'+
  '</div>'+
  '<div class="subj-grid" style="margin-top:18px">'+cards+ironCard+'</div>'+
  resumeCardHtml;
}

function screenTopics() {
  var selQ = totalSelected();
  var qs = S.loadedQ[S.curSubject] || [];

  var topicItems = S.topics.map(function(t, ti) {
    var cnt = topicCount(t);
    var chk = S.checkedTopics[t] ? 'checked' : '';
    return '<label class="topic-check">'+
      '<input type="checkbox" '+chk+' onchange="S.checkedTopics[S.topics['+ti+']] = this.checked; renderTopicCounts()">'+
      '<div class="topic-check-lbl">'+
        '<div class="topic-name">'+esc(t)+'</div>'+
        '<div class="topic-cnt">'+cnt+' question'+(cnt!==1?'s':'')+'</div>'+
      '</div>'+
    '</label>';
  }).join('');

  return '<div class="breadcrumb">'+
    '<span onclick="goTo(\'subjects\')">Subjects</span>'+
    '<span class="sep">/</span>'+
    '<span class="cur">'+esc(S.curSubject)+'</span>'+
  '</div>'+
  '<h1>'+esc(S.curSubject)+'</h1>'+
  '<p class="sub">Choose the topics to include in your quiz · <a href="#" onclick="reloadSubject(\''+esc(S.curSubject).replace(/'/g,"\\'")+'\');return false;" style="color:var(--blue-text);text-decoration:none">↺ Reload from Sheets</a></p>'+
  '<div class="card">'+
    '<div class="check-all-row">'+
      '<div class="check-all-btns">'+
        '<button class="check-all-btn" onclick="toggleAll(true); renderTopicCounts()">Select all</button>'+
        '<button class="check-all-btn" onclick="toggleAll(false); renderTopicCounts()">Deselect all</button>'+
      '</div>'+
      '<span class="sel-count" id="selCount">'+selQ+' question'+(selQ!==1?'s':'')+' selected</span>'+
    '</div>'+
    '<div id="topicList">'+topicItems+'</div>'+
  '</div>'+
  '<div class="brow" style="align-items:center">'+
    '<button class="btn" onclick="goTo(\'subjects\')">← Back</button>'+
    '<button class="btn" onclick="S.screen=\'nmsettings\';render()" '+(selQ===0?'disabled':'')+'>⚙ Settings</button>'+
    '<button class="btn pri" id="startBtn" onclick="startQuiz()" '+(selQ===0?'disabled':'')+'>Start quiz ('+selQ+' q) ▶</button>'+
  '</div>';
}

function screenQuiz() {
  var q = S.shuffled[S.cur];
  var total = S.shuffled.length;
  var pct = Math.round(((S.cur + (S.done ? 1 : 0)) / total) * 100);

  var fbHtml = '';
  if (S.done) {
    if (S.skipped) {
      // Thief Gold Rush: skip no longer breaks streak
      var skipMsg = (S.ironClass === 'thief' && S.ironMasteryActive)
        ? '⏭ Skipped — 🗝️ Gold Rush: streak preserved!'
        : '⏭ Skipped — streak broken';
      fbHtml = '<div class="fb no">'+skipMsg+'</div>';
      if (S.ironMode && S.ironSkillEvent) fbHtml += '<div class="iron-skill-event">'+esc(S.ironSkillEvent)+'</div>';
    } else {
      var isOk = (S.chosen === q.answer);
      var fbMsg = isOk ? '✓ Correct!' : (S.chosen === -1 ? '⏱ Time\'s up — correct answer highlighted' : '✗ Incorrect — correct answer highlighted');
      if (!isOk && S.ironMode && S.ironShielded) fbMsg += ' · 🛡 Shield absorbed the damage!';
      if (!isOk && S.ironMode && S.ironPaladinSaved) fbMsg += ' · 🛡️ Paladin\'s resolve — you cling on at 1 life!';
      if (isOk && S.ironMode && S.ironRogueBonus) fbMsg += ' · 🎲 Rogue bonus +1 point!';
      if (isOk && S.ironMode && S.ironRogueSpeedBonus) fbMsg += ' · ⚡ Speedy Slingshot — answered in time! +1 point!';
      if (isOk && S.ironMode && S.ironMonkHeal) fbMsg += ' · 🧘 Monk healing — +1 life!';
      if (isOk && S.ironMode && S.ironMasteryActive && S.ironClass === 'monk') fbMsg += ' · 🎯 Concentration: '+(S.ironMonkHeal ? 'stacks consumed' : S.ironMonkConcentration+' stack'+(S.ironMonkConcentration!==1?'s':'')+' ('+Math.min(S.ironMonkConcentration*1.5,100)+'% heal chance)');
      if (isOk && S.ironMode && S.ironThiefGrantType) fbMsg += ' · 🗝️ Thief steals a '+IRON_CONSUMABLE_INFO[S.ironThiefGrantType].name+'!';
      fbHtml = '<div class="fb '+(isOk?'ok':'no')+'">'+fbMsg+'</div>';
      if (S.ironMode && S.ironSkillEvent) fbHtml += '<div class="iron-skill-event">'+esc(S.ironSkillEvent)+'</div>';
    }
  }

  // ── Graveyard palette ──
  var gyMode = S.nmIsGraveyardQ ? S.nmRedemption : '';
  var gyCardClass = gyMode ? ' gy-card-'+gyMode : '';
  var gyCbtnClass = gyMode ? ' gy-cbtn-'+gyMode : '';

  var choicesHtml = q._order.map(function(origIdx, pos) {
    var cls = '';
    var removed = S.ironMode && S.ironRemoved[pos];
    if (S.done) {
      if (origIdx === q.answer) cls = 'correct';
      else if (origIdx === S.chosen) cls = 'wrong';
    } else if (removed) {
      cls = 'removed';
    }
    return '<button class="cbtn'+gyCbtnClass+' '+cls+'" onclick="pick('+pos+')" '+((S.done||removed)?'disabled':'')+'>'+
      '<span class="cltr">'+L[pos]+'.</span><span>'+esc(q.choices[origIdx])+(removed?' <span style="font-size:11px;opacity:.7">(removed)</span>':'')+'</span></button>';
  }).join('');

  var nxBtn = '';
  if (S.done && !(S.ironMode && S.ironWrong >= S.ironMaxLives)) {
    nxBtn = '<button class="btn pri" onclick="next()" style="width:100%;margin-top:6px">'+(S.cur+1>=total?'See results →':'Next question →')+'</button>';
  }

  // Iron Man header: lives + score + timer
  var topBar = '';
  if (S.ironMode) {
    var hearts = '';
    for (var h = 0; h < S.ironMaxLives; h++) {
      hearts += '<span class="iron-heart'+(h >= S.ironLives ? ' dead' : '')+'">❤️</span>';
    }
    var shieldBadge = S.ironShieldRounds > 0 ? '<span class="iron-shield-badge" title="Shield active">🛡 '+S.ironShieldRounds+'r</span>' : '';
    var streakBadge = S.ironStreak > 1 ? '<span style="font-size:12px;color:#e67e22;font-weight:600;margin-left:8px">🔥 '+S.ironStreak+'</span>' : '';
    var classInfo = S.ironClass ? IRON_CLASSES[S.ironClass] : null;
    var classBadge = classInfo ? '<span style="font-size:11px;color:#9b59b6;margin-left:6px" title="'+esc(classInfo.desc)+'">'+classInfo.icon+' '+esc(classInfo.name)+'</span>' : '';
    topBar =
      '<div class="qmeta" style="margin-bottom:6px">'+
        '<div class="iron-lives">'+hearts+'<span style="font-size:12px;color:#c0392b;margin-left:4px">'+S.ironLives+' left</span>'+shieldBadge+classBadge+'</div>'+
        '<div style="display:flex;align-items:center;gap:8px">'+
          '<span style="color:#c0a060;font-weight:600">Score: '+S.score+'</span>'+streakBadge+
          '<button class="dm-btn" onclick="toggleDark()" style="width:26px;height:26px;font-size:13px;border:none;background:none;cursor:pointer">'+(S.dark?'\u2600\ufe0f':'\ud83c\udf19')+'</button>'+
          '<button class="dm-btn quit-btn" title="Quit to subjects" onclick="quitQuiz()" style="width:26px;height:26px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--muted)">✕</button>'+
        '</div>'+
      '</div>'+
      '<div class="iron-timer-wrap">'+(S.done?'':
        '<div class="iron-timer-bar-bg"><div class="iron-timer-bar" id="ironTimerBar" style="width:100%"></div></div>'+
        '<div class="iron-timer-label" id="ironTimerLabel">30s</div>'
      )+'</div>'+
      ironConsumableRow(q)+
      ironSkillRow();
  } else {
    topBar =
      '<div class="qmeta">'+
        '<span>Q '+(S.cur+1)+' / '+total+'</span>'+
        '<div style="display:flex;align-items:center;gap:8px">'+

function ironConsumableRow(q) {
  var bombLeft = ironBombCandidatesLeft(q);
  var maxBombUses = (S.ironClass === 'bomber' && S.ironMasteryActive) ? 1 : 3;
  var shieldDisabled = S.done || S.ironConsumables.shield <= 0 || S.ironShieldRounds > 0;
  var skipDisabled   = S.done || S.ironConsumables.skip  <= 0;
  var bombDisabled   = S.done || S.ironConsumables.bomb  <= 0 || S.ironBombsUsedThisQ >= maxBombUses || bombLeft <= 0;
  var shieldTitle = (S.ironClass === 'knight' && S.ironMasteryActive) ? 'Nullifies damage for 3 rounds (Brace for Impact)' : 'Nullifies damage for 2 rounds';
  var skipTitle   = (S.ironClass === 'thief'  && S.ironMasteryActive) ? 'Skip · Gold Rush: streak preserved!' : 'Skip this question · breaks streak';
  var bombTitle   = (S.ironClass === 'bomber' && S.ironMasteryActive) ? 'Remove 2 wrong answers · 1 use per question (Calculated Detonation)' : 'Remove a wrong answer · up to 3 per question';
  return '<div class="iron-consumable-row">'+
    '<button class="iron-cbtn" '+(shieldDisabled?'disabled':'')+' onclick="useIronShield()" title="'+shieldTitle+'">🛡 Shield<span class="iron-cbtn-count">'+S.ironConsumables.shield+'</span></button>'+
    '<button class="iron-cbtn" '+(skipDisabled  ?'disabled':'')+' onclick="useIronSkip()"   title="'+skipTitle  +'">⏭ Skip<span class="iron-cbtn-count">'+S.ironConsumables.skip+'</span></button>'+
    '<button class="iron-cbtn" '+(bombDisabled  ?'disabled':'')+' onclick="useIronBomb()"   title="'+bombTitle  +'">💣 Bomb<span class="iron-cbtn-count">'+S.ironConsumables.bomb+'</span></button>'+
  '</div>';
}

function ironSkillRow() {
  if (!S.ironClass) return '';
  var cls = IRON_CLASSES[S.ironClass];
  var cd = S.ironSkillCooldown;
  var isMonkFull = (S.ironClass === 'monk' && S.ironWrong === 0);
  var usedThisQ = S.ironSkillUsedThisQ;
  var canUse = cd === 0 && !usedThisQ && !isMonkFull;
  var needsActive = ['knight','bomber','thief','rogue'];
  if (needsActive.indexOf(S.ironClass) !== -1 && S.done) canUse = false;

  var cdHtml;
  if (isMonkFull) {
    cdHtml = '<span class="iron-skill-cd inactive">Full HP</span>';
  } else if (usedThisQ) {
    cdHtml = '<span class="iron-skill-cd">Used</span>';
  } else if (cd > 0) {
    cdHtml = '<span class="iron-skill-cd">'+cd+'r</span>';
  } else {
    cdHtml = '<span class="iron-skill-cd ready">READY</span>';
  }

  var baseDescriptions = {
    knight:    'Nullify damage for 1 round',
    bomber:    'Remove ALL wrong answers',
    thief:     'Get a random consumable',
    rogue:     'Skip + 50% get point / 50% lose life',
    paladin:   '5% heal · 15% get consumable',
    monk:      'Next correct answer heals 1 life',
    alchemist: '3+ consumables: gain a life, lose 3. Fewer: lose a life, gain 3.'
  };
  var masteryDescriptions = {
    knight:    'Nullify damage for 2 rounds (Brace for Impact)',
    bomber:    'Remove ALL wrong answers (1 use/q with Calculated Detonation)',
    thief:     'Get a random consumable (skip preserves streak)',
    rogue:     'Skip + 50/50 · +1 pt if answered in ≤3s',
    paladin:   '5% heal · 15% consumable · blessings recover passive',
    monk:      'Next correct heals · Lock In: concentration stacks heal chance',
    alchemist: '3+ consumables: gain a life, lose 3. Fewer: lose a life, gain 3. Adrenaline stacks earn bonus points.'
  };

  var desc = (S.ironMasteryActive ? masteryDescriptions : baseDescriptions)[S.ironClass];

  // Alchemist: dynamic label based on consumable count and life state
  if (S.ironClass === 'alchemist') {
    var totalCons = S.ironConsumables.shield + S.ironConsumables.skip + S.ironConsumables.bomb;
    var isLethal = totalCons < 3 && S.ironLives <= 1;
    if (isLethal) {
      desc = '\u26a0\ufe0f LETHAL \u2014 only 1 life left and fewer than 3 consumables. Life loss bypasses shield. Using this will kill you!';
    } else if (totalCons >= 3) {
      desc = 'Gain a life \u00b7 lose 3 consumables' + (S.ironMasteryActive ? ' \u00b7 adrenaline stacks earn bonus pts' : '');
    } else {
      desc = 'Lose a life \u00b7 gain 3 consumables (bypasses shield)' + (S.ironMasteryActive ? ' \u00b7 adrenaline stacks earn bonus pts' : '');
    }
  }

  // Rogue: warn when 1 life and no active shield (50% chance of death)
  if (S.ironClass === 'rogue') {
    var rogueShielded = S.ironShieldRounds > 0;
    var rogueDangerous = S.ironLives <= 1 && !rogueShielded;
    if (rogueDangerous) {
      desc = '\u26a0\ufe0f RISKY \u2014 50% chance to lose your last life. Activate a shield first to be safe.';
    }
  }

  var masteryBadge = S.ironMasteryActive
    ? '<span style="font-size:9px;font-weight:700;letter-spacing:.1em;color:#f0c040;background:rgba(240,192,64,0.15);border:0.5px solid rgba(240,192,64,0.4);border-radius:10px;padding:1px 6px;margin-left:4px">MASTERY</span>'
    : '';

  // Show active mastery counters
  var masteryCounter = '';
  if (S.ironMasteryActive) {
    if (S.ironClass === 'paladin' && S.ironPaladinBlessings > 0) {
      masteryCounter = '<div style="font-size:10px;color:#f0c040;margin-top:3px">✨ Blessings: '+S.ironPaladinBlessings+' stack'+(S.ironPaladinBlessings!==1?'s':'')+' · '+(S.ironPaladinUsed?'passive spent — consuming next round':'passive intact')+'</div>';
    }
    if (S.ironClass === 'monk') {
      masteryCounter = '<div style="font-size:10px;color:#9b59b6;margin-top:3px">🎯 Concentration: '+S.ironMonkConcentration+' stack'+(S.ironMonkConcentration!==1?'s':'')+' ('+Math.min(S.ironMonkConcentration*1.5,100)+'% heal chance)</div>';
    }
    if (S.ironClass === 'alchemist') {
      masteryCounter = '<div style="font-size:10px;color:#e67e22;margin-top:3px">⚗️ Adrenaline: '+S.ironAlchemistAdrenaline+'/10 stacks</div>';
    }
  }

  return '<div class="iron-skill-row">'+
    '<button class="iron-skill-btn" '+(canUse?'':'disabled')+' onclick="useClassSkill()" title="'+esc(cls.skillName)+'">'+
      '<div class="iron-skill-btn-left">'+
        '<span>'+cls.icon+'</span>'+
        '<div>'+
          '<div class="iron-skill-name">'+esc(cls.skillName)+masteryBadge+'</div>'+
          '<div class="iron-skill-desc" style="'+((S.ironClass==="alchemist"&&(S.ironConsumables.shield+S.ironConsumables.skip+S.ironConsumables.bomb)<3&&S.ironLives<=1)||(S.ironClass==="rogue"&&S.ironLives<=1&&S.ironShieldRounds===0)?'color:#e74c3c;font-weight:600':'')+'">'+esc(desc)+'</div>'+
          masteryCounter+
        '</div>'+
      '</div>'+
      cdHtml+
    '</button>'+
  '</div>';
}

/* ── Custom confirm dialog (replaces native window.confirm for WebView compat) ── */
function selenaConfirm(msg, onOk, onCancel) {
  var overlay = document.getElementById('selena-modal-overlay');
  var msgEl   = document.getElementById('selena-modal-msg');
  var okBtn   = document.getElementById('selena-modal-ok');
  var cancelBtn = document.getElementById('selena-modal-cancel');
  msgEl.textContent = msg;
  overlay.classList.add('active');
  function cleanup() {
    overlay.classList.remove('active');
    okBtn.removeEventListener('click', handleOk);
    cancelBtn.removeEventListener('click', handleCancel);
    overlay.removeEventListener('click', handleOverlay);
  }
  function handleOk()      { cleanup(); if (onOk)     onOk(); }
  function handleCancel()  { cleanup(); if (onCancel) onCancel(); }
  function handleOverlay(e){ if (e.target === overlay) handleCancel(); }
  okBtn.addEventListener('click', handleOk);
  cancelBtn.addEventListener('click', handleCancel);
  overlay.addEventListener('click', handleOverlay);
}

   Works from file:// and any origin, no Service Worker needed.
   DB: SELEQuizDB  |  Store: questions  |  Key: subj||topic||question
═══════════════════════════════════════════════════════ */

/* ── IndexedDB helpers ── */
var _idb = null;
var _idbOpening = false;
var _idbQueue = [];
var IDB_NAME = 'SELEQuizDB', IDB_VER = 2, IDB_STORE = 'questions';

function idbOpen() {
  return new Promise(function(res, rej) {
    if (_idb) { res(_idb); return; }
    _idbQueue.push({ res: res, rej: rej });
    if (_idbOpening) return;
    _idbOpening = true;
    console.log('[IDB] opening', IDB_NAME, 'v', IDB_VER);
    var r = indexedDB.open(IDB_NAME, IDB_VER);
    r.onupgradeneeded = function(e) {
      console.log('[IDB] onupgradeneeded — creating store');
      var db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) {
        var os = db.createObjectStore(IDB_STORE, { keyPath: 'key' });
        os.createIndex('subj', 'subj', { unique: false });
      }
    };
    r.onsuccess = function(e) {
      _idb = e.target.result;
      _idbOpening = false;
      console.log('[IDB] opened OK');
      var q = _idbQueue.splice(0);
      for (var i = 0; i < q.length; i++) q[i].res(_idb);
    };
    r.onerror = function(e) {
      _idbOpening = false;
      console.error('[IDB] open ERROR', e.target.error);
      var err = e.target.error;
      var q = _idbQueue.splice(0);
      for (var i = 0; i < q.length; i++) q[i].rej(err);
    };
  });
}

/* Upsert all questions for a subject — key is short: subj||rowIndex */
function idbSave(subjName, questions) {
  console.log('[IDB] idbSave START', subjName, questions.length);
  return idbOpen().then(function(db) {
    return new Promise(function(res, rej) {
      var tx = db.transaction(IDB_STORE, 'readwrite');
      var os = tx.objectStore(IDB_STORE);
      var now = Date.now();
      questions.forEach(function(q, idx) {
        var rowIdx = (q.rowIndex !== undefined ? q.rowIndex : idx);
        os.put({
          key:     subjName + '||' + rowIdx,
          subj:    subjName,
          topic:   q.topic,
          question:q.question,
          choices: q.choices,
          answer:  q.answer,
          rowIndex:rowIdx,
          savedAt: now
        });
      });
      tx.oncomplete = function() { console.log('[IDB] idbSave COMPLETE', subjName, questions.length); res(questions.length); };
      tx.onerror    = function(e) { console.error('[IDB] idbSave ERROR', subjName, e.target.error); rej(e.target.error); };
      tx.onabort    = function(e) { console.error('[IDB] idbSave ABORT', subjName, e.target.error); rej(e.target.error || new Error('IDB transaction aborted')); };
    });
  }).catch(function(e) { console.error('[IDB] idbSave CATCH', subjName, e); throw e; });
}

/* Load all questions for a subject from IDB */
function idbLoad(subjName) {
  console.log('[IDB] idbLoad START', subjName);
  return idbOpen().then(function(db) {
    return new Promise(function(res, rej) {
      var tx  = db.transaction(IDB_STORE, 'readonly');
      var req = tx.objectStore(IDB_STORE).index('subj').getAll(IDBKeyRange.only(subjName));
      req.onsuccess = function(e) {
        var rows = (e.target.result||[]).slice();
        console.log('[IDB] idbLoad RESULT', subjName, rows.length);
        rows.sort(function(a, b) { return (a.rowIndex !== undefined ? a.rowIndex : 0) - (b.rowIndex !== undefined ? b.rowIndex : 0); });
        res(rows.map(function(r){
          return { subj:r.subj, topic:r.topic, question:r.question, choices:r.choices, answer:r.answer, rowIndex:r.rowIndex };
        }));
      };
      req.onerror = function(e) { console.error('[IDB] idbLoad ERROR', subjName, e.target.error); rej(e.target.error); };
    });
  });
}

/* Count cached questions per subject */
function idbCount(subjName) {
  return idbOpen().then(function(db) {
    return new Promise(function(res) {
      var req = db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).index('subj').count(IDBKeyRange.only(subjName));
      req.onsuccess = function(e) { res(e.target.result||0); };
      req.onerror   = function()  { res(0); };
    });
  }).catch(function(){ return 0; });
}

/* Delete all cached questions for a subject — uses index key range for speed */
function idbDeleteSubject(subjName) {
  return idbOpen().then(function(db) {
    return new Promise(function(res, rej) {
      var tx  = db.transaction(IDB_STORE, 'readwrite');
      var os  = tx.objectStore(IDB_STORE);
      // Delete by iterating the subj index — getAll keys then delete each
      var req = os.index('subj').getAllKeys(IDBKeyRange.only(subjName));
      req.onsuccess = function(e) {
        var keys = e.target.result || [];
        keys.forEach(function(k) { os.delete(k); });
      };
      req.onerror = function() {}; // best-effort
      tx.oncomplete = function() { res(); };
      tx.onerror    = function(e) { rej(e.target.error); };
      tx.onabort    = function()  { res(); }; // don't hang on abort
    });
  });
}

/* Refresh IDB counts shown on subject cards */
function refreshIdbCounts() {
  S._idbCounts = S._idbCounts || {};
  var subs = DEFAULT_SUBJECTS.filter(function(s){ return s.name !== IRON_MAN.name; });
  var promises = subs.map(function(s) {
    return idbCount(s.name).then(function(n) {
      S._idbCounts[s.name] = n;
    });
  });
  // Re-render once after ALL counts are updated, not one-by-one
  Promise.all(promises).then(function() {
    if (S.screen === 'subjects') render();
  });
}

/* ── Override fetchSubject: network → IDB fallback ── */
function fetchSubjectFromSheets(subjName, callback) {
  var cfg = null;
  for (var i=0; i<S.subjects.length; i++) if (S.subjects[i].name===subjName){cfg=S.subjects[i];break;}
  if (!cfg) { console.error('[FETCH] Subject not found in S.subjects:', subjName, S.subjects.map(function(s){return s.name;})); callback('Subject not found',[]);return; }
  var ids = cfg.sheets.map(function(s){return toSheetId(s);}).filter(function(id){return id&&id!=='ALL';});
  if (!ids.length) { console.error('[FETCH] No valid sheet IDs for', subjName, cfg.sheets); callback('No valid spreadsheet IDs configured.',[]);return; }
  console.log('[FETCH] fetching', subjName, 'ids:', ids);
  var allQ=[], errors=[], remaining=ids.length;
  function done(){ 
    if(errors.length===ids.length) { console.error('[FETCH] ALL FAILED', subjName, errors); callback(errors[0],[]); }
    else { console.log('[FETCH] SUCCESS', subjName, allQ.length, 'questions'); callback(null,allQ); }
  }
  ids.forEach(function(id){
    fetchSpreadsheet(id)
      .then(function(rows){
        console.log('[FETCH] rows received', subjName, rows.length);
        var qs=rowsToQuestions(rows,subjName);
        console.log('[FETCH] questions parsed', subjName, qs.length);
        if(!qs.length) throw new Error('No valid questions found.');
        allQ=allQ.concat(qs); remaining--; if(remaining===0) done();
      })
      .catch(function(err){ console.error('[FETCH] sheet error', subjName, id, err.message); errors.push(err.message); remaining--; if(remaining===0) done(); });
  });
}

function fetchSubject(subjName, callback) {
  // Offline: skip network entirely, go straight to IDB
  if (!navigator.onLine) {
    idbLoad(subjName).then(function(cached) {
      if (cached.length) {
        callback(null, cached);
      } else {
        callback('No questions cached. Connect to the internet and open this subject once to enable offline use.', []);
      }
    }).catch(function() {
      callback('Could not load questions.', []);
    });
    return;
  }
  fetchSubjectFromSheets(subjName, function(netErr, netQs) {
    if (!netErr && netQs.length) {
      // Network OK → save fresh data to IDB (put is upsert, no delete needed)
      idbSave(subjName, netQs).then(function(){ refreshIdbCounts(); }).catch(function(){});
      callback(null, netQs);
    } else {
      // Network failed → fall back to IDB
      idbLoad(subjName).then(function(cached) {
        if (cached.length) {
          callback(null, cached);
        } else {
          callback(
            netErr || 'No questions cached. Connect to the internet and open this subject once to enable offline use.',
            []
          );
        }
      }).catch(function(){
        callback(netErr || 'Could not load questions.', []);
      });
    }
  });
}

/* ── Eager preload: populate S.loadedQ for all subjects on startup so
      question counts appear immediately on the subjects screen.
      Reads ONLY from IDB — never triggers a network request. ── */
function preloadAllSubjects() {
  var subs = DEFAULT_SUBJECTS.filter(function(s){ return s.name !== IRON_MAN.name; });
  var remaining = subs.length;
  subs.forEach(function(subj) {
    if (S.loadedQ[subj.name] && S.loadedQ[subj.name].length) {
      remaining--;
      if (remaining === 0) _updateIronManCount();
      return;
    }
    idbLoad(subj.name).then(function(qs) {
      if (qs.length) {
        S.loadedQ[subj.name] = qs;
        if (S.screen === 'subjects') render();
      }
      remaining--;
      if (remaining === 0) _updateIronManCount();
    }).catch(function() {
      remaining--;
      if (remaining === 0) _updateIronManCount();
    });
  });
}

function _updateIronManCount() {
  // Build Iron Man loadedQ count from whatever subjects loaded successfully
  // Only updates the count display — does NOT enter Iron Man mode
  var all = [];
  DEFAULT_SUBJECTS.forEach(function(s) {
    if (s.name !== IRON_MAN.name && S.loadedQ[s.name]) all = all.concat(S.loadedQ[s.name]);
  });
  if (all.length) {
    S.loadedQ[IRON_MAN.name] = all;
    if (S.screen === 'subjects') render();
  }
}
var _bannerTimer = null;
function showBanner(type, msg, autohideMs) {
  var el = document.getElementById('offlineBanner');
  if (!el) return;
  el.className = type;
  el.style.display = 'flex';
  var icon = type==='syncing' ? '<span class="bspin"></span>' : '<span class="bdot"></span>';
  el.innerHTML = '<span>'+icon+msg+'</span>'+
    '<button class="bclose" onclick="this.parentNode.style.display=\'none\'">✕</button>';
  clearTimeout(_bannerTimer);
  if (autohideMs) _bannerTimer = setTimeout(function(){ el.style.display='none'; }, autohideMs);
}
function hideBanner() { var el=document.getElementById('offlineBanner'); if(el) el.style.display='none'; }

function syncAll() {
  var subs = DEFAULT_SUBJECTS.filter(function(s){ return s.name !== IRON_MAN.name; });
  var failed = 0;
  var savePromises = [];
  var fetchedQ = {};
  var done = false;
  console.log('[SYNC] syncAll START, subjects:', subs.map(function(s){return s.name;}));
  showBanner('syncing', 'Syncing question bank…', null);

  function finish() {
    if (done) return;
    done = true;
    console.log('[SYNC] finish called, failed:', failed, '/', subs.length, 'fetched:', Object.keys(fetchedQ));
    subs.forEach(function(s) {
      if (fetchedQ[s.name]) S.loadedQ[s.name] = fetchedQ[s.name];
    });
    _updateIronManCount();
    refreshIdbCounts();
    if (failed === subs.length) {
      showBanner('offline', 'Can\'t reach Google Sheets — using cached question bank', null);
    } else {
      showBanner('synced', 'Question bank updated — all subjects available offline ✓', 4500);
      if (S.screen === 'subjects') render();
    }
  }

  var safetyTimer = setTimeout(function() {
    console.warn('[SYNC] safety timeout fired');
    finish();
  }, 15000);

  var remaining = subs.length;
  subs.forEach(function(subj) {
    fetchSubjectFromSheets(subj.name, function(err, qs) {
      console.log('[SYNC] fetchSubjectFromSheets callback', subj.name, 'err:', err, 'qs:', qs ? qs.length : 0);
      if (!err && qs.length) {
        fetchedQ[subj.name] = qs;
        var saveP = idbSave(subj.name, qs).catch(function(e){ console.error('[SYNC] idbSave failed', subj.name, e); });
        savePromises.push(saveP);
      } else {
        failed++;
      }
      remaining--;
      console.log('[SYNC] remaining:', remaining, 'failed:', failed);
      if (remaining === 0) {
        console.log('[SYNC] all fetched, waiting for', savePromises.length, 'saves');
        Promise.all(savePromises).then(function() {
          clearTimeout(safetyTimer);
          finish();
        }).catch(function(e) {
          console.error('[SYNC] Promise.all error', e);
          clearTimeout(safetyTimer);
          finish();
        });
      }
    });
  });
}

/* ── Online / offline events ── */
window.addEventListener('online',  function() { syncAll(); if (S.screen === 'subjects') render(); });
window.addEventListener('offline', function() {
  showBanner('offline', 'You\'re offline — using cached question bank', null);
  if (S.screen === 'subjects') render();
});

/* ── Startup ── */
refreshIdbCounts();
render();
if (navigator.onLine) {
  var syncDelay = /Mobi|Android/i.test(navigator.userAgent) ? 1200 : 600;
  // First show IDB counts immediately, then sync from network
  preloadAllSubjects();
  setTimeout(syncAll, syncDelay);
} else {
  showBanner('offline', 'You\'re offline — using cached question bank', null);
  preloadAllSubjects();
}

/* ── PWA: register service worker for offline app-shell ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('service-worker.js').catch(function (e) {
      console.warn('[SW] registration failed', e);
    });
  });
}
</script>
